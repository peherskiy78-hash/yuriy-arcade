function savePrices() {
  const tir = parseInt(document.getElementById('s-price-tir')?.value);
  const ball = parseInt(document.getElementById('s-price-ball')?.value);
  const duck = parseInt(document.getElementById('s-price-duck')?.value);
  
  if(isNaN(tir) || isNaN(ball) || isNaN(duck)) {
    alert('Введите все цены');
    return;
  }
  
  update(dbRef('settings/prices'), {tir, ball, duck});
  alert('✓ Цены сохранены');
}
window.savePrices = savePrices;

function savePrizeRules() {
  const tir_toy = parseInt(document.getElementById('s-prize-tir-toy')?.value);
  const ball_big = parseInt(document.getElementById('s-prize-ball-big')?.value);
  const ball_small = parseInt(document.getElementById('s-prize-ball-small')?.value);
  
  if(isNaN(tir_toy) || isNaN(ball_big) || isNaN(ball_small)) {
    alert('Введите все правила');
    return;
  }
  
  update(dbRef('settings/prizeRules'), {tir_toy, ball_big, ball_small});
  
  // Update local prizes for all locations
  LOCS.forEach(loc => {
    if(isTir(loc)) {
      update(dbRef(`${locPath(loc)}/prizes`), {toy:tir_toy});
    } else if(isBall(loc)) {
      update(dbRef(`${locPath(loc)}/prizes`), {toy_big:ball_big, toy_small:ball_small});
    }
  });
  
  alert('✓ Правила сохранены');
}
window.savePrizeRules = savePrizeRules;

// v32: Save low stock thresholds
function saveLowStockThresholds() {
  const toy_small = parseInt(document.getElementById('s-threshold-toy_small')?.value);
  const toy_big = parseInt(document.getElementById('s-threshold-toy_big')?.value);
  const key = parseInt(document.getElementById('s-threshold-key')?.value);
  const balls_strike = parseInt(document.getElementById('s-threshold-balls_strike')?.value);
  const balls_air = parseInt(document.getElementById('s-threshold-balls_air')?.value);
  
  const thresholds = {};
  if(!isNaN(toy_small)) thresholds.toy_small = toy_small;
  if(!isNaN(toy_big)) thresholds.toy_big = toy_big;
  if(!isNaN(key)) thresholds.key = key;
  if(!isNaN(balls_strike)) thresholds.balls_strike = balls_strike;
  if(!isNaN(balls_air)) thresholds.balls_air = balls_air;
  
  if(Object.keys(thresholds).length === 0) {
    alert('Введите хотя бы один порог');
    return;
  }
  
  update(dbRef('settings/lowStockThresholds'), thresholds);
  alert('✓ Пороги сохранены');
}
window.saveLowStockThresholds = saveLowStockThresholds;

function changeOwnerPassword() {
  const old = document.getElementById('s-pw-old')?.value;
  const new1 = document.getElementById('s-pw-new')?.value;
  const new2 = document.getElementById('s-pw-new2')?.value;
  
  if(!old || !new1 || !new2) {
    alert('Заполните все поля');
    return;
  }
  
  if(old !== allUsers?.owner?.pw) {
    alert('Неверный текущий пароль');
    return;
  }
  
  if(new1 !== new2) {
    alert('Новые пароли не совпадают');
    return;
  }

function addOperator() {

function deleteOperator(key) {

  if(!confirm(`Удалить оператора ${name}?`)) return;

function saveInitCounters() {
  const loc = document.getElementById('init-loc')?.value;
  const upd = {};
  let saved = 0;
  
  MACHINES.forEach(m => {
    const v = parseInt(document.getElementById(`init-ctr-${m}`)?.value);
    if(!isNaN(v) && v >= 0) {
      upd[`counters/${m}`] = {prev:v, prevTs:serverTimestamp()};
      saved++;
    }
  });
  
  if(!saved) {
    alert('Введите хотя бы один счётчик');
    return;
  }
  
  update(dbRef(locPath(loc)), upd);
  
  MACHINES.forEach(m => {
    const el = document.getElementById(`init-ctr-${m}`);
    if(el) el.value = '';
  });
  
  alert(`✓ Начальные показания для ${loc} сохранены`);
}
window.saveInitCounters = saveInitCounters;

function updateMoveItems() {

function updateWriteOffItems() {

  ALL_ITEMS.forEach(it => {
    const inp = document.getElementById(`writeoff-${it.k}`);

    }
  });

}

function moveStock() {
  const loc = document.getElementById('move-loc')?.value;
  if(!loc) return;
  
  const items = {};
  let hasItems = false;
  
  ALL_ITEMS.forEach(it => {
    const inp = document.getElementById(`move-${it.k}`);
    if(inp) {
      const v = parseInt(inp.value);
      if(!isNaN(v) && v > 0) {
        items[it.k] = v;
        hasItems = true;
      }
    }
  });
  
  if(!hasItems) {
    alert('Выберите хотя бы одну позицию');
    return;
  }
  
  // Check if we have enough in main stock
  let notEnough = false;
  Object.entries(items).forEach(([k,v]) => {
    if((mainStock[k]||0) < v) {
      notEnough = true;
      alert(`⚠ Недостаточно на складе: ${ALL_ITEMS.find(i=>i.k===k)?.l} (${mainStock[k]||0} < ${v})`);
    }
  });
  if(notEnough) return;
  
  // Deduct from main stock
  const mainUpd = {};
  Object.entries(items).forEach(([k,v]) => {
    mainUpd[k] = (mainStock[k]||0) - v;
  });
  
  // Add to location's pending_stock
  const locUpd = {};
  Object.entries(items).forEach(([k,v]) => {
    locUpd[`pending_stock/${k}`] = v;
  });
  
  // Update both
  update(dbRef('main_stock'), mainUpd);
  update(dbRef(locPath(loc)), locUpd);
  
  // Log
  const lbls={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const note = Object.entries(items).map(([k,v])=>`${lbls[k]||k}: ${v}`).join(', ');
  
  push(dbRef('main_stock_log'), {
    type: 'stock_out',
    ts: serverTimestamp(),
    op: CU.name,
    note: `Выдано на точку ${loc}: ${note}`,
    items
  });
  
  // Clear inputs
  ALL_ITEMS.forEach(it => {
    const inp = document.getElementById(`move-${it.k}`);
    if(inp) inp.value = '';
  });
  
  alert(`✓ Товар выдан на точку ${loc}`);
}
window.moveStock = moveStock;

// ══════════════════════════════════════════════════════════
// OPERATOR: PENDING STOCK
// ══════════════════════════════════════════════════════════
function acceptPending() {
  const loc = CU.location==='Шарики+Уточки' ? subLoc : CU.location;
  const data = allData[enc(loc)]||{};
  const pending = data?.pending_stock||{};
  const stock = data?.stock||{};
  
  // Check if there's anything to accept
  const hasItems = Object.values(pending).some(v=>v>0);
  if(!hasItems) {
    alert('Нет товара для приёма');
    return;
  }
  
  // v14 БЛОК 4: атомарная транзакция для защиты от:
  //  1. Двойного приёма при двойном нажатии кнопки
  //  2. Потери pending_stock при перемещении в момент приёма
  const locRef = dbRef(locPath(loc));
  runTransaction(locRef, cur => {
    cur = cur || {};
    cur.stock = cur.stock || {};
    const pend = cur.pending_stock || {};
    
    // Check if there's anything to accept
    const hasItems = Object.values(pend).some(v=>v>0);
    if(!hasItems) return; // отмена транзакции
    
    // Add pending to stock
    Object.entries(pend).forEach(([k,v])=>{
      if(typeof v === 'number' && v > 0) cur.stock[k] = (cur.stock[k]||0) + v;
    });
    
    // Clear pending
    cur.pending_stock = {};
    
    return cur;
  }).then(result => {
    if(!result.committed) {
      alert('Не удалось принять товар. Попробуйте ещё раз.');
      return;
    }
    
    // Log
    const lbls={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
    const note = Object.entries(pending).filter(([,v])=>v>0).map(([k,v])=>`${lbls[k]||k}: +${v}`).join(', ');
    
    addLog({type:'stock_in', note:`Принято: ${note}`}, loc);
    
    alert(`✓ Товар принят`);
    renderAll();
  }).catch(e => {
    console.error('Ошибка транзакции приёма товара:', e);
    alert('Не удалось принять товар. Попробуйте ещё раз.');
  });
}
window.acceptPending = acceptPending;
