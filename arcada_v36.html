// COUNTERS
// ══════════════════════════════════════════════════════════
function saveCounters() {
  const upd = {};
  let saved = 0;
  MACHINES.forEach(m => {
    const v = parseInt(document.getElementById(`ctr-${m}`)?.value);
    if(!isNaN(v)&&v>=0) { upd[`counters/${m}`]={prev:v,prevTs:serverTimestamp()}; saved++; }
  });
  if(!saved){alert('Введите показания хотя бы одного автомата');return;}
  update(dbRef(locPath()), upd);
  addLog({type:'counters', note:`Счётчики сохранены (${saved} авт.)`});
  MACHINES.forEach(m=>{const el=document.getElementById(`ctr-${m}`);if(el)el.value='';});
  alert(`✓ Сохранено`);
}
window.saveCounters = saveCounters;

function updateDiff(m) {
  const inp = document.getElementById(`ctr-${m}`);
  const dif = document.getElementById(`ctr-diff-${m}`);
  if(!inp||!dif) return;
  const v = parseInt(inp.value);
  const prev = locData?.counters?.[m]?.prev;
  if(!isNaN(v)&&v>=0&&prev!==undefined) {
    const d = v-prev;
    dif.textContent = (d>=0?'+':'')+d;
    dif.style.color = d<0?'var(--red)':'var(--green)';
  } else dif.textContent='—';
}
window.updateDiff = updateDiff;

// ══════════════════════════════════════════════════════════
// CLOSE SHIFT (inventory)
// ══════════════════════════════════════════════════════════
function prefillCloseShift() {
  // v15.2: вместо автозаполнения значений склада — показываем «Должно быть»
  // под каждым полем. Оператор должен ввести фактический остаток руками.
  // v31: для Тира брелки считаются по формуле max(0, оплаты_смены − игрушки_смены)
  // от стартового остатка. Брелки физически не списываются автоматически (с v30),
  // поэтому stock.key показывает «как есть» и не подходит для «Должно быть».
  const loc = CU.location==='Шарики+Уточки' ? subLoc : CU.location;
  const data = allData[enc(loc)] || {};
  const s = data.stock || {};
  const setExpected = (key, override) => {
    const exp = document.getElementById(`inv-expected-${key}`);
    if(exp) {
      if(override !== undefined) {
        exp.textContent = override;
      } else {
        exp.textContent = s[key]!==undefined ? s[key] : '—';
      }
    }
    updateInvDiff(key);
  };

  // v31: специальный расчёт для брелков в Тире
  let keyOverride = undefined;
  if(isTir(loc)) {
    // Активная смена: оплаты этой смены и игрушки за период смены
    const shift = data.shift;
    if(shift && shift.open) {
      const tsOpen = typeof shift.ts === 'number' ? shift.ts : null;
      const sh = {shiftId: tsOpen, tsOpen, tsClose: null, op: shift.op, isActive: true};
      const pay = tsOpen ? paymentsForShift(data, tsOpen, sh) : null;
      // Игрушки за смену
      const log = Object.values(data?.log || {});
      const inShift = e => {
        const ts = tsOf(e);
        if(tsOpen && ts < tsOpen) return false;
        return true;
      };
      const toysShift = log.filter(e => (e.type==='toy' || e.type==='toy_small') && inShift(e)).length;
      // Стартовый остаток брелков (на момент открытия смены)
      const startKey = (shift.openStock && typeof shift.openStock.key === 'number') ? shift.openStock.key : (s.key !== undefined ? s.key : null);
      if(pay === null) {
        keyOverride = '— (ждёт ввода оплат владельцем)';
      } else if(startKey !== null) {
        const shouldGiven = Math.max(0, pay - toysShift);
        const expected = Math.max(0, startKey - shouldGiven);
        keyOverride = `${expected} (старт ${startKey} − выдано ${shouldGiven})`;
      }
    }
  }

  setExpected('toy_small');
  setExpected('toy_big');
  setExpected('key', keyOverride);
  setExpected('balls_strike');
  setExpected('balls_air');
  // v15.3 fix: пересчитываем дельты для всех счётчиков (даже если поле пустое — поставит «—»).
  [1,2,3,4].forEach(m => updateCsDiff(m));
  // v34: пересчитать итоговый блок счётчиков
  if(typeof updateCtrSummary === 'function') updateCtrSummary();
}
window.prefillCloseShift = prefillCloseShift;

// v15.2: пересчёт расхождения при вводе фактического остатка.
// v31: текст «Должно быть» может содержать сноску в скобках для Тира/брелков
// (например «25 (старт 100 − выдано 75)»). Парсим первое число из строки.
function updateInvDiff(key) {
  const inp = document.getElementById(`inv-${key}`);
  const expEl = document.getElementById(`inv-expected-${key}`);
  const diffEl = document.getElementById(`inv-diff-${key}`);
  if(!inp || !diffEl) return;
  const expText = (expEl?.textContent || '').trim();
  const expMatch = expText.match(/^-?\d+/);
  const exp = expMatch ? parseInt(expMatch[0]) : NaN;
  const v = parseInt(inp.value);
  if(isNaN(v) || isNaN(exp)) {
    diffEl.textContent = '';
    return;
  }
  const d = v - exp;
  if(d === 0) {
    diffEl.textContent = ' · ✓ совпадает';
    diffEl.style.color = 'var(--green)';
  } else {
    const sign = d > 0 ? '+' : '';
    diffEl.textContent = ` · ⚠ ${sign}${d}`;
    diffEl.style.color = 'var(--red)';
    diffEl.style.fontWeight = '700';
  }
}
window.updateInvDiff = updateInvDiff;

// v15.2: флаг чтобы при повторном нажатии Закрыть с теми же расхождениями принять как факт
// v31: больше не используется — заменили на confirm-диалог
let _closeShiftPrevDiscrepancies = null;

// v33: флаг чтобы кнопка не нажалась дважды пока идёт запись
let _closingShift = false;

async function closeShift() {
  if(_closingShift) { console.log('[closeShift] already in progress'); return; }
  console.log('[closeShift] start');
  // FIX 3: always use current subLoc for Шарики+Уточки operator
  const loc = CU.location==='Шарики+Уточки' ? subLoc : CU.location;
  const isT = isTir(loc);
  console.log('[closeShift] loc=', loc, 'isTir=', isT);
  // collect inventory
  const inv = {};
  const fields = isT ? ['toy_small','key','balls_strike'] : isBall(loc) ? ['toy_small','toy_big','key','balls_air'] : ['toy_small'];
  fields.forEach(f => {
    const el = document.getElementById(`inv-${f}`);
    if(!el||el.value==='') return;
    inv[f] = parseInt(el.value)||0;
  });
  // FIX v12-1: для тира счётчики — показать какое поле не заполнено
  let missingFields = [];
  fields.forEach(f => {
    const el = document.getElementById(`inv-${f}`);
    if(!el||el.value==='') {
      const names={toy_small:'Игрушки маленькие',key:'Брелки',balls_strike:'Шары страйкб.',toy_big:'Игрушки большие',balls_air:'Шары надувные'};
      missingFields.push(names[f]||f);
    }
  });
  if(isT) {
    let missingCtrs = [];
    MACHINES.forEach(m=>{
      const el=document.getElementById(`cs-ctr-${m}`);
      if(!el||el.value==='') missingCtrs.push(`Автомат ${m}`);
    });
    // v19: счётчики обязательны при каждом закрытии — без послаблений.
    // Раньше можно было пропустить если уже сохранены сегодня, но это давало
    // возможность закрыть смену без актуальных показаний.
    if(missingCtrs.length > 0) {
      missingFields.push(...missingCtrs);
    }
  }
  if(missingFields.length > 0){
    console.log('[closeShift] STOP: missingFields=', missingFields);
    alert('Заполните поля:\n• ' + missingFields.join('\n• '));
    return;
  }
  console.log('[closeShift] all fields filled, proceeding');

  // v15.2: считаем расхождения между фактическим и расчётным.
  // v31: для Тира/брелков «expected» = расчётный остаток (старт − должно_быть_выдано),
  // а не текущий stock.key. Брелки в Тире со склада не списываются автоматически.
  const data = allData[enc(loc)] || {};
  const stockNow = data.stock || {};
  const lbls = {toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const discrepancies = {};

  // v31: расчётный остаток брелков для Тира
  let keyExpectedTir = null;
  if(isT) {
    const shift = data.shift;
    const tsOpen = (shift && typeof shift.ts === 'number') ? shift.ts : null;
    if(tsOpen) {
      const sh = {shiftId: tsOpen, tsOpen, tsClose: null};
      const pay = paymentsForShift(data, tsOpen, sh);
      const log = Object.values(data?.log || {});
      const inShiftFn = e => tsOf(e) >= tsOpen;
      const toysShift = log.filter(e => (e.type==='toy' || e.type==='toy_small') && inShiftFn(e)).length;
      const startKey = (shift.openStock && typeof shift.openStock.key === 'number')
        ? shift.openStock.key
        : (stockNow.key !== undefined ? stockNow.key : null);
      if(pay !== null && startKey !== null) {
        const shouldGiven = Math.max(0, pay - toysShift);
        keyExpectedTir = Math.max(0, startKey - shouldGiven);
      }
    }
  }

  fields.forEach(f => {
    // Шары — приблизительный учёт, расхождения по ним игнорируем
    if(f === 'balls_strike' || f === 'balls_air') return;
    let expected;
    if(isT && f === 'key') {
      // v31: для Тира брелки — расчётный остаток (или пропускаем если оплат нет)
      if(keyExpectedTir === null) return;
      expected = keyExpectedTir;
    } else {
      expected = stockNow[f];
    }
    if(expected === undefined) return;
    const fact = inv[f];
    const diff = fact - expected;
    if(diff !== 0) {
      discrepancies[f] = {expected, fact, diff};
    }
  });
  const hasDiscrepancy = Object.keys(discrepancies).length > 0;
  console.log('[closeShift] discrepancies=', discrepancies, 'has=', hasDiscrepancy);

  // v31: вместо «нажмите второй раз» — один confirm с понятным выбором.
  if(hasDiscrepancy) {
    const lines = Object.entries(discrepancies).map(([k,v])=>
      `${lbls[k]||k}: введено ${v.fact}, должно быть ${v.expected} (${v.diff>0?'+':''}${v.diff})`
    ).join('\n');
    const ok = confirm(`⚠ Обнаружены расхождения:\n\n${lines}\n\nЕсли уверен что физический остаток верен — нажми OK, расхождение будет зафиксировано в журнале.\n\nЕсли хочешь пересчитать — нажми Отмена и проверь коробки.`);
    if(!ok) {
      console.log('[closeShift] user chose to recount');
      return;
    }
    console.log('[closeShift] user accepted discrepancy');
  }

  // v33: АТОМАРНО — собираем все изменения в один multi-path update.
  // Раньше было 5+ независимых fire-and-forget update/push (для Тира),
  // и в слабой сети часть терялась — обычно shift.open=false (последний
  // в очереди) → смена визуально оставалась открытой.
  // Теперь Firebase RTDB атомарно: либо всё прошло, либо ничего.
  _closingShift = true;
  const closeBtn = document.querySelector('#tab-close-shift .btn-primary');
  if(closeBtn) { closeBtn.disabled = true; closeBtn.textContent = 'Закрываю...'; }

  const lp = locPath(loc);
  const lpRoot = `${lp}`;
  const baseUpd = {};

  // 1. inventory: stock
  Object.entries(inv).forEach(([k,v]) => {
    baseUpd[`${lpRoot}/stock/${k}`] = v;
  });

  // 2. log entry: inventory
  const invNote = Object.entries(inv).map(([k,v])=>`${lbls[k]||k}: ${v}`).join(', ');
  const invKey = push(dbRef(`${lpRoot}/log`)).key;
  baseUpd[`${lpRoot}/log/${invKey}`] = {
    ...mkEntry('inventory'),
    note:`Инвентаризация: ${invNote}`,
    loc
  };

  // 3. log entry: inventory_discrepancy (если есть расхождения)
  if(hasDiscrepancy) {
    const discNote = Object.entries(discrepancies).map(([k,v])=>
      `${lbls[k]||k}: факт ${v.fact} vs расч. ${v.expected} (${v.diff>0?'+':''}${v.diff})`
    ).join(', ');
    const discKey = push(dbRef(`${lpRoot}/log`)).key;
    baseUpd[`${lpRoot}/log/${discKey}`] = {
      ...mkEntry('inventory_discrepancy'),
      note:`Расхождение при закрытии: ${discNote}`,
      discrepancies:JSON.stringify(discrepancies),
      loc
    };
  }

  // 4. counters (только Тир) + log entry: counters
  if(isT) {
    const counterValues = {};
    let saved = 0;
    MACHINES.forEach(m => {
      const v = parseInt(document.getElementById(`cs-ctr-${m}`)?.value);
      if(!isNaN(v) && v >= 0) {
        baseUpd[`${lpRoot}/counters/${m}`] = {prev: v, prevTs: serverTimestamp()};
        counterValues[m] = v;
        saved++;
      }
    });
    if(saved) {
      const ctrKey = push(dbRef(`${lpRoot}/log`)).key;
      baseUpd[`${lpRoot}/log/${ctrKey}`] = {
        ...mkEntry('counters'),
        note: `Счётчики при закрытии смены (${saved} авт.)`,
        values: counterValues
      };
    }
  }

  // 5. log entry: shift_close
  const closeKey = push(dbRef(`${lpRoot}/log`)).key;
  baseUpd[`${lpRoot}/log/${closeKey}`] = {
    ...mkEntry('shift_close'),
    note: 'Смена закрыта'
  };

  // 6. shift.open = false
  baseUpd[`${lpRoot}/shift/open`] = false;

  console.log('[closeShift] atomic update — keys:', Object.keys(baseUpd).length);
  try {
    await update(ref(db), baseUpd);
    console.log('[closeShift] OK, all writes committed');
    _closeShiftPrevDiscrepancies = null;
    _closingShift = false;
    if(closeBtn) { closeBtn.disabled = false; closeBtn.textContent = '🔒 Закрыть смену'; }
    alert(hasDiscrepancy
      ? '⚠ Смена закрыта с расхождениями. Владелец увидит это в Обзоре.'
      : '✓ Смена закрыта. Спасибо!');
  } catch(e) {
    console.error('[closeShift] FAILED:', e);
    _closingShift = false;
    if(closeBtn) { closeBtn.disabled = false; closeBtn.textContent = '🔒 Закрыть смену'; }
    alert('⚠ Не удалось закрыть смену.\n\nОшибка: ' + (e?.message || e) + '\n\nПроверь интернет и попробуй ещё раз. Введённые остатки сохранены в полях.');
  }
}
window.closeShift = closeShift;

function updateCsDiff(m) {
  const inp = document.getElementById(`cs-ctr-${m}`);
  const dif = document.getElementById(`cs-diff-${m}`);
  if(!inp||!dif) return;
  const v = parseInt(inp.value);
  // v34: для активной смены берём openCounters если есть (утро смены),
  // иначе counters[m].prev (общее последнее показание).
  const loc = CU?.location==='Шарики+Уточки' ? subLoc : CU?.location;
  const data = allData[enc(loc)] || {};
  const openCtrs = data?.shift?.openCounters || {};
  const prev = (typeof openCtrs[m] === 'number') ? openCtrs[m] : data?.counters?.[m]?.prev;
  if(!isNaN(v)&&v>=0&&typeof prev === 'number') {
    const d = v-prev;
    dif.textContent = `+${Math.max(0,d)} игр`;
    dif.style.color = d<0?'var(--red)':'var(--green)';
  } else {
    dif.textContent='—';
    dif.style.color = 'var(--dim)';
  }
}
window.updateCsDiff = updateCsDiff;

// v34: общий пересчёт итогов по всем 4 автоматам в блоке закрытия Тира.
// Показывает «Игр за смену: N · Расход шаров: N×20 = M» либо
// «Введите все 4 автомата» если хотя бы одно поле пустое.
function updateCtrSummary() {
  const sum = document.getElementById('cs-summary-text');
  if(!sum) return;
  const loc = CU?.location==='Шарики+Уточки' ? subLoc : CU?.location;
  const data = allData[enc(loc)] || {};
  const openCtrs = data?.shift?.openCounters || {};
  let totalGames = 0;
  let allFilled = true;
  let missingMachines = [];
  MACHINES.forEach(m => {
    const inp = document.getElementById(`cs-ctr-${m}`);
    const v = parseInt(inp?.value);
    const prev = (typeof openCtrs[m] === 'number') ? openCtrs[m] : data?.counters?.[m]?.prev;
    if(isNaN(v) || v < 0) {
      allFilled = false;
      missingMachines.push(m);
      return;
    }
    if(typeof prev !== 'number') {
      // Утреннее показание не известно — считаем дельту от 0
      totalGames += v;
    } else {
      totalGames += Math.max(0, v - prev);
    }
  });
  if(!allFilled) {
    sum.innerHTML = `<span style="color:var(--red)">⚠ Не введены автоматы: ${missingMachines.join(', ')}</span>`;
  } else {
    const balls = totalGames * 20;
    sum.innerHTML = `🎯 Игр за смену: <b>${totalGames}</b><br>🔵 Расход шаров: ${totalGames} × 20 = <b>${balls}</b>`;
  }
}
window.updateCtrSummary = updateCtrSummary;

function saveCountersFromClose() {
  const upd = {};
  let saved = 0;
  const values = {};
  MACHINES.forEach(m => {
    const v = parseInt(document.getElementById(`cs-ctr-${m}`)?.value);
    if(!isNaN(v)&&v>=0) {
      upd[`counters/${m}`]={prev:v,prevTs:serverTimestamp()};
      values[m] = v;
      saved++;
    }
  });
  if(saved) {
    update(dbRef(locPath()), upd);
    // v19: пишем values в лог чтобы потом считать дельту смены
    addLog({type:'counters', note:`Счётчики при закрытии смены (${saved} авт.)`, values});
  }
}

// ══════════════════════════════════════════════════════════
// OWNER: PAYMENTS
// ══════════════════════════════════════════════════════════
// v14 БЛОК 4: защита от двойного нажатия — флаг блокировки
let _savingPayments = false;

// v20: контекст ожидающего изменения оплат — пока не введён пароль
let _pendingPayChange = null;

function savePayments(loc) {
  // Защита от двойного нажатия
  if(_savingPayments) return;
  const l = loc||ownerLoc;
  const inp = document.getElementById('pay-inp');
  const v = parseInt(inp?.value);
  if(isNaN(v)||v<0){alert('Введите число');return;}

  const data = allData[enc(l)]||{};

  // v28: определяем к какой смене привязываем оплаты
  // Смены за выбранный день
  const shifts = shiftsListForLoc(data, ownerDay);
  if(!shifts.length) {
    alert('За выбранный день не было смен на этой точке. Невозможно привязать оплаты.');
    return;
  }
  // Если выбрана конкретная смена через ownerShiftId — её используем
  // Иначе если смена одна — её. Иначе — требуем выбор.
  let targetShiftId = ownerShiftId;
  if(!targetShiftId) {
    if(shifts.length === 1) {
      targetShiftId = shifts[0].shiftId;
    } else {
      alert('На этот день несколько смен. Выберите конкретную смену в выпадающем списке.');
      return;
    }
  }

  // Находим объект смены
  const targetShift = shifts.find(s => s.shiftId === targetShiftId);
  const shiftLabel = targetShift
    ? `${fmtTimeShort(targetShift.tsOpen)}${targetShift.tsClose?'→'+fmtTimeShort(targetShift.tsClose):' (открыта)'} · ${targetShift.op}`
    : 'смена';

  // Проверяем, есть ли уже оплаты для этой смены
  const existingPay = paymentsForShift(data, targetShiftId, targetShift);

  if(existingPay !== null && existingPay === v) {
    // Те же числа — выходим
    const ps = document.getElementById('pay-saved');
    if(ps) ps.textContent = '✓ Уже сохранено';
    return;
  }

  if(existingPay !== null && existingPay !== v) {
    // Уже введены другие — требуем пароль владельца
    _pendingPayChange = {loc: l, newValue: v, oldValue: existingPay, shiftId: targetShiftId, shiftLabel};
    const txt = document.getElementById('pay-pw-text');
    if(txt) txt.innerHTML = `Оплаты для <b>${l}</b> · смена <b>${shiftLabel}</b> уже введены: <b>${existingPay}</b>.<br><br>Чтобы изменить на <b>${v}</b>, введите пароль владельца. Изменение будет записано в журнал.`;
    const pwInp = document.getElementById('pay-pw-inp');
    if(pwInp) { pwInp.value = ''; setTimeout(()=>pwInp.focus(), 100); }
    const err = document.getElementById('pay-pw-err');
    if(err) err.style.display = 'none';
    document.getElementById('pay-pw-modal').style.display = 'flex';
    return;
  }

  // Первый ввод — без пароля
  _doSavePayments(l, v, null, targetShiftId, shiftLabel);
}
window.savePayments = savePayments;

// v32: ввод оплат прямо из раскрытой строки смены через prompt.
// Заменяет старую форму «Ввести оплаты — Тир 1» снизу страницы.
// v36: открыть inline-форму ввода оплат (без prompt — поле прямо в строке).
// editingPayShiftId хранит shiftId редактируемой смены. При renderOverview
// если совпадает с sh.shiftId — отрисовывается форма вместо текста.
function openInlinePay(locArg, shiftId) {
  console.log('[openInlinePay]', locArg, shiftId);
  const data = allData[enc(locArg)] || {};
  const allShifts = shiftsListForLoc(data, null);
  const sh = allShifts.find(s => s.shiftId === shiftId);
  if(!sh) { alert('Смена не найдена. Обновите страницу.'); return; }
  window.editingPayShiftId = shiftId;
  renderOverview();
  // Поставить фокус на поле после рендера
  setTimeout(() => {
    const inp = document.getElementById('inline-pay-input');
    if(inp) { inp.focus(); inp.select(); }
  }, 50);
}
window.openInlinePay = openInlinePay;

// v36: подтвердить ввод оплат из inline-формы.
function confirmInlinePay(locArg, shiftId) {
  console.log('[confirmInlinePay]', locArg, shiftId);
  const data = allData[enc(locArg)] || {};
  const allShifts = shiftsListForLoc(data, null);
  const sh = allShifts.find(s => s.shiftId === shiftId);
  if(!sh) { alert('Смена не найдена. Обновите страницу.'); return; }
  const inp = document.getElementById('inline-pay-input');
  if(!inp) return;
  const num = parseInt(inp.value);
  if(isNaN(num) || num < 0) { alert('Введите корректное число (≥ 0).'); return; }
  const existing = paymentsForShift(data, shiftId, sh);
  if(existing !== null && existing === num) {
    // Без изменений — просто закрываем форму
    window.editingPayShiftId = null;
    renderOverview();
    return;
  }
  if(existing !== null && existing !== num) {
    // Изменение — пароль владельца
    const pw = prompt(`Текущее значение оплат: ${existing}\nНовое: ${num}\n\nВведите пароль владельца для изменения:`);
    if(pw === null) return;
    const ownerPw = allUsers?.owner?.pw || '';
    if(pw !== ownerPw) { alert('Неверный пароль. Изменение отменено.'); return; }
  }
  const shiftTime = sh.tsClose
    ? `${fmtTimeShort(sh.tsOpen)}→${fmtTimeShort(sh.tsClose)}`
    : `${fmtTimeShort(sh.tsOpen)} (открыта)`;
  const shiftLabel = `${shiftTime} · ${sh.op}`;
  window.editingPayShiftId = null;
  _doSavePayments(locArg, num, existing, shiftId, shiftLabel);
}
window.confirmInlinePay = confirmInlinePay;

// v28: реальное сохранение оплат с привязкой к смене.
// v30: брелки в Тире со склада БОЛЬШЕ НЕ списываются — только запись в журнал
// и расчёт в note. Реальный остаток брелков фиксируется при инвентаризации
// в конце смены, расхождение с расчётом будет видно в сверке склада.
function _doSavePayments(l, v, oldValue, shiftId, shiftLabel) {
  _savingPayments = true;
  const payBtn = document.querySelector('#tab-overview .btn-primary');
  if(payBtn) { payBtn.disabled = true; payBtn.style.opacity = '0.5'; }
  const data = allData[enc(l)]||{};

  // Расчёт брелков для note (только для аудита — склад не трогаем)
  const isTodayShift = !ownerDay || ownerDay === todayKey();
  let keysCalc = 0;
  if(isTir(l) && isTodayShift) {
    const toys = countType(data,'toy','toy_small');
    keysCalc = Math.max(0, v - toys);
  }

  // Запись в лог с привязкой к смене
  const noteBase = oldValue !== null
    ? `Оплат: ${v} (исправлено с ${oldValue}) · смена ${shiftLabel}`
    : `Оплат: ${v} · смена ${shiftLabel}`;
  const noteWithKeys = isTir(l) && isTodayShift
    ? `${noteBase} · Брелков расчёт: ${keysCalc} (склад не списан)`
    : noteBase;
  push(dbRef(`${locPath(l)}/log`), mkEntry('payment', {
    note: noteWithKeys,
    count: v,
    shiftId: shiftId
  }));

  // Запись об исправлении (для аудита)
  if(oldValue !== null) {
    push(dbRef(`${locPath(l)}/log`), mkEntry('payment_correction', {
      note: `Оплаты исправлены: было ${oldValue}, стало ${v} (по паролю владельца, смена ${shiftLabel})`,
      oldValue,
      newValue: v,
      shiftId
    }));
  }

  const ps = document.getElementById('pay-saved');
  if(ps) {
    ps.textContent = oldValue !== null
      ? (isTir(l) && isTodayShift ? `✓ Изменено · Брелков расчёт: ${keysCalc}` : '✓ Изменено')
      : (isTir(l) && isTodayShift ? `✓ Сохранено · Брелков расчёт: ${keysCalc}` : '✓ Сохранено');
  }

  setTimeout(()=>{
    _savingPayments = false;
    const btn = document.querySelector('#tab-overview .btn-primary');
    if(btn) { btn.disabled = false; btn.style.opacity = ''; }
    renderAll();
  }, 500);
}

// v20/v28: подтверждение пароля для изменения оплат
function confirmPayChange() {
  const inp = document.getElementById('pay-pw-inp');
  const err = document.getElementById('pay-pw-err');
  const pw = inp?.value || '';
  const ownerPw = allUsers?.owner?.pw || '';
  if(pw !== ownerPw) {
    if(err) err.style.display = 'block';
    if(inp) inp.value = '';
    return;
  }
  document.getElementById('pay-pw-modal').style.display = 'none';
  if(_pendingPayChange) {
    const {loc, newValue, oldValue, shiftId, shiftLabel} = _pendingPayChange;
    _pendingPayChange = null;
    _doSavePayments(loc, newValue, oldValue, shiftId, shiftLabel);
  }
}

function cancelPayChange() {
  document.getElementById('pay-pw-modal').style.display = 'none';
  _pendingPayChange = null;
}

function buildStatsBar(loc) {
  // v18: для владельца шапка счётчиков не нужна — он видит сводную таблицу
  if(CU?.role === 'owner') {
    const w = document.getElementById('stats-bar-wrap');
    if(w) w.innerHTML = '';
    return;
  }
  // FIX 5: для комбо-оператора Шарики+Уточки используем subLoc, а не 'Шарики+Уточки'
  const effectiveLoc = loc === 'Шарики+Уточки' ? subLoc : loc;
  const data = allData[enc(effectiveLoc)]||{};
  const tk = todayKey();
  const todayEntries = Object.values(data?.log||{}).filter(e=>dayKey(tsOf(e))===tk);
  const ballPrizeKeys = todayEntries.filter(e=>e.type==='ball_prize'&&e.prize==='key').length;
  const ballPrizeToySmall = todayEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_small').length;
  const ballPrizeToyBig = todayEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_big').length;
  const toys = countType(data,'toy','toy_small','duck_prize') + ballPrizeToySmall; // FIX v9-13: включаем ball_prize toy_small
  const keys = countType(data,'key_given') + ballPrizeKeys;
  const big = countType(data,'toy_big') + ballPrizeToyBig;
  const own = countType(data,'own_game');
  // v25: для оператора показываем только релевантные счётчики его точки.
  // «💳 Оплат» убрано — оператор оплаты не вводит. (v31: убрана и неиспользуемая переменная pay)
  const isTirLoc = isTir(effectiveLoc);
  const isBallLoc = isBall(effectiveLoc);
  const isDuckLoc = isDuck(effectiveLoc);
  const stockKey = data?.stock?.key;

  let blocks = [];
  if(isTirLoc) {
    // Тир: 🧸 Игрушек / 🔑 В коробке / 🎮 Своих
    blocks.push(`<div class="stat-item s-toy"><div class="stat-val">${toys}</div><div class="stat-lbl">🧸 Игрушек</div></div>`);
    blocks.push(`<div class="stat-item s-key"><div class="stat-val">${stockKey!==undefined?stockKey:'—'}</div><div class="stat-lbl">🔑 В коробке</div></div>`);
    blocks.push(`<div class="stat-item s-own"><div class="stat-val">${own}</div><div class="stat-lbl">🎮 Своих</div></div>`);
  } else if(isBallLoc) {
    // Шарики: 🎁 Больших / 🧸 Маленьких / 🔑 Брелков / 🎮 Своих
    blocks.push(`<div class="stat-item s-big"><div class="stat-val">${big}</div><div class="stat-lbl">🎁 Больших</div></div>`);
    blocks.push(`<div class="stat-item s-toy"><div class="stat-val">${toys}</div><div class="stat-lbl">🧸 Маленьких</div></div>`);
    blocks.push(`<div class="stat-item s-key"><div class="stat-val">${keys}</div><div class="stat-lbl">🔑 Брелков</div></div>`);
    blocks.push(`<div class="stat-item s-own"><div class="stat-val">${own}</div><div class="stat-lbl">🎮 Своих</div></div>`);
  } else if(isDuckLoc) {
    // v30: на Уточках своей игры НЕТ — оператор не видит этого счётчика
    blocks.push(`<div class="stat-item s-toy"><div class="stat-val">${toys}</div><div class="stat-lbl">🧸 Игрушек</div></div>`);
  } else {
    // Fallback
    blocks.push(`<div class="stat-item s-toy"><div class="stat-val">${toys}</div><div class="stat-lbl">🧸 Игрушек</div></div>`);
    blocks.push(`<div class="stat-item s-own"><div class="stat-val">${own}</div><div class="stat-lbl">🎮 Своих</div></div>`);
  }

  document.getElementById('stats-bar-wrap').innerHTML = `
    <div class="stats-bar">
      ${blocks.join('')}
    </div>`;
}

function getLocItems(loc) {
  const allowed = LOC_ITEMS[loc] || LOC_ITEMS['main'];
  return ALL_ITEMS.filter(it => allowed.includes(it.k));

  const from = document.getElementById('mv-from')?.value || 'main';
  const to   = document.getElementById('mv-to')?.value   || '';
  // FIX 1: show only items valid for DESTINATION (куда), intersected with source items
  const fromItems = getLocItems(from);
  const toItems   = to ? getLocItems(to) : fromItems;
  const items = to ? fromItems.filter(it => toItems.some(ti=>ti.k===it.k)) : fromItems;
  const el = document.getElementById('mv-items');
  if(!el) return;
  if(items.length===0) {
    el.innerHTML='<div style="color:var(--red);font-size:13px;padding:8px">Нет общих позиций для этого перемещения</div>';

  el.innerHTML = items.map(it=>`<div class="form-row"><label>${it.l}</label><input type="number" id="mv-${it.k}" placeholder="0" min="0" inputmode="numeric"></div>`).join('');
}

function updateWriteOffItems() {
  const from = document.getElementById('wr-from')?.value || 'main';
  const items = getLocItems(from);

// ══════════════════════════════════════════════════════════
// STOCK OPERATIONS
// ══════════════════════════════════════════════════════════
function stockIn() {
  const items = ['toy_small','toy_big','key','balls_strike','balls_air'];
  const values = {};
  items.forEach(it => {
    const el = document.getElementById(`si-${it}`);
    if(!el) return;
    const raw = el.value.trim();
    if(raw==='') return;
    const v = parseInt(raw);
    if(!isNaN(v) && v > 0) values[it] = v;
  });
  if(!Object.keys(values).length){alert('Введите количество хотя бы одной позиции (больше 0)');return;}
  const lbls={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const summary=Object.entries(values).map(([k,v])=>`${lbls[k]||k}: +${v}`).join(', ');
  if(!confirm(`Оприходовать на главный склад?\n\n${summary}`)) return;
  get(dbRef('main_stock')).then(snap=>{
    const cur = snap.val()||{};
    const upd = {};
    Object.entries(values).forEach(([k,v])=>{ upd[k]=(cur[k]||0)+v; });
    update(dbRef('main_stock'), upd);
    push(dbRef('main_stock_log'), {ts:serverTimestamp(),op:CU.name,type:'in',values,note:`Приход: ${summary}`});
    alert('✓ Приход оприходован!');
    items.forEach(it=>{const el=document.getElementById(`si-${it}`);if(el)el.value='';});
    if(stockLoc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
  });
}
window.stockIn = stockIn;

function stockMove() {
  const from = document.getElementById('mv-from')?.value;
  const to = document.getElementById('mv-to')?.value;
  if(!to){alert('Выберите куда переместить');return;}
  if(from===to){alert('Откуда и куда одинаковые');return;}
  // Read only items that are rendered in mv-items div
  const values = {};
  ALL_ITEMS.forEach(it=>{
    const el=document.getElementById(`mv-${it.k}`);
    if(!el) return;
    const raw=el.value.trim();
    if(raw==='') return;
    const v=parseInt(raw);
    if(!isNaN(v)&&v>0) values[it.k]=v;
  });
  if(!Object.keys(values).length){alert('Введите количество хотя бы одной позиции');return;}
  const lbls={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const summary=Object.entries(values).map(([k,v])=>`${lbls[k]||k}: ${v}`).join(', ');
  const fromName=from==='main'?'Главный склад':from;
  const toName=to==='main'?'Главный склад':to;
  if(!confirm(`Переместить с "${fromName}" на "${toName}"?\n\n${summary}`)) return;

  const fromRef = from==='main' ? dbRef('main_stock') : dbRef(`${locPath(from)}/stock`);
  // Приёмник:
  //  - на главный склад → сразу в stock
  //  - на точку → в pending_stock (оператор примет при открытии смены)
  const toRef = to==='main'
    ? dbRef('main_stock')
    : dbRef(`${locPath(to)}/pending_stock`);

  // v14 БЛОК 4: две независимые транзакции (разные локации — гонки между ними нет)
  // runTransaction защищает от конкурентных изменений КАЖДОГО склада отдельно.
  const txFrom = runTransaction(fromRef, cur => {
    cur = cur || {};
    Object.entries(values).forEach(([k,v])=>{
      cur[k] = Math.max(0, (cur[k]||0) - v);
    });
    return cur;
  });
  const txTo = runTransaction(toRef, cur => {
    cur = cur || {};
    Object.entries(values).forEach(([k,v])=>{
      cur[k] = (cur[k]||0) + v;
    });
    return cur;
  });

  Promise.all([txFrom, txTo]).then(([resFrom, resTo])=>{
    if(!resFrom.committed || !resTo.committed) {
      alert('Не удалось выполнить перемещение. Попробуйте ещё раз.');
      return;
    }
    const logNote=`Перемещение ${fromName}→${toName}: ${summary}`;
    push(dbRef('main_stock_log'),{ts:serverTimestamp(),op:CU.name,type:'move',note:logNote,values,from:fromName,to:toName});
    if(from!=='main') push(dbRef(`${locPath(from)}/log`),mkEntry('stock_out',{note:`Перемещено на ${toName}: ${summary}`}));
    if(to!=='main')   push(dbRef(`${locPath(to)}/log`),mkEntry('stock_out',{note:`Получено с ${fromName}: ${summary}`}));

    alert(`✓ Перемещено с ${fromName} на ${toName}!`);
    ALL_ITEMS.forEach(it=>{const el=document.getElementById(`mv-${it.k}`);if(el)el.value='';});
    if(stockLoc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
    else renderLocStock(stockLoc);
  }).catch(e=>{
    console.error('Ошибка транзакции перемещения:', e);
    alert('Ошибка перемещения: '+e.message);
  });
}
window.stockMove = stockMove;

function stockOut() {
  stockMove();
}
window.stockOut = stockOut;

function stockWriteOff() {
  const from = document.getElementById('wr-from')?.value||'main';
  const items = ['toy_small','toy_big','key','balls_strike','balls_air'];
  const values = {};
  items.forEach(it=>{
    const el=document.getElementById(`wr-${it}`);
    if(!el) return;
    const raw=el.value.trim();
    if(raw==='') return;
    const v=parseInt(raw);
    if(!isNaN(v)&&v>0) values[it]=v;
  });
  if(!Object.keys(values).length){alert('Введите количество хотя бы одной позиции');return;}
  const reason=document.getElementById('wr-reason')?.value.trim()||'Не указана';
  const lbls={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const summary=Object.entries(values).map(([k,v])=>`${lbls[k]||k}: ${v}`).join(', ');
  const fromName=from==='main'?'Главный склад':from;
  if(!confirm(`Списать с "${fromName}"?\n\n${summary}\nПричина: ${reason}`)) return;

  const stockRef = from==='main' ? dbRef('main_stock') : dbRef(`${locPath(from)}/stock`);
  get(stockRef).then(snap=>{
    const cur=snap.val()||{};
    const upd={};
    Object.entries(values).forEach(([k,v])=>{ upd[k]=Math.max(0,(cur[k]||0)-v); });
    update(stockRef,upd);
    const logNote=`Списание с ${fromName}: ${summary}. Причина: ${reason}`;
    push(dbRef('main_stock_log'),{ts:serverTimestamp(),op:CU.name,type:'writeoff',note:logNote,values,from:fromName,reason});
    if(from!=='main') push(dbRef(`${locPath(from)}/log`),mkEntry('stock_out',{note:logNote}));
    alert('✓ Списание выполнено!');
    items.forEach(it=>{const el=document.getElementById(`wr-${it}`);if(el)el.value='';});
    const re=document.getElementById('wr-reason');if(re)re.value='';
    if(stockLoc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
    else renderLocStock(stockLoc);
  });
}
window.stockWriteOff = stockWriteOff;

function renderAll() {
  const loc = CU.role==='operator' ? (CU.location==='Шарики+Уточки'?subLoc:CU.location) : ownerLoc;
  const data = allData[enc(loc)]||{};
  locData = data;
  buildStatsBar(loc);
  renderShiftBanner();
  renderRecent(data);
  renderStockMini(data);
  renderCounterLabels(data);
  renderMyStock(data);
  renderMyStockOps(data);
  renderGamePendingBanner(data, loc); // v24
  // v25 fix: если оператор находится на вкладке закрытия смены, обновляем «Должно быть»
  // при каждом изменении stock (после каждой выдачи приза)
  if(CU.role==='operator') {
    const csPanel = document.getElementById('tab-close-shift');
    if(csPanel && csPanel.classList.contains('active')) {
      prefillCloseShift();
    }
  }
  if(CU.role==='owner') { renderOverview(); renderOvDetail(data); renderOps(); }
}

// v24: баннер с кнопкой принять товар на вкладке Игра
function renderGamePendingBanner(data, loc) {
  const el = document.getElementById('game-pending-banner');
  if(!el) return;
  if(CU?.role !== 'operator') { el.innerHTML = ''; return; }
  const pending = data?.pending_stock || {};
  const allowed = LOC_ITEMS[loc] || [];
  const has = Object.entries(pending).some(([k,v])=>v>0 && allowed.includes(k));
  if(!has) { el.innerHTML = ''; return; }
  const names={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
  const lines = Object.entries(pending)
    .filter(([k,v])=>v>0 && allowed.includes(k))
    .map(([k,v])=>`${names[k]||k}: +${v}`)
    .join(', ');
  el.innerHTML = `<div style="background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px">
    <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px">📦 Поступление товара</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:10px">${lines}</div>
    <button class="btn-primary" style="width:100%" onclick="acceptPending()">✅ Принять товар</button>
  </div>`;
}

function renderShiftBanner() {
  if(CU.role!=='operator') return;
  // FIX 3: always use subLoc for Шарики+Уточки
  const loc = CU.location==='Шарики+Уточки'?subLoc:CU.location;
  const data = allData[enc(loc)]||{};
  const shift = data?.shift;
  const banner=document.getElementById('shift-banner');
  const txt=document.getElementById('shift-txt');
  const btn=document.getElementById('shift-btn');
  if(!banner) return;
  const isOpen = !!shift?.open;
  if(isOpen) {
    banner.className='shift-banner shift-open';
    txt.textContent=`✓ Смена открыта · ${fmtTimeShort(shift.ts)}`;
    btn.textContent='🔒 К закрытию'; btn.className='shift-action close';
  } else {
    banner.className='shift-banner shift-closed';
    txt.textContent='Смена не открыта — выдача призов заблокирована';
    btn.textContent='Открыть смену'; btn.className='shift-action open';
  }
  // Block/unblock all prize buttons based on shift state
  const prizeIds = ['btn-toy','btn-key','btn-ball-confirm','btn-duck'];
  prizeIds.forEach(id => {
    const b = document.getElementById(id);
    if(b) b.disabled = !isOpen;
  });
  // FIX v9-10: Block ALL prize-btn including "Своя игра" (has no id) when shift is closed
  document.querySelectorAll('.prize-btn').forEach(b => {
    if(b.id==='btn-ball-confirm') return; // handled separately above
    b.disabled = !isOpen;
  });
}

function renderRecent(data) {
  const el=document.getElementById('recent-log'); if(!el) return;
  const items=Object.values(data?.log||{}).sort((a,b)=>tsOf(b)-tsOf(a)).slice(0,5);
  if(!items.length){el.innerHTML='<div class="ri-empty">Нет записей</div>';return;}
  el.innerHTML=items.map(e=>{
    const cls={toy:'ri-toy',key_given:'ri-key',toy_small:'ri-toy',toy_big:'ri-big',duck_prize:'ri-toy',ball_prize:'ri-big',own_game:'ri-own',cancel:'ri-cancel',shift_open:'ri-shift',shift_close:'ri-shift'}[e.type]||'';
    return `<div class="recent-item fade-in"><span class="ri-time">${fmtTime(e.ts)}</span><span class="ri-type ${cls}">${typeLabel(e.type)}${e.note&&!e.note.includes('{')?` — ${e.note}`:''}</span></div>`;
  }).join('');
}

function renderStockMini(data) {

  const loc=CU?.location==='Шарики+Уточки'?subLoc:(CU?.location||'main');
  const allowed=LOC_ITEMS[loc]||LOC_ITEMS['main'];
  const warn=document.getElementById('w-stock');
  if(warn) warn.classList.toggle('show',(s.toy_small!==undefined&&s.toy_small<=3));
  const pills=[];
  if(allowed.includes('toy_small')&&s.toy_small!==undefined) pills.push(`<div class="stock-pill"><div class="sp-val sp-toy">${s.toy_small}</div><div class="sp-lbl">🧸 Маленьких</div></div>`);
  if(allowed.includes('toy_big')&&s.toy_big!==undefined) pills.push(`<div class="stock-pill"><div class="sp-val sp-big">${s.toy_big}</div><div class="sp-lbl">🎁 Больших</div></div>`);
  if(allowed.includes('key')&&s.key!==undefined) pills.push(`<div class="stock-pill"><div class="sp-val sp-key">${s.key}</div><div class="sp-lbl">🔑 Брелков</div></div>`);
  if(allowed.includes('balls_strike')&&s.balls_strike!==undefined) pills.push(`<div class="stock-pill"><div class="sp-val sp-ball">~${s.balls_strike}</div><div class="sp-lbl">🔵 Шаров</div></div>`);
  if(allowed.includes('balls_air')&&s.balls_air!==undefined) pills.push(`<div class="stock-pill"><div class="sp-val sp-ball">~${s.balls_air}</div><div class="sp-lbl">🎈 Надув.</div></div>`);

}

function renderCounterLabels(data) {
  const counters=data?.counters||{};
  let total=0; let hasAll=true;
  MACHINES.forEach(m=>{
    const pl=document.getElementById(`ctr-prev-${m}`);
    const c=counters[m]||{};
    if(pl) pl.textContent=c.prev!==undefined?`утро: ${c.prev}${c.prevTs?` (${fmtTimeShort(c.prevTs)})`:''}` :'утро: —';
    const inp=document.getElementById(`ctr-${m}`);
    const v=parseInt(inp?.value);
    if(!isNaN(v)&&v>=0&&c.prev!==undefined) total+=v-c.prev; else hasAll=false;
    updateDiff(m);
  });
  if(hasAll) {
    const el=document.getElementById('ctr-total'); if(el)el.textContent=total;
    const tl=todayLog(data);
    const ownCnt=tl.filter(l=>l.type==='own_game').length;
    const oel=document.getElementById('ctr-own'); if(oel)oel.textContent=ownCnt;
    const rel=document.getElementById('ctr-real'); if(rel)rel.textContent=total-ownCnt;
  }
  // close-shift panel prev labels
  if(document.getElementById('cs-prev-1')) {
    MACHINES.forEach(m=>{
      const pl=document.getElementById(`cs-prev-${m}`);
      const c=counters[m]||{};
      if(pl) pl.textContent=c.prev!==undefined?`утро: ${c.prev}${c.prevTs?` (${fmtTimeShort(c.prevTs)})`:''}`:'утро: —';
      updateCsDiff(m);
    });
  }
}

function renderMyStock(data) {
  const el=document.getElementById('my-stock-cards'); if(!el) return;
  const s=data?.stock||{};
  const pending=data?.pending_stock||{};
  const loc=CU?.location==='Шарики+Уточки'?subLoc:(CU?.location||'main');
  const allowed=LOC_ITEMS[loc]||LOC_ITEMS['main'];
  const allItemDefs=[
    {key:'toy_small',ico:'🧸',name:'Игрушки маленькие',cls:'sc-toy'},
    {key:'toy_big',ico:'🎁',name:'Игрушки большие',cls:'sc-big'},
    {key:'key',ico:'🔑',name:'Брелки',cls:'sc-key'},
    {key:'balls_strike',ico:'🔵',name:'Шары страйкбольные',approx:true,cls:'sc-ball'},
    {key:'balls_air',ico:'🎈',name:'Шары надувные',approx:true,cls:'sc-ball'},
  ];
  const items=allItemDefs.filter(it=>allowed.includes(it.key));

  // v24: баннер о pending_stock с кнопкой принять — если товар пришёл во время открытой смены
  const hasPending = Object.entries(pending).some(([k,v])=>v>0 && allowed.includes(k));
  let pendingHtml = '';
  if(hasPending) {
    const names={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
    const lines = Object.entries(pending)
      .filter(([k,v])=>v>0 && allowed.includes(k))
      .map(([k,v])=>`${names[k]||k}: +${v}`)
      .join(', ');
    pendingHtml = `<div style="background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px">📦 Поступление с главного склада</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px">${lines}</div>
      <button class="btn-primary" style="width:100%" onclick="acceptPending()">✅ Принять товар</button>
      <div style="font-size:11px;color:var(--dim);margin-top:6px;line-height:1.4">Проверьте физическое наличие коробок, затем нажмите.</div>

  }

  // FIX v10-2: если склад полностью пуст — показать подсказку
  const hasAnyStock = items.some(it => s[it.key] !== undefined);
  if(!hasAnyStock && !hasPending) {
    el.innerHTML = `<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;color:var(--dim);font-size:14px">

    <div class="stock-card">
      <div class="sc-icon">${it.ico}</div>
      <div class="sc-info">
        <div class="sc-name">${it.name}</div>
        <div class="sc-cnt ${it.cls}">${s[it.key]!==undefined?(it.approx?'~':'')+s[it.key]+' шт':'—'}</div>
        ${(s[it.key]!==undefined&&s[it.key]<=3)?'<div class="sc-warn">⚠ Критически мало!</div>':''}
      </div>

}

// v24: оператор принимает товар из pending_stock в stock
function acceptPending() {
  const loc = CU?.location==='Шарики+Уточки' ? subLoc : CU?.location;
  if(!loc) return;
  if(!confirm('Принять товар на склад?\n\nУбедитесь что коробки физически на месте.')) return;

  const locRef = dbRef(locPath(loc));
  runTransaction(locRef, cur => {
    cur = cur || {};
    const pend = cur.pending_stock || {};
    if(!Object.keys(pend).length) return; // нет pending — отмена транзакции
    cur.stock = cur.stock || {};
    Object.entries(pend).forEach(([k,v])=>{
      if(typeof v === 'number' && v > 0) cur.stock[k] = (cur.stock[k]||0) + v;
    });
    cur.pending_stock = {};
    return cur;
  }).then(result => {
    if(!result.committed) {
      alert('Нечего принимать или произошла ошибка.');
      return;
    }
    // Лог: запись о приёмке
    const data = allData[enc(loc)] || {};
    const accepted = data?.pending_stock || {};
    const names={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
    const noteLines = Object.entries(accepted).filter(([,v])=>v>0).map(([k,v])=>`${names[k]||k}: +${v}`).join(', ');
    addLog({type:'stock_in', note:`Принято на смене: ${noteLines || 'товар'}`}, loc);
    alert('✓ Товар принят на склад');
  }).catch(e => {
    console.error('Ошибка приёмки:', e);
    alert('Ошибка приёмки: ' + e.message);
  });
}
window.acceptPending = acceptPending;

function renderLog() {
  const tbody=document.getElementById('log-tbody'); if(!tbody) return;
  const filter=document.getElementById('log-filter')?.value||'all';
  const locF=document.getElementById('log-loc-filter')?.value||'all';
  const dateF=document.getElementById('log-date-filter')?.value||'today';
  const isOwner=CU?.role==='owner';
  let entries=[];
  if(isOwner) {
    Object.entries(allData).forEach(([lk,ld])=>{
      const ln=LOCS.find(l=>enc(l)===lk)||lk;
      Object.values(ld?.log||{}).forEach(e=>entries.push({...e,_loc:ln}));
    });
  } else entries=Object.values(locData?.log||{});
  entries.sort((a,b)=>tsOf(b)-tsOf(a));
  // v14: фильтр по дате через dayKey (MSK)
  if(dateF==='today') {
    const tk = todayKey();
    entries=entries.filter(e=>dayKey(tsOf(e))===tk);
  } else if(dateF==='yesterday') {
    const yk = yesterdayKey();
    entries=entries.filter(e=>dayKey(tsOf(e))===yk);
  } else if(dateF==='week') {
    const cutoff = Date.now() - 7*24*60*60*1000;
    entries=entries.filter(e=>tsOf(e)>=cutoff);
  }
  // 'all' — без фильтрации по дате
  const prizeTypes=['toy','key_given','toy_small','toy_big','duck_prize','ball_prize'];
  if(filter==='prize') entries=entries.filter(e=>prizeTypes.includes(e.type));
  else if(filter==='own') entries=entries.filter(e=>e.type==='own_game');
  else if(filter==='cancel') entries=entries.filter(e=>e.type==='cancel');
  else if(filter==='shift') entries=entries.filter(e=>e.type?.startsWith('shift'));
  else if(filter==='stock') entries=entries.filter(e=>['stock_in','stock_out','inventory','balls_update'].includes(e.type));
  else if(filter==='payment') entries=entries.filter(e=>e.type==='payment');
  if(locF!=='all') entries=entries.filter(e=>(e._loc||e.loc)===locF);
  const empty=document.getElementById('log-empty');
  if(!entries.length){tbody.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  const cls={toy:'td-toy',key_given:'td-key',toy_small:'td-toy',toy_big:'td-big',duck_prize:'td-toy',ball_prize:'td-big',own_game:'td-own',cancel:'td-cancel',shift_open:'td-shift',shift_close:'td-shift',payment:'td-pay'};
  tbody.innerHTML=entries.map(e=>`<tr>
    <td class="td-time">${fmtTime(e.ts)}</td>
    <td class="td-dim">${fmtDate(e.ts)}</td>
    <td class="${cls[e.type]||''}">${typeLabel(e.type)}</td>
    ${isOwner?`<td class="td-dim">${e._loc||e.loc||''}</td><td class="td-dim">${e.op||''}</td>`:''}
    <td class="td-dim" style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(e.note||'').replace(/\{[^}]+\}/g,'')}</td>
  </tr>`).join('');
}
window.renderLog=renderLog;

// v17: вспомогательная функция — собирает смены за выбранный день для одной точки.
// Возвращает массив объектов: [{kind:'open'|'closed', tsOpen, tsClose, op, inv, disc, openCounters, closeCounters}]
// Если за день не было активности — пустой массив.
function shiftsForDayLoc(loc, day) {
  const data = allData[enc(loc)] || {};
  const log = Object.values(data?.log || {});
  const dk = resolveDay(day);
  // События shift_open и shift_close за выбранный день, отсортированы по времени
  const events = log
    .filter(e => (e.type==='shift_open' || e.type==='shift_close') && dayKey(tsOf(e))===dk)
    .sort((a,b)=>tsOf(a)-tsOf(b));
  const isToday = (dk === todayKey());
  const shiftActive = isToday && !!data?.shift?.open;

  // Группируем парами open→close.
  const result = [];
  let pendingOpen = null;
  for(const ev of events) {
    if(ev.type === 'shift_open') {
      pendingOpen = ev;
    } else if(ev.type === 'shift_close') {
      if(pendingOpen) {
        const closeTs = tsOf(ev);
        const inv = log.find(e => e.type==='inventory' && Math.abs(tsOf(e)-closeTs)<5000);
        const disc = log.find(e => e.type==='inventory_discrepancy' && Math.abs(tsOf(e)-closeTs)<5000);
        // v19: ищем запись counters в пределах 5 сек от закрытия
        const ctr = log.find(e => e.type==='counters' && Math.abs(tsOf(e)-closeTs)<5000);
        result.push({
          kind: 'closed',
          shiftId: tsOf(pendingOpen), // v33: добавлено для openInlinePay
          tsOpen: tsOf(pendingOpen),
          tsClose: closeTs,
          op: pendingOpen.op || '',
          inv: inv ? parseInventoryNote(inv.note||'') : null,
          disc: disc ? (()=>{ try{return JSON.parse(disc.discrepancies||'{}');}catch(e){return {};} })() : {},
          // v19: счётчики автоматов
          openCounters: pendingOpen.openCounters || null,
          closeCounters: ctr?.values || null,
        });
        pendingOpen = null;
      }
    }
  }
  // Незакрытая активная смена
  if(pendingOpen) {
    result.push({
      kind: 'open',
      shiftId: tsOf(pendingOpen), // v33: добавлено для openInlinePay
      tsOpen: tsOf(pendingOpen),
      tsClose: null,
      op: pendingOpen.op || '',
      inv: null,
      disc: {},
      openCounters: pendingOpen.openCounters || null,
      closeCounters: null,
    });
  }
  return result;
}

function renderOverview() {
  const tbody=document.getElementById('ov-tbody'); if(!tbody) return;
  const titleEl=document.getElementById('ov-title');
  if(titleEl) titleEl.textContent=`Все точки — ${dayLabel(ownerDay)}`;

  const rowsHtml = [];
  LOCS.forEach(loc => {
    const data = allData[enc(loc)] || {};
    const shifts = shiftsForDayLoc(loc, ownerDay);

    if(!shifts.length) {
      rowsHtml.push(`<tr class="ov-row-none" onclick="switchOwLoc('${loc.replace(/'/g,"\\'")}',null)">
        <td style="font-weight:700">${loc}</td>
        <td colspan="7" style="color:var(--dim)">смены не было</td>
      </tr>`);
      return;
    }

    // v28: каждая смена обрабатывается независимо
    shifts.forEach((sh, idx) => {
      const rowKey = `${loc}|${sh.tsOpen}`;
      const expanded = ovExpandedKey === rowKey;
      let rowClass = '';

      // v28: оплаты для ЭТОЙ смены
      const pay = paymentsForShift(data, sh.shiftId, sh);
      // v28: призы и свои игры именно за период этой смены
      const prizesShift = prizesForShift(data, sh);
      const ownGamesShift = ownGamesForShift(data, sh);

      // Платные игры за смену
      let paidGamesNum = null;
      let paidGamesCell = '<span style="color:var(--dim)">—</span>';
      if(isTir(loc) && sh.openCounters) {
        let totalGames = 0;
        if(sh.closeCounters) {
          Object.keys(sh.closeCounters).forEach(m => {
            const opn = sh.openCounters[m];
            const cls = sh.closeCounters[m];
            if(typeof opn === 'number' && typeof cls === 'number') {
              totalGames += Math.max(0, cls - opn);
            }
          });
        } else if(sh.kind === 'open' && data?.counters) {
          // Активная смена — дельта от утра до сейчас
          Object.entries(data.counters).forEach(([m, c]) => {
            const opn = sh.openCounters[m];
            const cur = c?.prev;
            if(typeof opn === 'number' && typeof cur === 'number') {
              totalGames += Math.max(0, cur - opn);
            }
          });
        }
        const paid = Math.max(0, totalGames - ownGamesShift);
        paidGamesCell = `${paid}`;
        paidGamesNum = paid;
      } else if(isBall(loc)) {
        // v30: платные игры = только ball_prize. own_game НЕ вычитаем — это
        // отдельные записи, не платная игра.
        const log = Object.values(data?.log||{});
        const inShift = e => {
          const ts = tsOf(e);
          if(ts < sh.tsOpen) return false;
          if(sh.tsClose && ts > sh.tsClose) return false;
          return true;
        };
        const paid = log.filter(e => e.type==='ball_prize' && inShift(e)).length;
        paidGamesCell = `${paid}`;
        paidGamesNum = paid;
      } else if(isDuck(loc)) {
        // v30: на Уточках своей игры нет — платные = duck_prize напрямую
        const log = Object.values(data?.log||{});
        const inShift = e => {
          const ts = tsOf(e);
          if(ts < sh.tsOpen) return false;
          if(sh.tsClose && ts > sh.tsClose) return false;
          return true;
        };
        const paid = log.filter(e => e.type==='duck_prize' && inShift(e)).length;
        paidGamesCell = `${paid}`;
        paidGamesNum = paid;
      }

      const price = priceForLoc(loc);
      let statusCell, timeCell, kassaCell, prizesCell, igryCell, raschCell;

      if(sh.kind === 'open') {
        rowClass = 'ov-row-open';
        statusCell = `<span style="color:var(--green);font-weight:700">🟢 откр.</span>`;
        timeCell = fmtTimeShort(sh.tsOpen);
        // Касса для смены (даже открытой — если уже введена частично)
        if(pay !== null) {
          const sum = pay * price;
          kassaCell = price > 0
            ? `${pay}<br><span style="font-size:11px;color:var(--dim)">${sum} ₽</span>`
            : `${pay}`;
        } else {
          kassaCell = `<span style="color:var(--dim)">—</span>`;
        }
        prizesCell = prizesShift;
        igryCell = paidGamesCell;
        raschCell = `<span style="color:var(--dim)">—</span>`;
      } else {
        // closed
        const hasDisc = Object.keys(sh.disc).length > 0;
        const kassaMissing = pay === null;
        const kassaOk = pay !== null;
        if(kassaMissing) {
          kassaCell = `<span style="color:var(--red);font-weight:700">? нет</span>`;
        } else {
          const sum = pay * price;
          kassaCell = price > 0
            ? `${pay}<br><span style="font-size:11px;color:var(--dim)">${sum} ₽</span>`
            : `${pay}`;
        }
        prizesCell = prizesShift;
        igryCell = paidGamesCell;

        if(hasDisc) {
          const lblsShort = {toy_small:'🧸', toy_big:'🎁', key:'🔑', balls_strike:'🔵', balls_air:'🎈'};
          const items = Object.entries(sh.disc).map(([k,v])=>`${lblsShort[k]||k}${v.diff>0?'+':''}${v.diff}`);
          raschCell = `<span style="color:var(--red);font-weight:700">${items.join(' ')}</span>`;
        } else {
          raschCell = `<span style="color:var(--green);font-weight:700">✓</span>`;
        }
        // v28: касса не сходится с играми — красная
        const kassaGamesMismatch = (kassaOk && paidGamesNum !== null && pay !== paidGamesNum);
        if(hasDisc || kassaMissing || kassaGamesMismatch) rowClass = 'ov-row-bad';
        else rowClass = 'ov-row-ok';

        statusCell = `<span style="color:var(--text2);font-weight:700">⚪ закр.</span>`;
        timeCell = `${fmtTimeShort(sh.tsOpen)}→${fmtTimeShort(sh.tsClose)}`;
      }

      rowsHtml.push(`<tr class="${rowClass}" onclick="toggleOvRow('${rowKey.replace(/'/g,"\\'")}')">
        <td style="font-weight:700">${idx===0 ? loc : ''}</td>
        <td>${statusCell}</td>
        <td style="font-size:12px">${timeCell}</td>
        <td style="font-size:12px">${sh.op}</td>
        <td>${kassaCell}</td>
        <td>${prizesCell}</td>
        <td>${igryCell}</td>
        <td style="font-size:12px">${raschCell}</td>
      </tr>`);

      if(expanded) {
        rowsHtml.push(`<tr class="ov-detail-row"><td colspan="8">${buildOvRowDetail(loc, sh, pay, prizesShift, true)}</td></tr>`);
      }
    });
  });

  tbody.innerHTML = rowsHtml.join('');
  updatePayBlockForDay();
  renderOvWarns();
}

// v17: построить детальный текст для раскрытой строки
// v23: возвращает массив строк с разбивкой призов по типам для точки
function prizeBreakdownLines(loc, data, day) {
  const lines = [];
  if(isTir(loc)) {
    const toys = countTypeDay(data, day, 'toy', 'toy_small');
    const keysGiven = countTypeDay(data, day, 'key_given');
    if(toys > 0) lines.push(`  🧸 Игрушек: ${toys}`);
    if(keysGiven > 0) lines.push(`  🔑 Брелков (выдано вручную): ${keysGiven}`);
    // Брелки в Тире списываются автоматически — но если оператор всё же выдавал кнопкой, покажем
  } else if(isBall(loc)) {
    // Шарики: ball_prize с разными prize-полями
    const log = logForDay(data, day);
    const big = log.filter(e => e.type === 'ball_prize' && e.prize === 'toy_big').length;
    const small = log.filter(e => e.type === 'ball_prize' && e.prize === 'toy_small').length;
    const keys = log.filter(e => e.type === 'ball_prize' && e.prize === 'key').length;
    if(big > 0) lines.push(`  🎁 Больших: ${big}`);
    if(small > 0) lines.push(`  🧸 Маленьких: ${small}`);
    if(keys > 0) lines.push(`  🔑 Брелков: ${keys}`);
  } else if(isDuck(loc)) {
    const ducks = countTypeDay(data, day, 'duck_prize');
    if(ducks > 0) lines.push(`  🧸 Призов: ${ducks}`);
  }
  return lines;
}

// v36: отчёт смены строго по ARCADA_FINAL_SPEC.
// Порядок блоков:
//   ТИР:    Касса → Счётчики → Призы → Сверка касса/игры → Сверка склада → Проблемы
//   ШАРИКИ: Касса → Игры     → Призы → Сверка касса/игры → Сверка склада → Проблемы
//   УТОЧКИ: Касса → Игры     → Призы → Сверка касса/игры → Сверка склада → Проблемы
function buildOvRowDetail(loc, sh, pay, prizesShift, isLast) {
  const data = allData[enc(loc)] || {};
  const lblsShort = {toy_small:'🧸 Маленькие', toy_big:'🎁 Большие', key:'🔑 Брелки', balls_strike:'🔵 Шары страйкбольные', balls_air:'🎈 Шары надувные'};
  const lblsLong  = {toy_small:'🧸 Маленькие игрушки', toy_big:'🎁 Большие игрушки', key:'🔑 Брелки', balls_strike:'🔵 Шары страйкбольные', balls_air:'🎈 Шары надувные'};
  const lines = [];
  const ownGamesShift = ownGamesForShift(data, sh);
  const price = priceForLoc(loc);
  const log = Object.values(data?.log || {});
  const inShift = e => {
    const ts = tsOf(e);
    if(ts < sh.tsOpen) return false;
    if(sh.tsClose && ts > sh.tsClose) return false;
    return true;
  };

  // Заголовок
  if(sh.kind === 'open') {
    lines.push(`Открыта в ${fmtTimeShort(sh.tsOpen)} · ${sh.op}`);
  } else {
    lines.push(`Открыта ${fmtTimeShort(sh.tsOpen)} · ${sh.op}`);
    lines.push(`Закрыта ${fmtTimeShort(sh.tsClose)}`);
  }

  // 1. КАССА — с inline-формой ввода/изменения
  lines.push('');
  lines.push('═══ КАССА ═══');
  const locArg = loc.replace(/'/g,"\\'");
  const isEditing = (window.editingPayShiftId === sh.shiftId);
  if(isEditing) {
    // Inline-форма: поле + Применить + Отмена
    const initVal = pay !== null ? pay : '';
    lines.push(`  Оплат через KitPos: <input type="number" id="inline-pay-input" min="0" inputmode="numeric" value="${initVal}" style="width:80px;padding:4px 8px;border:1.5px solid var(--gold);border-radius:4px;font-size:14px;font-weight:700;text-align:center"> <button onclick="confirmInlinePay('${locArg}',${sh.shiftId})" style="font-size:11px;padding:3px 10px;background:var(--green);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;margin-left:4px">✓ Применить</button> <button onclick="cancelInlinePay()" style="font-size:11px;padding:3px 10px;background:var(--card2);color:var(--text2);border:1.5px solid var(--border);border-radius:4px;cursor:pointer;font-weight:700;margin-left:4px">✕ Отмена</button>`);
  } else {
    const editLbl = pay !== null ? '✏ Изменить' : '✏ Ввести';
    const payBtn = `<button onclick="openInlinePay('${locArg}',${sh.shiftId})" style="margin-left:8px;font-size:11px;padding:3px 10px;background:var(--gold);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700">${editLbl}</button>`;
    if(pay !== null) {
      lines.push(`  Оплат через KitPos: ${pay} ${payBtn}`);
      if(price > 0) {
        lines.push(`  Цена игры: ${price} ₽`);
        lines.push(`  Выручка: ${pay * price} ₽`);
      } else {
        lines.push(`  (цена не задана — задайте в настройках)`);
      }
    } else if(sh.kind === 'open') {
      lines.push(`  Оплат через KitPos: пока не введены ${payBtn}`);
    } else {
      lines.push(`  Оплат через KitPos: ⚠ не введены ${payBtn}`);
    }
  }

  // Подсчёты, нужны для следующих блоков
  const stockNow = data?.stock || {};
  const openStock = data?.shift?.openStock || {};
  let shiftOpenStock = {...openStock};
  if(sh.kind === 'closed') {
    const openEvent = log.find(e => e.type==='shift_open' && tsOf(e) === sh.tsOpen);
    if(openEvent && openEvent.openStock) shiftOpenStock = {...openEvent.openStock};
  }
  // Учёт приёмок во время смены
  const stockInsInShift = log.filter(e => e.type === 'stock_in' && inShift(e));
  const incomingMap = {};
  const noteToKey = {
    'Маленьких': 'toy_small', 'Больших': 'toy_big', 'Брелков': 'key',
    'Шаров страйкб.': 'balls_strike', 'Шаров надув.': 'balls_air',
  };
  stockInsInShift.forEach(e => {
    const note = e.note || '';
    Object.entries(noteToKey).forEach(([rus, key]) => {
      const re = new RegExp(rus.replace('.','\\.') + ':\\s*\\+?(\\d+)');
      const m = note.match(re);
      if(m) incomingMap[key] = (incomingMap[key]||0) + parseInt(m[1]);
    });
  });
  Object.entries(incomingMap).forEach(([k,v])=>{
    shiftOpenStock[k] = (shiftOpenStock[k]||0) + v;
  });

  // Подсчёт игр и призов
  let totalGamesByCounters = 0;
  if(isTir(loc) && sh.openCounters) {
    if(sh.kind === 'closed' && sh.closeCounters) {
      [1,2,3,4].forEach(m => {
        const opn = sh.openCounters[m];
        const cls = sh.closeCounters[m];
        if(typeof opn === 'number' && typeof cls === 'number') {
          totalGamesByCounters += Math.max(0, cls - opn);
        }
      });
    } else if(sh.kind === 'open' && data?.counters) {
      [1,2,3,4].forEach(m => {
        const opn = sh.openCounters[m];
        const cur = data.counters[m]?.prev;
        if(typeof opn === 'number' && typeof cur === 'number') {
          totalGamesByCounters += Math.max(0, cur - opn);
        }
      });
    }
  }
  const tirToys  = log.filter(e => (e.type==='toy' || e.type==='toy_small') && inShift(e)).length;
  const ballBig   = log.filter(e => e.type==='ball_prize' && e.prize==='toy_big'   && inShift(e)).length;
  const ballSmall = log.filter(e => e.type==='ball_prize' && e.prize==='toy_small' && inShift(e)).length;
  const ballKey   = log.filter(e => e.type==='ball_prize' && e.prize==='key'       && inShift(e)).length;
  const ballPlays = ballBig + ballSmall + ballKey;
  const duckPlays = log.filter(e => e.type==='duck_prize' && inShift(e)).length;
  // Платные игры:
  let paidGames = null;
  if(isTir(loc)) {
    paidGames = totalGamesByCounters > 0 ? Math.max(0, totalGamesByCounters - ownGamesShift) : null;
  } else if(isBall(loc)) {
    paidGames = ballPlays;
  } else if(isDuck(loc)) {
    paidGames = duckPlays;
  }
  // Расчётные брелки в Тире
  let tirKeysCalc = null;
  if(isTir(loc) && pay !== null) {
    tirKeysCalc = Math.max(0, pay - tirToys);
  }

  // 2. (для Тира) СЧЁТЧИКИ АВТОМАТОВ
  if(isTir(loc) && sh.openCounters) {
    const ctrLines = [];
    if(sh.kind === 'closed' && sh.closeCounters) {
      [1,2,3,4].forEach(m => {
        const opn = sh.openCounters[m];
        const cls = sh.closeCounters[m];
        if(typeof opn === 'number' && typeof cls === 'number') {
          const d = Math.max(0, cls - opn);
          ctrLines.push(`  Автомат ${m}: ${opn} → ${cls}  (+${d} игр${d>0?` = ${d*20} шаров`:''})`);
        }
      });
    } else if(sh.kind === 'open' && data?.counters) {
      [1,2,3,4].forEach(m => {
        const opn = sh.openCounters[m];
        const cur = data.counters[m]?.prev;
        if(typeof opn === 'number' && typeof cur === 'number') {
          const d = Math.max(0, cur - opn);
          ctrLines.push(`  Автомат ${m}: ${opn} → ${cur}  (+${d} игр${d>0?` = ${d*20} шаров`:''})`);
        }
      });
    }
    if(ctrLines.length) {
      lines.push('');
      lines.push('═══ СЧЁТЧИКИ АВТОМАТОВ ═══');
      ctrLines.forEach(l => lines.push(l));
      lines.push(`  Всего игр (по счётчикам): ${totalGamesByCounters}`);
      lines.push(`  Свои игры: ${ownGamesShift}`);
      lines.push(`  Платные игры: ${Math.max(0, totalGamesByCounters - ownGamesShift)}`);
    }
  }

  // 2. (для Шариков/Уточек) ИГРЫ
  if(isBall(loc) || isDuck(loc)) {
    lines.push('');
    lines.push('═══ ИГРЫ ═══');
    const plays = isBall(loc) ? ballPlays : duckPlays;
    lines.push(`  Платных игр: ${plays}`);
    if(ownGamesShift > 0) lines.push(`  Свои игры: ${ownGamesShift}`);
    lines.push(`  Всего: ${plays + ownGamesShift}`);
  }

  // 3. ПРИЗЫ ВЫДАНО
  lines.push('');
  lines.push('═══ ПРИЗЫ ВЫДАНО ═══');
  if(isTir(loc)) {
    lines.push(`  🧸 Игрушек: ${tirToys}`);
    if(tirKeysCalc !== null) {
      lines.push(`  🔑 Брелков (расчёт): ${tirKeysCalc}`);
      lines.push(`  Всего призов клиентам: ${tirToys + tirKeysCalc}`);
    } else {
      lines.push(`  🔑 Брелков (расчёт): — (касса не введена)`);
      lines.push(`  Всего призов клиентам: ${tirToys}+ (без брелков пока)`);
    }
  } else if(isBall(loc)) {
    lines.push(`  🎁 Большие: ${ballBig}`);
    lines.push(`  🧸 Маленькие: ${ballSmall}`);
    lines.push(`  🔑 Брелки: ${ballKey}`);
    lines.push(`  Всего призов: ${ballPlays}`);
  } else if(isDuck(loc)) {
    lines.push(`  🧸 Маленькие игрушки: ${duckPlays}`);
  }

  // 4. СВЕРКА КАССА / ИГРЫ
  const probs = [];
  if(pay !== null && paidGames !== null) {
    const diff = pay - paidGames;
    lines.push('');
    lines.push('═══ СВЕРКА КАССА / ИГРЫ ═══');
    lines.push(`  Оплат: ${pay}`);
    lines.push(`  Платных игр: ${paidGames}`);
    if(diff === 0) {
      lines.push(`  ✓ Совпадает`);
    } else if(diff > 0) {
      lines.push(`  ⚠ Оплат на ${diff} больше — что-то не так`);
      probs.push(`⚠ Оплат на ${diff} больше чем платных игр`);
    } else {
      lines.push(`  ⚠ Игр на ${-diff} больше чем оплат — играли бесплатно?`);
      probs.push(`⚠ Не оплачено ${-diff} игр`);
    }
  }

  // 5. СВЕРКА СКЛАДА
  // Расход по позициям
  const spent = {};
  if(isTir(loc)) {
    spent.toy_small = tirToys;
    spent.key = tirKeysCalc; // null если касса не введена
    // Шары: max((платные+свои)×20, (toys+брелки+свои)×20)
    const paidT = paidGames !== null ? paidGames : 0;
    const byCounters = (paidT + ownGamesShift) * 20;
    const keysN = (tirKeysCalc !== null) ? tirKeysCalc : 0;
    const byPrizes = (tirToys + keysN + ownGamesShift) * 20;
    spent.balls_strike = Math.max(byCounters, byPrizes);
  } else if(isBall(loc)) {
    spent.toy_big = ballBig;
    spent.toy_small = ballSmall;
    spent.key = ballKey;
    let ballsSum = 0;
    log.forEach(e => {
      if(!inShift(e)) return;
      if(e.type==='ball_prize' || e.type==='own_game') {
        if(typeof e.balls === 'number') ballsSum += e.balls;
      }
    });
    spent.balls_air = ballsSum;
  } else if(isDuck(loc)) {
    spent.toy_small = duckPlays;
  }

  const ballKeys = ['balls_strike','balls_air'];
  const tolerancePct = {balls_strike: 0.10, balls_air: 0.15};
  const items = LOC_ITEMS[loc] || [];

  if(items.length) {
    lines.push('');
    lines.push('═══ СВЕРКА СКЛАДА ═══');
    items.forEach(k => {
      const startVal = shiftOpenStock[k];
      const sp = spent[k];
      const factVal = sh.kind === 'closed'
        ? (sh.inv && sh.inv[k] !== undefined ? sh.inv[k] : null)
        : (stockNow[k] !== undefined ? stockNow[k] : null);
      const isBallItem = ballKeys.includes(k);
      const lbl = isBallItem ? lblsLong[k] : (isBall(loc) ? lblsShort[k] : lblsLong[k]);

      // Однострочный формат для не-шаров в Шариках/Уточках
      if(!isBallItem && (isBall(loc) || isDuck(loc))) {
        let line = `${lbl}: было ${startVal !== undefined ? startVal : '—'} → `;
        if(factVal !== null) {
          line += `${factVal}`;
          if(startVal !== undefined && sp !== null && sp !== undefined) {
            const expected = Math.max(0, startVal - sp);
            const diff = factVal - expected;
            if(diff === 0) {
              line += ' ✓';
            } else {
              line += ` ⚠ ${diff>0?'+':''}${diff} (должно ${expected})`;
              probs.push(`⚠ ${lbl}: расхождение ${diff>0?'+':''}${diff}`);
            }
          }
        } else if(sh.kind === 'closed') {
          line += '⚠ не указано';
        } else {
          line += `${stockNow[k] !== undefined ? stockNow[k] : '—'}`;
        }
        lines.push(line);
        return;
      }

      // Развёрнутый формат для Тира + для шаров
      lines.push('');
      lines.push(`${lbl}:`);
      const incoming = incomingMap[k] || 0;
      if(incoming > 0) {
        const startBase = (openStock[k] !== undefined) ? openStock[k] :
                          ((sh.kind === 'closed') ? (log.find(e=>e.type==='shift_open'&&tsOf(e)===sh.tsOpen)?.openStock?.[k] || 0) : 0);
        lines.push(`  Было на старте: ${startBase} + ${incoming} принято = ${startVal}`);
      } else {
        lines.push(`  Было на старте: ${startVal !== undefined ? startVal : '—'}`);
      }

      if(isTir(loc) && k === 'key') {
        if(sp === null) {
          lines.push(`  Должно быть выдано: — (касса не введена)`);
        } else {
          lines.push(`  Должно быть выдано: max(0, ${pay} − ${tirToys}) = ${sp}`);
        }
      } else if(isBallItem) {
        if(k === 'balls_strike') {
          const paidT = paidGames !== null ? paidGames : 0;
          const byCnt = (paidT + ownGamesShift) * 20;
          const keysN = (tirKeysCalc !== null) ? tirKeysCalc : 0;
          const byPrz = (tirToys + keysN + ownGamesShift) * 20;
          if(byCnt >= byPrz) {
            lines.push(`  Расход: (${paidT} + ${ownGamesShift}) × 20 = ${sp}`);
          } else {
            lines.push(`  Расход (по призам): (${tirToys} 🧸 + ${keysN} 🔑 + ${ownGamesShift} 🎮) × 20 = ${sp}`);
          }
        } else {
          lines.push(`  Расход (сумма balls): ${sp}`);
        }
      } else {
        lines.push(`  Выдано (по записям): ${sp || 0}`);
      }

      const expectedRemain = (startVal !== undefined && sp !== null && sp !== undefined)
        ? Math.max(0, startVal - sp)
        : null;
      lines.push(`  Должно остаться: ${expectedRemain !== null ? expectedRemain : '—'}`);

      if(factVal !== null) {
        const factLbl = sh.kind === 'closed' ? 'По инвентаризации' : 'Сейчас на складе';
        lines.push(`  ${factLbl}: ${factVal}`);
        if(expectedRemain !== null) {
          const diff = factVal - expectedRemain;
          if(isBallItem) {
            const tol = Math.ceil(sp * tolerancePct[k]);
            if(Math.abs(diff) <= tol) {
              lines.push(`  ✓ В пределах нормы (${diff>=0?'+':''}${diff}, допуск ±${tol})`);
            } else {
              lines.push(`  ⚠ Превышен допуск: ${diff>=0?'+':''}${diff} (допуск ±${tol})`);
              probs.push(`⚠ ${lbl}: расход вне допуска (${diff>=0?'+':''}${diff})`);
            }
          } else {
            if(diff === 0) {
              lines.push(`  ✓ Совпадает`);
            } else {
              lines.push(`  ⚠ Расхождение ${diff>0?'+':''}${diff}`);
              probs.push(`⚠ ${lbl}: расхождение ${diff>0?'+':''}${diff}`);
            }
          }
        }
      } else if(sh.kind === 'closed') {
        lines.push(`  По инвентаризации: ⚠ не указано`);
      }
    });
  }

  // Проблемы
  if(sh.kind === 'closed' && pay === null) probs.push('⚠ Касса не введена владельцем');

  lines.push('');
  lines.push('═══ ПРОБЛЕМЫ ═══');
  if(probs.length) {
    probs.forEach(p => lines.push(`  ${p}`));
  } else {
    lines.push('  (нет)');
  }

  return lines.join('\n');
}

// v17: клик на строку — раскрыть/свернуть деталь
function toggleOvRow(key) {
  // v18: ключ формата "loc|tsOpen". Извлекаем loc и tsOpen.
  const parts = (key||'').split('|');
  const loc = parts[0];
  const tsOpen = parts[1] ? parseInt(parts[1]) : null;
  if(loc && LOCS.includes(loc)) {
    ownerLoc = loc;
    // v28: автоматически выбираем эту смену в форме оплат
    if(tsOpen) ownerShiftId = tsOpen;
    updatePayBlockForDay();
  }
  ovExpandedKey = (ovExpandedKey === key) ? null : key;
  renderOverview();
}

function renderOvWarns() {
  const el=document.getElementById('ow-warns'); if(!el) return;
  const warns=[];

  // v25/v29: малые остатки — только для релевантных позиций точки
  // и только если на точке за выбранный день была активность.
  // Малые остатки — это остатки СЕЙЧАС, поэтому показываем только когда
  // точка реально работает в выбранный день.
  LOCS.forEach(l=>{
    const data = allData[enc(l)]||{};
    const s = data?.stock || {};
    const allowedItems = LOC_ITEMS[l] || [];
    // v29: активность за ВЫБРАННЫЙ день (а не за сегодня)
    const hadActivity = logForDay(data, ownerDay).length > 0;
    if(!hadActivity) return;
    // Проверяем только релевантные позиции
    if(allowedItems.includes('toy_small') && s.toy_small!==undefined && s.toy_small<=3) {
      warns.push({cls:'red',text:`⚠ ${l}: мало маленьких игрушек (${s.toy_small} шт)`});
    }
    if(allowedItems.includes('toy_big') && s.toy_big!==undefined && s.toy_big<=3) {
      warns.push({cls:'red',text:`⚠ ${l}: мало больших игрушек (${s.toy_big} шт)`});
    }
    if(allowedItems.includes('key') && s.key!==undefined && s.key<=10) {
      warns.push({cls:'red',text:`⚠ ${l}: мало брелков (${s.key} шт)`});
    }
  });

  // v15.2 #6: расхождения склада за выбранный день (либо за сегодня)
  const checkDay = ownerDay; // null=сегодня
  LOCS.forEach(l=>{
    const data=allData[enc(l)]||{};
    const discEntries=logForDay(data, checkDay).filter(e=>e.type==='inventory_discrepancy');
    if(discEntries.length>0) {
      // Берём последнее (на случай нескольких закрытий)
      discEntries.sort((a,b)=>tsOf(b)-tsOf(a));
      const last=discEntries[0];
      // Парсим discrepancies из JSON
      let summary='';
      try {
        const d=JSON.parse(last.discrepancies||'{}');
        const lbls={toy_small:'🧸 маленьких',toy_big:'🎁 больших',key:'🔑 брелков',balls_strike:'🔵 шаров',balls_air:'🎈 шаров надув.'};
        summary=Object.entries(d).map(([k,v])=>`${lbls[k]||k} ${v.diff>0?'+':''}${v.diff}`).join(', ');
      } catch(e) { summary=last.note||'есть расхождение'; }
      warns.push({cls:'red',text:`⚠ ${l}: расхождение склада ${dayLabel(checkDay)} — ${summary}`});
    }
  });

  // v15.2 #7: не внесены оплаты за прошлые дни (вчера и позавчера)
  // Проверяем 2 прошлых дня — если за день была закрыта смена, но оплат нет
  const checkPastDays = [yesterdayKey()];
  // Позавчера тоже добавим
  const dayBeforeYesterday = dayKey(Date.now() - 2*24*60*60*1000);
  checkPastDays.push(dayBeforeYesterday);
  checkPastDays.forEach(dk => {
    LOCS.forEach(l=>{
      const data=allData[enc(l)]||{};
      // Была ли в этот день смена (есть ли любая активность в логе)
      const dayEntries=logForDay(data, dk);
      const hadShift=dayEntries.some(e=>e.type==='shift_open');
      if(!hadShift) return; // смены не было — не требуем оплат
      // Есть ли оплаты за тот день
      // v29: используем новую функцию которая суммирует payments по сменам
      // (учитывает записи с shiftId, по времени, и старый узел payments)
      const pay = paymentsForDayBySumOfShifts(data, dk);
      if(pay===null) {
        warns.push({cls:'gold',text:`💳 ${l}: не внесены оплаты за ${dayLabel(dk)}`});
      }
    });
  });

  el.innerHTML=warns.map(w=>{
    const colors=w.cls==='gold'
      ? 'background:var(--gold-bg);border:1.5px solid var(--gold);color:var(--gold)'
      : 'background:var(--red-bg);border:1.5px solid #f0b0a8;color:var(--red)';
    return `<div style="${colors};border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;margin-bottom:10px">${w.text}</div>`;
  }).join('');
}
