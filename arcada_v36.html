// Возвращает [tsStart, tsEnd] для текущего invPeriod
function invPeriodRange() {
  const now = Date.now();
  const startOfToday = new Date(); startOfToday.setHours(0,0,0,0);
  if(invPeriod==='today') {
    return [startOfToday.getTime(), now];
  }
  if(invPeriod==='week') {
    return [now - 7*24*60*60*1000, now];
  }
  if(invPeriod==='month') {
    return [now - 30*24*60*60*1000, now];
  }
  if(invPeriod==='range' && invRangeFrom && invRangeTo) {
    // Парсим YYYY-MM-DD в начало и конец дня
    const [y1,m1,d1] = invRangeFrom.split('-').map(Number);
    const [y2,m2,d2] = invRangeTo.split('-').map(Number);
    const from = new Date(y1, m1-1, d1, 0, 0, 0).getTime();
    const to   = new Date(y2, m2-1, d2, 23, 59, 59).getTime();
    return [from, to];
  }
  return [startOfToday.getTime(), now];
}

// Собирает все инвентаризации (закрытия смен) за период по всем точкам.
// Связывает inventory + inventory_discrepancy по близкому ts.
function collectInventories() {
  const [tsFrom, tsTo] = invPeriodRange();
  const result = [];
  LOCS.forEach(loc=>{
    const data = allData[enc(loc)] || {};
    const log = Object.values(data?.log || {});
    // Все события inventory за период
    const inventories = log.filter(e =>
      e.type === 'inventory' &&
      tsOf(e) >= tsFrom &&
      tsOf(e) <= tsTo
    );
    inventories.forEach(inv => {
      const invTs = tsOf(inv);
      // Парсим фактические остатки из note: "Инвентаризация: 🧸 Маленьких: 45, ..."
      // Лучше использовать stock из shift_close или из данных
      const factual = parseInventoryNote(inv.note || '');
      // Ищем близкое inventory_discrepancy (в пределах 5 секунд)
      const disc = log.find(e =>
        e.type === 'inventory_discrepancy' &&
        Math.abs(tsOf(e) - invTs) < 5000
      );
      let discrepancies = {};
      if(disc) {
        try { discrepancies = JSON.parse(disc.discrepancies || '{}'); }
        catch(e) {}
      }
      // Ищем shift_open за тот же день чтобы определить оператора
      const dayK = dayKey(invTs);
      // v15.3 fix: ищем shift_open за тот же день который БЫЛ ДО этой инвентаризации
      // (а не последний за день — иначе может попасть shift_open следующей смены того же дня)
      const opener = log
        .filter(e => e.type==='shift_open' && dayKey(tsOf(e))===dayK && tsOf(e) <= invTs)
        .sort((a,b)=>tsOf(b)-tsOf(a))[0];
      const operator = opener?.op || inv.op || '';

      result.push({
        ts: invTs,
        loc,
        operator,
        factual,
        discrepancies,
        hasDiscrepancy: Object.keys(discrepancies).length > 0,
        rawInv: inv,
        rawDisc: disc
      });
    });
  });
  result.sort((a,b)=>b.ts-a.ts);
  return result;
}

// Парсим note "Инвентаризация: 🧸 Маленьких: 45, 🔑 Брелков: 230, ..."
// → {toy_small:45, key:230, ...}
function parseInventoryNote(note) {
  const result = {};
  const map = {
    'Маленьких': 'toy_small',
    'Больших': 'toy_big',
    'Брелков': 'key',
    'Шаров страйкб.': 'balls_strike',
    'Шаров надув.': 'balls_air'
  };
  Object.entries(map).forEach(([rus, key]) => {
    const re = new RegExp(rus.replace('.','\\.') + ':\\s*(\\d+)');
    const m = note.match(re);
    if(m) result[key] = parseInt(m[1]);
  });
  return result;
}

function renderInventoryHistory() {
  const wrap = document.getElementById('inv-table-wrap');
  const empty = document.getElementById('inv-empty');
  if(!wrap) return;

  const items = collectInventories();
  if(!items.length) {
    wrap.innerHTML = '';
    if(empty) empty.style.display = 'block';
    return;
  }
  if(empty) empty.style.display = 'none';

  // Колонки: Дата, Время, Точка, Оператор, 🎁 toy_big, 🧸 toy_small, 🔑 key, 🔵 balls_strike, 🎈 balls_air
  // Показываем только релевантные позиции для каждой точки. Для общей таблицы — все 5 колонок,
  // нерелевантные клетки помечаем '—'.
  const cols = ['toy_big', 'toy_small', 'key', 'balls_strike', 'balls_air'];
  const colHeaders = {toy_big:'🎁', toy_small:'🧸', key:'🔑', balls_strike:'🔵', balls_air:'🎈'};

  const rows = items.map(it => {
    const allowedItems = LOC_ITEMS[it.loc] || [];
    const cellsHtml = cols.map(c => {
      if(!allowedItems.includes(c)) return '<td class="inv-cell-na">—</td>';
      const fact = it.factual[c];
      if(fact === undefined) return '<td class="inv-cell-na">—</td>';
      const disc = it.discrepancies[c];
      if(!disc) {
        // Совпадение
        return `<td class="inv-cell-ok">${fact} ✓</td>`;
      }
      const sign = disc.diff > 0 ? '+' : '';
      const cls = disc.diff < 0 ? 'inv-cell-low' : 'inv-cell-high';
      return `<td class="${cls}" title="должно ${disc.expected}, факт ${disc.fact}">${fact} (${sign}${disc.diff})</td>`;
    }).join('');

    const rowClass = it.hasDiscrepancy ? 'has-disc' : '';
    const expanded = invExpandedRow === it.ts;
    let html = `<tr class="${rowClass}" onclick="toggleInvRow(${it.ts})" style="cursor:pointer">
      <td>${fmtDate(it.ts)}</td>
      <td>${fmtTimeShort(it.ts)}</td>
      <td><strong>${it.loc}</strong></td>
      <td>${it.operator}</td>
      ${cellsHtml}
    </tr>`;
    if(expanded) {
      // Раскрытая строка с деталями
      const lbls = {toy_small:'🧸 Маленькие', toy_big:'🎁 Большие', key:'🔑 Брелки', balls_strike:'🔵 Шары страйкб.', balls_air:'🎈 Шары надув.'};
      const detailLines = [];
      Object.entries(it.factual).forEach(([k,fact]) => {
        const disc = it.discrepancies[k];
        if(disc) {
          detailLines.push(`${lbls[k]||k}: факт <b>${fact}</b>, должно <b>${disc.expected}</b>, расхождение <b style="color:${disc.diff<0?'var(--red)':'var(--blue)'}">${disc.diff>0?'+':''}${disc.diff}</b>`);
        } else {
          detailLines.push(`${lbls[k]||k}: <b>${fact}</b> ✓ совпадает`);
        }
      });
      html += `<tr><td colspan="${4+cols.length}" class="inv-detail">
        ${detailLines.join('<br>')}
        ${it.hasDiscrepancy?'<br><span style="color:var(--red);font-weight:700">⚠ Закрыто с расхождениями</span>':''}
      </td></tr>`;
    }
    return html;
  }).join('');

  wrap.innerHTML = `
    <table class="inv-table">
      <thead><tr>
        <th>Дата</th><th>Время</th><th>Точка</th><th>Оператор</th>
        ${cols.map(c=>`<th>${colHeaders[c]}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

  const kpi=document.getElementById('ov-kpi'); if(!kpi) return;
  // v15: все метрики за выбранный день

  // FIX v9-15: KPI зависит от типа точки
  let html = `<div class="kpi-box kpi-gold"><div class="kpi-val">${pay!==null?pay:'—'}</div><div class="kpi-lbl">Оплат KitPos</div></div>`;

  if(isTir(ownerLoc)) {
    // Тир: игрушки маленькие + брелки расчётные
    const toys = countTypeDay(data, ownerDay, 'toy','toy_small');
    const keys = keysCalcForDay(data, ownerDay);

    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${toys}</div><div class="kpi-lbl">🧸 Игрушек</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${keys!==null?keys:'—'}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
    html += `<div class="kpi-box"><div class="kpi-val" style="color:var(--dim)">${own}</div><div class="kpi-lbl">🎮 Своих</div></div>`;
  } else if(isBall(ownerLoc)) {
    // Шарики: большие + маленькие + брелки — всё из ball_prize
    const ballBig   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_big').length;
    const ballSmall = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_small').length;
    const ballKey   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='key').length;
    html += `<div class="kpi-box kpi-big"><div class="kpi-val">${ballBig}</div><div class="kpi-lbl">🎁 Больших</div></div>`;
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${ballSmall}</div><div class="kpi-lbl">🧸 Маленьких</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${ballKey}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
  } else if(isDuck(ownerLoc)) {
    // Уточки: только игрушки маленькие — брелков нет
    const ducks = countTypeDay(data, ownerDay, 'duck_prize');
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${ducks}</div><div class="kpi-lbl">🧸 Призов</div></div>`;
  } else {
    // Fallback
    const toys = countTypeDay(data, ownerDay, 'toy','toy_small','duck_prize');
    const big  = countTypeDay(data, ownerDay, 'toy_big');
    const keys = keysCalcForDay(data, ownerDay);
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${toys}</div><div class="kpi-lbl">🧸 Игрушек</div></div>`;
    if(big>0) html += `<div class="kpi-box kpi-big"><div class="kpi-val">${big}</div><div class="kpi-lbl">🎁 Больших</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${keys!==null?keys:'—'}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
  }

  kpi.innerHTML = html;
  const pi=document.getElementById('pay-inp');
  if(pi&&!pi.value&&pay!==null) pi.value=pay;
  const ln=document.getElementById('ov-loc-name');
  if(ln) ln.textContent=ownerLoc;

    .concat(entries.map(e=>`${fmtDate(e.ts)},${fmtTime(e.ts)},${e._loc||e.loc||''},${typeLabel(e.type)},${(e.note||'').replace(/,/g,';').replace(/\{[^}]+\}/g,'')},${e.op||''}`));

  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download=`arcada_${todayKey()}.csv`;
  a.click();
}

function swTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  const p=document.getElementById('tab-'+id); if(p)p.classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='mylog'||id==='owlog') renderLog();
  if(id==='overview') renderOverview();
  if(id==='operators') renderOps();
  if(id==='settings') loadPricesIntoForm(); // v22
  // FIX 3: rebuild close-shift panel when switching to it, using current subLoc
  if(id==='close-shift') {
    const csPanel = document.getElementById('tab-close-shift');
    if(csPanel) {
      // FIX v12-2: сохранить введённые значения перед пересборкой панели
      const sv={};
      csPanel.querySelectorAll('input[type=number]').forEach(el=>{if(el.id&&el.value!=='')sv[el.id]=el.value;});
      csPanel.innerHTML = buildCloseShiftPanel(CU.location);
      Object.entries(sv).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.value=val;});
    }
    renderAll();
    setTimeout(prefillCloseShift, 50);
  }
  if(id==='owstock') {
    if(stockLoc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
    else renderLocStock(stockLoc);
    renderStockLog(stockLoc);
    setTimeout(()=>{ updateMoveItems(); updateWriteOffItems(); },150);
  }
}
window.swTab=swTab;

function onOwDayPicked(input) {

function switchStockLoc(loc, btn) {
  stockLoc=loc;

function renderStockLog(loc) {
  const el=document.getElementById('stock-log-wrap'); if(!el) return;
  get(dbRef('main_stock_log')).then(snap=>{
    const all=Object.values(snap.val()||{}).sort((a,b)=>tsOf(b)-tsOf(a));
    // v21: пропускаем битые записи из старых версий приложения:
    //  - неизвестный type (известные: in, move, writeoff)
    //  - пустой note
    //  - нет ts (timestamp)
    const validTypes = ['in','move','writeoff'];
    const filtered = all.filter(e =>
      e && validTypes.includes(e.type) && e.note && e.note.trim() && tsOf(e) > 0
    );
    const items = loc==='main' ? filtered : filtered.filter(e=>{
      const locName = loc;
      // FIX v10-4: приходы (type:'in') — только для главного склада
      if(e.type==='in') return false;
      return e.from===locName || e.to===locName;
    });
    const show = items.slice(0,20);
    if(!show.length){el.innerHTML='';return;}
    const lbls={in:'➕ Приход',move:'🔄 Перемещение',writeoff:'🗑 Списание'};
    el.innerHTML=`<div class="card">
      <h4>📋 История операций</h4>
      ${show.map(e=>`
        <div class="recent-item">
          <span class="ri-time">${fmtTime(e.ts)}</span>
          <span style="font-size:12px;color:var(--dim);min-width:50px">${fmtDate(e.ts)}</span>
          <span class="ri-type ri-shift" style="font-size:13px">${lbls[e.type]||e.type}</span>
          <span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis">${e.note||''}</span>
        </div>`).join('')}
    </div>`;
  }).catch(()=>{el.innerHTML='';});
}

function renderStockPanel() {
  const loc=CU?.role==='owner'?ownerLoc:CU?.location;

  e('stk-toy',s.toy_small!==undefined?s.toy_small+' шт':'—');
  e('stk-big',s.toy_big!==undefined?s.toy_big+' шт':'—');
  e('stk-key',s.key!==undefined?s.key+' шт':'—');
}

function saveInitCounters() {
  const loc=document.getElementById('init-loc')?.value||'Тир 1';
  const upd={};
  let saved=0;
  MACHINES.forEach(m=>{
    const v=parseInt(document.getElementById(`init-ctr-${m}`)?.value);
    if(!isNaN(v)&&v>=0){upd[`counters/${m}`]={prev:v,prevTs:serverTimestamp()};saved++;}

// v21/v22: обнуление всех складов (главный + все точки)
function resetAllStocks() {
  if(!confirm('⚠ ОБНУЛИТЬ ВСЕ СКЛАДЫ?\n\nЭто установит остатки на главном складе и всех точках в 0:\n• Игрушки маленькие\n• Игрушки большие\n• Брелки\n• Шары страйкбольные\n• Шары надувные\n\nИстория логов и журналов сохранится.\n\nПродолжить?')) return;
  if(!confirm('⚠ ВЫ УВЕРЕНЫ?\n\nЭто действие нельзя отменить. Все остатки будут стёрты.\n\nЕщё раз: точно обнулить?')) return;
  const pw = prompt('Введите пароль владельца для подтверждения:');
  if(pw === null) return;
  const ownerPw = allUsers?.owner?.pw || '';
  if(pw !== ownerPw) {
    alert('Неверный пароль. Операция отменена.');
    return;
  }

  const zeroStock = {toy_small:0, toy_big:0, key:0, balls_strike:0, balls_air:0};

  // v22: используем set для каждого пути отдельно — надёжнее чем update со многими путями
  const promises = [];
  // Главный склад
  promises.push(set(dbRef('main_stock'), zeroStock));
  // Каждая точка: stock + pending_stock
  LOCS.forEach(loc => {
    const path = locPath(loc);
    promises.push(set(dbRef(`${path}/stock`), zeroStock));
    promises.push(set(dbRef(`${path}/pending_stock`), {}));
  });

  Promise.all(promises).then(() => {
    // Логируем в main_stock_log
    push(dbRef('main_stock_log'), {
      ts: serverTimestamp(),
      op: CU.name,
      type: 'writeoff',
      note: '🗑 Полное обнуление всех складов (через настройки)',
      reason: 'reset_all'
    });
    // Логируем в каждую точку
    LOCS.forEach(loc => {
      push(dbRef(`${locPath(loc)}/log`), mkEntry('inventory', {
        note: 'Обнуление всех остатков (системная операция)',
        loc
      }));
    });
    alert('✓ Все склады обнулены.\n\nОбнови страницу чтобы увидеть результат.');
  }).catch(e => {
    console.error('Ошибка обнуления:', e);
    alert('Ошибка обнуления: ' + e.message + '\n\nПопробуйте ещё раз. Если ошибка повторится — обратитесь к разработчику.');
  });
}
window.resetAllStocks = resetAllStocks;

// v31: разовая очистка устаревшего узла locations/*/payments.

  if(!confirm('Удалить старый узел оплат на всех точках?\n\nЭто рудимент с версий до v28. Оплаты в Журнале и в отчётах смен сохранятся (они в logах). Продолжить?')) return;
  const pw = prompt('Введите пароль владельца:');
  if(pw === null) return;
  const ownerPw = allUsers?.owner?.pw || '';
  if(pw !== ownerPw) {
    alert('Неверный пароль. Операция отменена.');
    return;
  }
  console.log('[cleanLegacyPayments] Старт удаления для точек:', LOCS);
  const promises = LOCS.map(loc => {
    const path = `${locPath(loc)}/payments`;
    console.log('[cleanLegacyPayments] remove:', path);
    return remove(dbRef(path)).then(() => {
      console.log('[cleanLegacyPayments] OK:', path);
    });
  });
  Promise.all(promises).then(() => {
    console.log('[cleanLegacyPayments] Все удаления завершены');
    alert('✓ Старый узел оплат удалён на всех точках.\n\nОбновите страницу для применения.');
  }).catch(e => {
    console.error('[cleanLegacyPayments] Ошибка:', e);
    alert('Ошибка очистки: ' + (e?.message || e));
  });
}
window.cleanLegacyPayments = cleanLegacyPayments;

// v31: ПОЛНЫЙ СБРОС БАЗЫ — удаляет всё кроме узла users.
// Используется когда приложение «запуталось» в старых данных и нужно начать с нуля.
function fullDatabaseReset() {
  if(!confirm('🔥 ПОЛНЫЙ СБРОС БАЗЫ?\n\nБудет удалено:\n• Все журналы точек (logи)\n• Все смены (открытые и закрытые)\n• Все счётчики автоматов\n• Все инвентаризации\n• Все оплаты (новые и старые)\n• Главный склад и склады всех точек\n• История перемещений\n• Цены игр и пороги остатков\n\nСохраняются ТОЛЬКО пользователи (учётки).\n\nПродолжить?')) return;
  if(!confirm('⚠ ВЫ УВЕРЕНЫ?\n\nЭто действие нельзя отменить. Все данные приложения будут стёрты.\n\nЕщё раз: ТОЧНО полный сброс?')) return;
  if(!confirm('🔥 ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ\n\nПриложение станет полностью пустым. Придётся заново:\n• Установить цены игр\n• Завести начальные показания счётчиков\n• Оприходовать товар на главный склад\n• Переместить товар на точки\n\nПродолжить?')) return;
  const pw = prompt('Введите пароль владельца для подтверждения полного сброса:');
  if(pw === null) return;
  const ownerPw = allUsers?.owner?.pw || '';
  if(pw !== ownerPw) {
    alert('Неверный пароль. Операция отменена.');
    return;
  }

  console.log('[fullDatabaseReset] Старт полного сброса');
  const promises = [];
  // Все локации — целиком (вся подветка)
  LOCS.forEach(loc => {
    const path = locPath(loc);
    console.log('[fullDatabaseReset] remove:', path);
    promises.push(remove(dbRef(path)));
  });
  // Главный склад
  console.log('[fullDatabaseReset] remove: main_stock');
  promises.push(remove(dbRef('main_stock')));
  // Лог главного склада
  console.log('[fullDatabaseReset] remove: main_stock_log');
  promises.push(remove(dbRef('main_stock_log')));
  // Settings (цены, пороги)
  console.log('[fullDatabaseReset] remove: settings');
  promises.push(remove(dbRef('settings')));

  Promise.all(promises).then(() => {
    console.log('[fullDatabaseReset] Все удаления завершены');
    alert('✓ База полностью обнулена.\n\nСохранены только пользователи. Обновите страницу (потяните вниз или F5) и начинайте с настройки цен и оприходования товара.');
  }).catch(e => {
    console.error('[fullDatabaseReset] Ошибка:', e);
    alert('Ошибка сброса: ' + (e?.message || e) + '\n\nЧасть данных могла удалиться. Попробуйте ещё раз.');
  });
}
window.fullDatabaseReset = fullDatabaseReset;

// v22: сохранение цен игр
function savePrices() {
  const t = parseInt(document.getElementById('s-price-tir')?.value) || 0;

  }).catch(e=>alert('Ошибка: '+e.message));
}

// v22: получить цену игры для точки
function priceForLoc(loc) {
  const prices = allSettings?.prices || {};
  if(isTir(loc)) return prices.tir || 0;
  if(isBall(loc)) return prices.ball || 0;
  if(isDuck(loc)) return prices.duck || 0;
  return 0;
}

// v22: подгружает текущие цены в поля настроек при открытии вкладки
function loadPricesIntoForm() {
  const prices = allSettings?.prices || {};
  const t = document.getElementById('s-price-tir');
  const b = document.getElementById('s-price-ball');
  const d = document.getElementById('s-price-duck');
  if(t) t.value = prices.tir ?? '';
  if(b) b.value = prices.ball ?? '';
  if(d) d.value = prices.duck ?? '';
}
window.loadPricesIntoForm = loadPricesIntoForm;
