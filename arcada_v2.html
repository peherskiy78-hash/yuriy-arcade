<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аркада — Учёт призов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#f4f1ec;
  --card:#ffffff;
  --card2:#f9f7f3;
  --border:#e0d8cc;
  --border2:#d0c8bc;
  --gold:#c47a00;
  --gold-bg:#fff8e8;
  --red:#c0392b;
  --red-bg:#fdf0ee;
  --green:#1a7a3a;
  --green-bg:#edf7f1;
  --blue:#1a5a9a;
  --blue-bg:#eef4fc;
  --text:#2a2018;
  --text2:#7a6a50;
  --dim:#aa9a80;
  --toy:#c0392b;
  --toy-bg:#fdf0ee;
  --key:#1a5a9a;
  --key-bg:#eef4fc;
  --big:#6a1a8a;
  --big-bg:#f6eefa;
  --a1:#c04000;
  --a2:#6a1a8a;
  --a3:#0a7a5a;
  --a4:#8a5a00;
  --shadow: 0 1px 4px rgba(0,0,0,0.10);
  --shadow2: 0 2px 8px rgba(0,0,0,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loader-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--gold);letter-spacing:.2em;margin-bottom:12px;}
.loader-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.loader-text{font-size:11px;color:var(--dim);margin-top:10px;letter-spacing:.15em;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold);letter-spacing:.2em;line-height:1;}
.logo-sub{font-size:11px;color:var(--dim);letter-spacing:.2em;margin-bottom:28px;text-align:center;}
.login-box{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--shadow2);}
.login-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:.15em;margin-bottom:14px;text-align:center;}
.conn-status{font-size:11px;text-align:center;margin-bottom:12px;padding:6px;border-radius:4px;}
.conn-ok{background:var(--green-bg);color:var(--green);border:1px solid #9ad4b0;}
.conn-err{background:var(--red-bg);color:var(--red);border:1px solid #f0b0a8;}
.f-label{font-size:11px;color:var(--text2);letter-spacing:.1em;display:block;margin-bottom:5px;font-weight:600;}
.f-select,.f-input{width:100%;padding:11px 12px;margin-bottom:12px;background:var(--card2);border:1.5px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;}
.f-select:focus,.f-input:focus{border-color:var(--gold);}
.f-input{text-align:center;letter-spacing:.15em;}
.login-btn{width:100%;padding:13px;background:var(--gold);border:none;
  border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.15em;cursor:pointer;margin-bottom:6px;}
.login-btn:active{opacity:.85;}
.login-err{color:var(--red);font-size:11px;text-align:center;min-height:16px;}

/* ── APP HEADER ── */
.app-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;
  background:var(--card);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:20;box-shadow:var(--shadow);}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:.15em;line-height:1;}
.app-subtitle{font-size:10px;color:var(--dim);letter-spacing:.08em;}
.badge{font-size:10px;letter-spacing:.08em;padding:2px 8px;border-radius:10px;margin-top:2px;display:inline-block;font-weight:600;}
.badge-op{background:var(--red-bg);color:var(--red);border:1px solid #f0b0a8;}
.badge-ow{background:var(--green-bg);color:var(--green);border:1px solid #9ad4b0;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-time{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.offline{background:var(--red);}
.logout{font-size:11px;color:var(--text2);cursor:pointer;padding:5px 10px;border:1.5px solid var(--border);border-radius:5px;font-weight:600;}
.logout:active{background:var(--red-bg);color:var(--red);}

/* ── SHIFT BANNER ── */
.shift-banner{padding:9px 16px;font-size:11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;}
.shift-banner.open{background:var(--green-bg);color:var(--green);}
.shift-banner.closed{background:var(--red-bg);color:var(--red);}
.shift-btn{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;padding:5px 12px;border-radius:5px;cursor:pointer;border:1.5px solid;}
.shift-btn.open-btn{border-color:var(--green);color:var(--green);background:var(--green-bg);}
.shift-btn.close-btn{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.shift-btn:active{opacity:.7;}

/* ── STATS BAR ── */
.stats-row{display:flex;border-bottom:1.5px solid var(--border);background:var(--card);}
.stat{flex:1;text-align:center;padding:10px 3px;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1;}
.sl{font-size:9px;color:var(--dim);letter-spacing:.04em;margin-top:2px;font-weight:600;}
.stat:nth-child(1) .sv{color:var(--gold);}
.stat:nth-child(2) .sv{color:var(--toy);}
.stat:nth-child(3) .sv{color:var(--key);}
.stat:nth-child(4) .sv{color:var(--dim);}

/* ── TOAST ── */
#toast{position:fixed;bottom:0;left:0;right:0;z-index:100;transform:translateY(100%);transition:transform .25s ease;
  background:var(--card);border-top:2.5px solid var(--gold);padding:14px 16px;box-shadow:0 -4px 16px rgba(0,0,0,0.12);}
#toast.show{transform:translateY(0);}
.toast-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.toast-label{flex:1;font-size:12px;color:var(--text);font-weight:600;}
.toast-timer{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);min-width:30px;text-align:right;}
.toast-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:12px;overflow:hidden;}
.toast-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 1s linear;}
.toast-btns{display:flex;gap:10px;}
.toast-confirm{flex:2;padding:12px;background:var(--green);border:none;border-radius:6px;
  color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;}
.toast-cancel{flex:1;padding:12px;background:var(--red);border:none;border-radius:6px;
  color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;}
.toast-confirm:active,.toast-cancel:active{opacity:.8;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1.5px solid var(--border);overflow-x:auto;background:var(--card);}
.tab{flex-shrink:0;padding:11px 12px;background:var(--card);border:none;border-right:1px solid var(--border);
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.tab:last-child{border-right:none;}
.tab.active{background:var(--gold-bg);color:var(--gold);border-bottom:2.5px solid var(--gold);}

.panel{display:none;padding:14px;padding-bottom:90px;}
.panel.active{display:block;}

/* ── SEC TITLE ── */
.sec{font-size:10px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid var(--border);font-weight:600;}

/* ── BIG BUTTONS ── */
.prize-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}

.toy-btn{width:100%;padding:20px;border-radius:10px;background:var(--red-bg);
  border:2.5px solid var(--toy);box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .1s;}
.toy-btn:active:not([disabled]){transform:scale(.98);opacity:.85;}
.toy-btn[disabled]{opacity:.35;cursor:not-allowed;}
.toy-btn .tb-emoji{font-size:2.4rem;flex-shrink:0;}
.toy-btn .tb-right{text-align:left;}
.toy-btn .tb-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--toy);}
.toy-btn .tb-sub{font-size:11px;color:var(--text2);margin-top:2px;}

.big-toy-btn{background:var(--big-bg);border-color:var(--big);}
.big-toy-btn .tb-title{color:var(--big);}

.key-btn{background:var(--key-bg);border-color:var(--key);}
.key-btn .tb-title{color:var(--key);}

.duck-btn{background:var(--green-bg);border-color:var(--green);}
.duck-btn .tb-title{color:var(--green);}

/* ── INFO CARDS ── */
.info-row{display:flex;gap:8px;margin-bottom:14px;}
.info-card{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px;text-align:center;box-shadow:var(--shadow);}
.ic-v{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
.ic-l{font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:.05em;font-weight:600;}
.info-card.toy .ic-v{color:var(--toy);}
.info-card.key .ic-v{color:var(--key);}
.info-card.big .ic-v{color:var(--big);}
.info-card.stk-toy .ic-v{color:var(--toy);}
.info-card.stk-key .ic-v{color:var(--key);}

/* ── MACHINE BUTTONS ── */
.mach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mach-btn{padding:12px 8px;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:2px solid;transition:all .1s;background:var(--card);box-shadow:var(--shadow);}
.mach-btn:active:not([disabled]){transform:scale(.95);}
.mach-btn[disabled]{opacity:.35;cursor:not-allowed;}
.mach-btn.a1{border-color:var(--a1);}
.mach-btn.a2{border-color:var(--a2);}
.mach-btn.a3{border-color:var(--a3);}
.mach-btn.a4{border-color:var(--a4);}
.mb-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;}
.mach-btn.a1 .mb-title{color:var(--a1);}
.mach-btn.a2 .mb-title{color:var(--a2);}
.mach-btn.a3 .mb-title{color:var(--a3);}
.mach-btn.a4 .mb-title{color:var(--a4);}
.mb-sub{font-size:10px;color:var(--dim);}
.mb-count{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;}
.mach-btn.a1 .mb-count{color:var(--a1);}
.mach-btn.a2 .mb-count{color:var(--a2);}
.mach-btn.a3 .mb-count{color:var(--a3);}
.mach-btn.a4 .mb-count{color:var(--a4);}

/* ── RECENT LOG ── */
.recent-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);}
.recent-hdr{padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--dim);letter-spacing:.15em;font-weight:600;background:var(--card2);}
.ri{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);}
.ri:last-child{border-bottom:none;}
.ri-time{font-size:11px;color:var(--dim);min-width:60px;flex-shrink:0;font-variant-numeric:tabular-nums;font-weight:600;}
.ri-type{font-size:12px;font-weight:600;flex:1;}
.ri-type.toy{color:var(--toy);}
.ri-type.big{color:var(--big);}
.ri-type.cancel{color:var(--red);font-style:italic;}
.ri-type.tech{color:var(--dim);}
.ri-type.shift{color:var(--green);}
.ri-empty{padding:14px;text-align:center;font-size:12px;color:var(--dim);}

/* ── COUNTERS ── */
.counter-form{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.counter-form h4{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:5px;}
.ctr-saved{font-size:11px;color:var(--green);margin-bottom:10px;font-weight:600;}
.ctr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;}
.ctr-label{flex:1;}
.ctr-name{font-size:12px;font-weight:600;}
.ctr-prev{font-size:10px;color:var(--dim);}
.ctr-input{width:90px;padding:8px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:5px;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;text-align:center;flex-shrink:0;}
.ctr-input:focus{border-color:var(--gold);}
.ctr-diff{width:44px;text-align:right;font-family:'Bebas Neue',sans-serif;font-size:1rem;flex-shrink:0;}
.save-btn{width:100%;padding:12px;background:var(--gold);border:none;
  border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;margin-top:6px;}
.save-btn:active{opacity:.85;}

/* ── LOG ── */
.log-filter{width:100%;padding:9px 10px;margin-bottom:10px;background:var(--card);border:1.5px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;}
.log-tbl{width:100%;border-collapse:collapse;}
.log-tbl th{font-size:10px;color:var(--dim);letter-spacing:.08em;padding:8px 6px;border-bottom:2px solid var(--border);text-align:left;font-weight:600;}
.log-tbl td{font-size:12px;padding:8px 6px;border-bottom:1px solid var(--border);}
.log-tbl tr:hover td{background:var(--card2);}
.t-time{color:var(--dim);font-size:11px;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:600;}
.t-toy{color:var(--toy);font-weight:600;}
.t-big{color:var(--big);font-weight:600;}
.t-tech{color:var(--dim);}
.t-cancel{color:var(--red);font-style:italic;}
.t-shift{color:var(--green);font-weight:600;}
.t-pay{color:var(--gold);font-weight:600;}
.cam-note{margin-top:10px;font-size:11px;color:var(--text2);padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border);line-height:1.7;}

/* ── STOCK ── */
.stock-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.sc-ico{font-size:1.6rem;flex-shrink:0;}
.sc-inf{flex:1;}
.sc-name{font-size:12px;color:var(--text);font-weight:600;}
.sc-cnt{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1;}
.stock-card.toy .sc-cnt{color:var(--toy);}
.stock-card.key .sc-cnt{color:var(--key);}
.stock-card.big .sc-cnt{color:var(--big);}
.sc-low{font-size:10px;color:var(--red);margin-top:2px;font-weight:600;}
.stock-form{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.stock-form h4{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px;}
.sf-row{margin-bottom:12px;}
.sf-row label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;letter-spacing:.08em;font-weight:600;}
.sf-row input{width:100%;padding:11px 14px;background:var(--card2);border:1.5px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;outline:none;text-align:center;}
.sf-row input:focus{border-color:var(--gold);}

/* ── OWNER DASH ── */
.ow-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.ow-card h4{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px;}
.loc-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.loc-tab{flex:1;min-width:80px;padding:8px 6px;background:var(--card2);border:1.5px solid var(--border);border-radius:6px;
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.loc-tab.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.kpi{background:var(--card2);border:1.5px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
.kpi-l{font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:.05em;font-weight:600;}
.kpi.gold .kpi-v{color:var(--gold);}
.kpi.toy .kpi-v{color:var(--toy);}
.kpi.key .kpi-v{color:var(--key);}
.kpi.big .kpi-v{color:var(--big);}
.kpi.green .kpi-v{color:var(--green);}
.mstat-row{display:flex;align-items:center;gap:10px;padding:9px;background:var(--card2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;}
.mstat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mstat-name{font-size:12px;font-weight:600;flex:1;}
.mstat-vals{text-align:right;}
.mstat-main{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;line-height:1;}
.mstat-sub{font-size:10px;color:var(--dim);}
.pay-input-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.pay-input-wrap h4{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:6px;}
.pay-hint{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.6;}
.pay-big-input{width:100%;padding:14px;background:var(--card2);border:2px solid var(--gold);border-radius:6px;
  color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:2rem;outline:none;text-align:center;letter-spacing:.1em;}
.pay-saved{font-size:11px;color:var(--green);margin-top:8px;text-align:center;font-weight:600;}

/* ── RECON ── */
.recon-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.recon-wrap h4{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px;}
.recon-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.recon-row:last-child{border-bottom:none;}
.rr-label{font-size:12px;color:var(--dim);font-weight:600;}
.rr-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;}
.rr-val.gold{color:var(--gold);}
.rr-val.toy{color:var(--toy);}
.rr-val.key{color:var(--key);}
.rr-val.big{color:var(--big);}
.rr-val.green{color:var(--green);}
.rr-val.red{color:var(--red);}
.rr-val.dim{color:var(--dim);}
.diff-ok{background:var(--green-bg);border:1.5px solid #9ad4b0;border-radius:6px;padding:10px;font-size:12px;color:var(--green);margin-top:10px;font-weight:600;}
.diff-warn{background:var(--red-bg);border:1.5px solid #f0b0a8;border-radius:6px;padding:10px;font-size:12px;color:var(--red);margin-top:10px;font-weight:600;}

/* ── OPERATORS ── */
.op-item{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.op-info{flex:1;}
.op-name{font-size:13px;font-weight:600;color:var(--text);}
.op-loc{font-size:11px;color:var(--dim);margin-top:2px;}
.op-del{font-size:11px;color:var(--red);cursor:pointer;padding:5px 10px;border:1.5px solid #f0b0a8;border-radius:5px;font-weight:600;}
.op-del:active{background:var(--red-bg);}
.op-form{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.op-form h4{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px;}
.op-row{margin-bottom:10px;}
.op-row label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.08em;font-weight:600;}
.op-row input,.op-row select{width:100%;padding:10px 12px;background:var(--card2);border:1.5px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;}
.op-row input:focus,.op-row select:focus{border-color:var(--gold);}

/* ── SETTINGS ── */
.set-section{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.set-section h4{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:12px;}
.pw-field{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.pw-field label{font-size:11px;color:var(--text2);flex:1;font-weight:600;}
.pw-field input{flex:1;padding:8px 10px;background:var(--card2);border:1.5px solid var(--border);border-radius:5px;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;}
.pw-field input:focus{border-color:var(--gold);}
.danger-btn{width:100%;padding:10px;background:var(--card2);border:1.5px solid #f0b0a8;border-radius:6px;
  color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;margin-bottom:8px;font-weight:600;}
.danger-btn:active{background:var(--red-bg);}
.export-btn{width:100%;padding:10px;background:var(--card2);border:1.5px solid #9ad4b0;border-radius:6px;
  color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;margin-bottom:8px;font-weight:600;}
.warn-box{display:none;background:var(--red-bg);border:1.5px solid #f0b0a8;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--red);letter-spacing:.05em;margin-bottom:12px;font-weight:600;}
.warn-box.show{display:block;}

/* ── SHIFT MODAL ── */
#shift-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
#shift-modal.show{display:flex;}
.shift-modal-box{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:22px;width:100%;max-width:340px;box-shadow:var(--shadow2);}
.shift-modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:.1em;margin-bottom:8px;}
.shift-modal-box p{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;}
.shift-prev-data{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px;}
.shift-prev-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;font-weight:600;}
.shift-prev-row:last-child{margin-bottom:0;}
.sm-btns{display:flex;gap:10px;}
.sm-confirm{flex:2;padding:12px;background:var(--green);border:none;border-radius:6px;
  color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;}
.sm-cancel{flex:1;padding:12px;background:var(--card2);border:1.5px solid var(--border);border-radius:6px;
  color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;}

/* ── ANIMATIONS ── */
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.2)}
  50%{box-shadow:0 0 0 12px rgba(192,57,43,0)}
}
.btn-pulse{animation:btnPulse .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">🎯 АРКАДА</div>
  <div class="loader-spin"></div>
  <div class="loader-text">ПОДКЛЮЧЕНИЕ К ОБЛАКУ...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">🎯 АРКАДА</div>
  <div class="logo-sub">СИСТЕМА УЧЁТА ПРИЗОВ</div>
  <div class="login-box">
    <h3>ВХОД В СИСТЕМУ</h3>
    <div class="conn-status conn-ok" id="conn-status">✓ Подключено к облаку</div>
    <label class="f-label">КТО ВХОДИТ</label>
    <select class="f-select" id="login-user-select">
      <option value="">— выберите —</option>
    </select>
    <label class="f-label">ПАРОЛЬ</label>
    <input class="f-input" type="password" id="pw" placeholder="••••" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ВОЙТИ →</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div id="shift-modal">
  <div class="shift-modal-box">
    <h3>ОТКРЫТЬ СМЕНУ</h3>
    <p>Сверьте показания счётчиков на автоматах с данными ниже и подтвердите приём смены.</p>
    <div class="shift-prev-data" id="sm-data"></div>
    <div class="sm-btns">
      <button class="sm-confirm" onclick="confirmShift()">✓ СМЕНА ПРИНЯТА</button>
      <button class="sm-cancel" onclick="closeShiftModal()">ОТМЕНА</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <div class="toast-top">
    <span class="toast-label" id="toast-label"></span>
    <span class="toast-timer" id="toast-timer">30</span>
  </div>
  <div class="toast-bar"><div class="toast-fill" id="toast-fill" style="width:100%"></div></div>
  <div class="toast-btns">
    <button class="toast-confirm" onclick="toastConfirm()">✓ ПОДТВЕРДИТЬ</button>
    <button class="toast-cancel" onclick="toastCancel()">✕ ОТМЕНИТЬ</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="app-hdr">
    <div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="app-title">🎯 АРКАДА</span>
        <div class="sync-dot" id="sync-dot"></div>
      </div>
      <div class="app-subtitle" id="hdr-sub"></div>
      <span class="badge" id="rbadge"></span>
    </div>
    <div class="hdr-right">
      <span class="hdr-time" id="htime"></span>
      <span class="logout" onclick="logout()">ВЫХОД</span>
    </div>
  </div>

  <div id="shift-banner" class="shift-banner closed" style="display:none">
    <span id="shift-status-text">Смена не открыта</span>
    <button class="shift-btn open-btn" id="shift-action-btn" onclick="handleShiftBtn()">ОТКРЫТЬ СМЕНУ</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="sv" id="s1">0</div><div class="sl">ОПЛАТ<br>СЕГОДНЯ</div></div>
    <div class="stat"><div class="sv" id="s2">0</div><div class="sl">🧸<br>ИГРУШЕК</div></div>
    <div class="stat"><div class="sv" id="s3">—</div><div class="sl">🔑<br>БРЕЛКОВ</div></div>
    <div class="stat"><div class="sv" id="s4">0</div><div class="sl">🔧<br>ТЕХН.</div></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-EkSGmpaFRAXNWtQcjo1J8YQNcESno7I",
  authDomain: "arcada-uchot.firebaseapp.com",
  databaseURL: "https://arcada-uchot-default-rtdb.firebaseio.com",
  projectId: "arcada-uchot",
  storageBucket: "arcada-uchot.firebasestorage.app",
  messagingSenderId: "252902676946",
  appId: "1:252902676946:web:9018b0af777d557b27900b"
};

const fireApp = initializeApp(firebaseConfig);
const db = getDatabase(fireApp);

// ═══ CONSTANTS ═══════════════════════════════════════════
const MACHINES = [
  {id:1,name:'Автомат 1',color:'var(--a1)',cls:'a1'},
  {id:2,name:'Автомат 2',color:'var(--a2)',cls:'a2'},
  {id:3,name:'Автомат 3',color:'var(--a3)',cls:'a3'},
  {id:4,name:'Автомат 4',color:'var(--a4)',cls:'a4'},
];
const LOCATIONS = ['Тир 1','Тир 2','Шарики','Уточки'];
const TIR_LOCS = ['Тир 1','Тир 2'];
const TOAST_SECS = 30;

// ═══ SESSION ═════════════════════════════════════════════
let currentUser = null;
let allUsers = {};
let locationData = {};
let allData = {};
let pendingEntry = null;
let toastTmr = null, toastSecs = TOAST_SECS;
let clockTmr = null;
let ownerSelectedLoc = LOCATIONS[0];
let reconSelectedLoc = LOCATIONS[0];

// ═══ HELPERS ═════════════════════════════════════════════
function todayStr(){ return new Date().toLocaleDateString('ru-RU'); }
function nowTime(){ return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function dbRef(path){ return ref(db, path); }
function encodeL(loc){ return loc.replace(/\//g,'-').replace(/\s/g,'_'); }
function locPath(){ return `locations/${encodeL(currentUser.location)}`; }
function ownerLocPath(loc){ return `locations/${encodeL(loc)}`; }
function isTir(loc){ return TIR_LOCS.includes(loc||currentUser?.location); }
function isShарики(loc){ return (loc||currentUser?.location)==='Шарики'; }
function isUтки(loc){ return (loc||currentUser?.location)==='Уточки'; }

// ═══ COMPUTED ════════════════════════════════════════════
function todayLog(data){
  const t=todayStr();
  return Object.values(data?.log||{}).filter(l=>l.date===t);
}
function toysToday(data){ return todayLog(data).filter(l=>l.type==='toy'||l.type==='toy_small').length; }
function bigToysToday(data){ return todayLog(data).filter(l=>l.type==='toy_big').length; }
function allToysToday(data){ return todayLog(data).filter(l=>['toy','toy_small','toy_big','duck_prize'].includes(l.type)).length; }
function techToday(data,machId){ return todayLog(data).filter(l=>l.type===`tech${machId}`).length; }
function techTodayAll(data){ return todayLog(data).filter(l=>l.type?.startsWith('tech')).length; }
function paymentsToday(data){ const p=data?.payments; return p?.date===todayStr()?p.count:null; }
function keysToday(data){
  const p=paymentsToday(data);
  return p===null?null:Math.max(0,p-allToysToday(data));
}

// ═══ INIT ════════════════════════════════════════════════
async function init(){
  onValue(dbRef('.info/connected'),snap=>{
    const ok=snap.val()===true;
    const dot=document.getElementById('sync-dot');
    if(dot)dot.className='sync-dot'+(ok?'':' offline');
    const cs=document.getElementById('conn-status');
    if(cs){cs.className='conn-status '+(ok?'conn-ok':'conn-err');
      cs.textContent=ok?'✓ Подключено к облаку':'✗ Нет соединения';}
  });
  onValue(dbRef('users'),snap=>{
    allUsers=snap.val()||{};
    populateLoginSelect();
  });
  const usersSnap=await get(dbRef('users'));
  if(!usersSnap.exists()){
    await set(dbRef('users/owner'),{name:'Владелец',role:'owner',location:'all',pw:'0000'});
  }
  document.getElementById('loader').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function populateLoginSelect(){
  const sel=document.getElementById('login-user-select');if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">— выберите —</option>';
  Object.entries(allUsers).forEach(([key,u])=>{
    const opt=document.createElement('option');
    opt.value=key;
    opt.textContent=`${u.name} (${u.role==='owner'?'Владелец':u.location||'Оператор'})`;
    sel.appendChild(opt);
  });
  if(cur)sel.value=cur;
}

// ═══ LOGIN / LOGOUT ══════════════════════════════════════
function login(){
  const key=document.getElementById('login-user-select').value;
  const pw=document.getElementById('pw').value.trim();
  const lerr=document.getElementById('lerr');
  if(!key){lerr.textContent='Выберите пользователя';return;}
  const user=allUsers[key];
  if(!user){lerr.textContent='Пользователь не найден';return;}
  if(pw!==user.pw){lerr.textContent='✕ Неверный пароль';document.getElementById('pw').value='';return;}
  currentUser={...user,key};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  buildUI();startListening();startClock();
}
window.login=login;

function logout(){
  toastCancel();clearInterval(clockTmr);currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pw').value='';
  document.getElementById('lerr').textContent='';
}
window.logout=logout;

// ═══ LISTENER ════════════════════════════════════════════
function startListening(){
  if(currentUser.role==='operator'){
    onValue(dbRef(`locations/${encodeL(currentUser.location)}`),snap=>{
      locationData=snap.val()||{};renderAll();
    });
  } else {
    onValue(dbRef('locations'),snap=>{
      allData=snap.val()||{};
      locationData=allData[encodeL(ownerSelectedLoc)]||{};
      renderAll();
    });
  }
}

// ═══ CLOCK ═══════════════════════════════════════════════
function startClock(){
  const tick=()=>{const el=document.getElementById('htime');if(el)el.textContent=nowTime();};
  tick();clockTmr=setInterval(tick,1000);
}

// ═══ SHIFT (OPERATOR ONLY) ═══════════════════════════════
function handleShiftBtn(){
  const shift=locationData?.shift;
  if(shift?.open){
    if(!confirm('Закрыть смену?'))return;
    addEntry({type:'shift_close',note:'Смена закрыта'});
    update(dbRef(`${locPath()}/shift`),{open:false});
  } else showShiftModal();
}
window.handleShiftBtn=handleShiftBtn;

function showShiftModal(){
  const counters=locationData?.counters||{};
  const hasMach=isTir();
  let rows='';
  if(hasMach){
    rows=MACHINES.map(m=>{
      const c=counters[m.id]||{};
      return `<div class="shift-prev-row">
        <span style="color:${m.color};font-weight:600">${m.name}</span>
        <span>${c.prev!==undefined?c.prev:'—'}</span>
        <span style="color:var(--dim);font-size:10px">${c.prevTime||''}</span>
      </div>`;
    }).join('');
  } else {
    rows='<div style="font-size:12px;color:var(--dim)">Счётчики не используются на этой точке</div>';
  }
  document.getElementById('sm-data').innerHTML=rows;
  document.getElementById('shift-modal').classList.add('show');
}

function closeShiftModal(){document.getElementById('shift-modal').classList.remove('show');}
window.closeShiftModal=closeShiftModal;

function confirmShift(){
  addEntry({type:'shift_open',note:'Смена открыта · показания сверены'});
  update(dbRef(`${locPath()}/shift`),{open:true,openDate:todayStr(),openTime:nowTime(),openOp:currentUser.name});
  closeShiftModal();
}
window.confirmShift=confirmShift;

function renderShiftBanner(){
  const banner=document.getElementById('shift-banner');
  const statusText=document.getElementById('shift-status-text');
  const actionBtn=document.getElementById('shift-action-btn');
  if(!banner)return;
  // Only show for operators
  if(currentUser?.role!=='operator'){banner.style.display='none';return;}
  banner.style.display='flex';
  const shift=locationData?.shift;
  if(shift?.open){
    banner.className='shift-banner open';
    statusText.textContent=`✓ Смена открыта · ${shift.openTime||''}`;
    actionBtn.textContent='ЗАКРЫТЬ СМЕНУ';actionBtn.className='shift-btn close-btn';
  } else {
    banner.className='shift-banner closed';
    statusText.textContent='Смена не открыта';
    actionBtn.textContent='ОТКРЫТЬ СМЕНУ';actionBtn.className='shift-btn open-btn';
  }
}

// ═══ TOAST ═══════════════════════════════════════════════
function showToast(entry,label){
  pendingEntry=entry;toastSecs=TOAST_SECS;
  document.getElementById('toast-label').textContent=label;
  document.getElementById('toast-timer').textContent=toastSecs;
  document.getElementById('toast-fill').style.width='100%';
  document.getElementById('toast').classList.add('show');
  setBtnsDisabled(true);
  clearInterval(toastTmr);
  toastTmr=setInterval(()=>{
    toastSecs--;
    document.getElementById('toast-timer').textContent=toastSecs;
    document.getElementById('toast-fill').style.width=(toastSecs/TOAST_SECS*100)+'%';
    if(toastSecs<=0)toastConfirm();
  },1000);
}

function toastConfirm(){
  clearInterval(toastTmr);
  document.getElementById('toast').classList.remove('show');
  setBtnsDisabled(false);
  if(!pendingEntry)return;
  commitEntry(pendingEntry);pendingEntry=null;
}
window.toastConfirm=toastConfirm;

function toastCancel(){
  clearInterval(toastTmr);
  document.getElementById('toast').classList.remove('show');
  setBtnsDisabled(false);
  if(!pendingEntry)return;
  let what='';
  if(pendingEntry.type==='toy')what='Игрушка (тир)';
  else if(pendingEntry.type==='toy_small')what='Маленькая игрушка';
  else if(pendingEntry.type==='toy_big')what='Большая игрушка';
  else if(pendingEntry.type==='duck_prize')what='Приз уточки';
  else if(pendingEntry.type?.startsWith('tech'))what=`Пристрелка авт.${pendingEntry.machId}`;
  addEntry({type:'cancel',note:`Отмена: ${what}`});
  pendingEntry=null;
}
window.toastCancel=toastCancel;

function setBtnsDisabled(val){
  ['toy-btn','toy-small-btn','toy-big-btn','key-btn','duck-btn'].forEach(id=>{
    const b=document.getElementById(id);if(b)b.disabled=val;
  });
  MACHINES.forEach(m=>{const b=document.getElementById(`mach-btn-${m.id}`);if(b)b.disabled=val;});
}

// ═══ ENTRIES ═════════════════════════════════════════════
function mkEntry(type,machId,note){
  return{type,machId:machId||null,note:note||null,date:todayStr(),time:nowTime(),ts:Date.now(),op:currentUser.name,loc:currentUser.location};
}
function addEntry(fields){
  push(dbRef(`${locPath()}/log`),{...mkEntry(fields.type,fields.machId,fields.note),...fields});
}
function commitEntry(entry){
  push(dbRef(`${locPath()}/log`),entry);
  // deduct stock
  if(entry.type==='toy'||entry.type==='toy_small'){
    const s=locationData?.stock?.toy_small;
    if(s!==undefined&&s>0)update(dbRef(`${locPath()}/stock`),{toy_small:s-1});
  } else if(entry.type==='toy_big'){
    const s=locationData?.stock?.toy_big;
    if(s!==undefined&&s>0)update(dbRef(`${locPath()}/stock`),{toy_big:s-1});
  } else if(entry.type==='duck_prize'){
    const s=locationData?.stock?.toy_small;
    if(s!==undefined&&s>0)update(dbRef(`${locPath()}/stock`),{toy_small:s-1});
  }
}

// ═══ PRIZE ACTIONS ═══════════════════════════════════════
function giveToy(type){
  let label='',emoji='';
  if(type==='toy'){label='🧸 Игрушка (тир)';emoji='🧸';}
  else if(type==='toy_small'){label='🧸 Маленькая игрушка (Шарики)';emoji='🧸';}
  else if(type==='toy_big'){label='🎁 Большая игрушка (Шарики)';emoji='🎁';}
  else if(type==='duck_prize'){label='🧸 Приз (Уточки)';emoji='🧸';}
  const entry=mkEntry(type);
  showToast(entry,`${emoji} ${label} — подтвердите (30 сек)`);
  const btnId=type==='toy'?'toy-btn':type==='toy_small'?'toy-small-btn':type==='toy_big'?'toy-big-btn':'duck-btn';
  const btn=document.getElementById(btnId);
  if(btn){btn.classList.remove('btn-pulse');void btn.offsetWidth;btn.classList.add('btn-pulse');}
}
window.giveToy=giveToy;

function giveTech(machId){
  const m=MACHINES[machId-1];
  showToast(mkEntry(`tech${machId}`,machId),`🔧 Пристрелка ${m.name} — подтвердите`);
}
window.giveTech=giveTech;

function saveCounters(){
  const time=nowTime();const updates={};let saved=0;
  MACHINES.forEach(m=>{
    const v=parseInt(document.getElementById(`ctr-inp-${m.id}`)?.value);
    if(!isNaN(v)&&v>=0){updates[`counters/${m.id}`]={prev:v,prevDate:todayStr(),prevTime:time};saved++;}
  });
  if(!saved){alert('Введите показания хотя бы одного автомата');return;}
  update(dbRef(locPath()),updates);
  addEntry({type:'counters',note:`Счётчики (${saved} авт.) в ${time}`});
  MACHINES.forEach(m=>{const el=document.getElementById(`ctr-inp-${m.id}`);if(el)el.value='';});
  alert(`✓ Сохранено в ${time}`);
}
window.saveCounters=saveCounters;

function savePayments(){
  const loc=currentUser.role==='owner'?ownerSelectedLoc:currentUser.location;
  const lPath=ownerLocPath(loc);
  const v=parseInt(document.getElementById('pay-inp')?.value);
  if(isNaN(v)||v<0){alert('Введите число');return;}
  const data=currentUser.role==='owner'?(allData[encodeL(loc)]||{}):locationData;
  const oldKeys=keysToday(data);
  const newKeys=Math.max(0,v-allToysToday(data));
  // deduct keyrings
  const curKey=data?.stock?.key;
  if(curKey!==undefined){
    let upd=curKey;
    if(oldKeys!==null)upd+=oldKeys;
    upd=Math.max(0,upd-newKeys);
    update(dbRef(`${lPath}/stock`),{key:upd});
  }
  update(dbRef(`${lPath}/payments`),{date:todayStr(),count:v,time:nowTime()});
  push(dbRef(`${lPath}/log`),mkEntry('payment',null,`Оплат: ${v} · Брелков списано: ${newKeys}`));
  const ps=document.getElementById('pay-saved');
  if(ps)ps.textContent=`✓ Сохранено · Брелков списано: ${newKeys}`;
}
window.savePayments=savePayments;

function setStock(){
  const loc=currentUser.role==='owner'?ownerSelectedLoc:currentUser.location;
  const lPath=ownerLocPath(loc);
  const ts=parseInt(document.getElementById('inp-toy-small')?.value);
  const tb=parseInt(document.getElementById('inp-toy-big')?.value);
  const k=parseInt(document.getElementById('inp-key')?.value);
  const upd={};
  if(!isNaN(ts)&&ts>=0)upd.toy_small=ts;
  if(!isNaN(tb)&&tb>=0)upd.toy_big=tb;
  if(!isNaN(k)&&k>=0)upd.key=k;
  if(Object.keys(upd).length){update(dbRef(`${lPath}/stock`),upd);alert('Склад обновлён!');}
  ['inp-toy-small','inp-toy-big','inp-key'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
window.setStock=setStock;

async function saveInitialCounters(){
  const loc=document.getElementById('init-loc-sel')?.value;
  if(!loc){alert('Выберите точку');return;}
  const lPath=ownerLocPath(loc);const updates={};
  MACHINES.forEach(m=>{
    const v=parseInt(document.getElementById(`init-ctr-${m.id}`)?.value);
    if(!isNaN(v)&&v>=0)updates[`counters/${m.id}`]={prev:v,prevDate:todayStr(),prevTime:nowTime()};
  });
  if(!Object.keys(updates).length){alert('Введите хотя бы одно показание');return;}
  await update(dbRef(lPath),updates);
  alert(`✓ Начальные показания для "${loc}" сохранены!`);
}
window.saveInitialCounters=saveInitialCounters;

async function addOperator(){
  const name=document.getElementById('op-name-inp')?.value.trim();
  const loc=document.getElementById('op-loc-sel')?.value;
  const pw=document.getElementById('op-pw-inp')?.value.trim();
  if(!name||!loc||!pw){alert('Заполните все поля');return;}
  await set(dbRef(`users/op_${Date.now()}`),{name,role:'operator',location:loc,pw});
  ['op-name-inp','op-pw-inp'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  alert(`✓ Оператор "${name}" добавлен!`);
}

async function deleteOperator(key){

async function saveOwnerPw(){

function renderAll(){
  if(currentUser?.role==='operator'){
    renderTopStats(locationData);

    renderRecent(locationData);
    renderTechCounts(locationData);
    renderCounters(locationData);
    renderShiftBanner();
  } else {
    const data=allData[encodeL(ownerSelectedLoc)]||{};
    locationData=data;
    renderTopStats(data);
    renderShiftBanner();
    renderDash(data);
    renderOperatorsList();
  }
}

function renderTopStats(data){
  const p=paymentsToday(data),t=toysToday(data)+bigToysToday(data),k=keysToday(data);
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('s1',p!==null?p:'—');e('s2',t);e('s3',k!==null?k:'—');e('s4',techTodayAll(data));
  e('ic-toys',toysToday(data));
  e('ic-big',bigToysToday(data));
  e('ic-keys',k!==null?k:'—');
  e('ic-stk-toy',data?.stock?.toy_small!==undefined?data.stock.toy_small:'—');
}

function renderWarnings(data){
  const wt=document.getElementById('w-toy');
  if(wt)wt.classList.toggle('show',data?.stock?.toy_small!==undefined&&data.stock.toy_small<=3);
}

function renderRecent(data){
  const el=document.getElementById('recent');if(!el)return;
  const items=Object.values(data?.log||{}).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,7);
  if(!items.length){el.innerHTML='<div class="ri-empty">Нет записей</div>';return;}
  el.innerHTML=items.map(e=>{
    let cls='',label='';
    if(e.type==='toy'){cls='toy';label='🧸 Игрушка (тир)';}
    else if(e.type==='toy_small'){cls='toy';label='🧸 Маленькая игрушка';}
    else if(e.type==='toy_big'){cls='big';label='🎁 Большая игрушка';}
    else if(e.type==='duck_prize'){cls='toy';label='🧸 Приз (уточки)';}
    else if(e.type==='key_given'){label='🔑 Брелок выдан';}
    else if(e.type?.startsWith('tech')){cls='tech';label=`🔧 Пристрелка Авт.${e.machId}`;}
    else if(e.type==='cancel'){cls='cancel';label=`🔴 ${e.note||'Отмена'}`;}
    else if(e.type==='shift_open'){cls='shift';label='✅ Смена открыта';}
    else if(e.type==='shift_close'){cls='shift';label='🔒 Смена закрыта';}
    else if(e.type==='counters'){label='📟 Счётчики внесены';}
    else if(e.type==='payment'){label='💳 Оплаты внесены';}
    else{label=e.note||e.type||'';}
    return `<div class="ri fade-in">
      <span class="ri-time">${e.time||''}</span>
      <span class="ri-type ${cls}">${label}</span>
    </div>`;
  }).join('');
}

function renderTechCounts(data){
  MACHINES.forEach(m=>{const el=document.getElementById(`tech-count-${m.id}`);if(el)el.textContent=techToday(data,m.id);});
}

function renderCounters(data){
  const counters=data?.counters||{};
  MACHINES.forEach(m=>{
    const pl=document.getElementById(`ctr-prev-${m.id}`);
    const c=counters[m.id]||{};
    if(pl)pl.textContent=c.prev!==undefined?`утро: ${c.prev} (${c.prevTime||''})` :'утро: —';
    updateDiff(m.id);
  });
  const lastCtr=Object.values(data?.log||{}).filter(l=>l.type==='counters'&&l.date===todayStr()).sort((a,b)=>(b.ts||0)-(a.ts||0))[0];
  const si=document.getElementById('ctr-saved-info');
  if(si)si.textContent=lastCtr?`✓ Сохранено: ${lastCtr.time}`:'';
}

function renderLog(){
  const tbody=document.getElementById('ltbody');if(!tbody)return;
  const filter=document.getElementById('lf')?.value||'all';
  const locFilter=document.getElementById('lf-loc')?.value||'all';
  const isOwner=currentUser?.role==='owner';
  let entries=[];
  if(isOwner){
    Object.entries(allData).forEach(([lk,ldata])=>{
      const locName=LOCATIONS.find(l=>encodeL(l)===lk)||lk;
      Object.values(ldata?.log||{}).forEach(e=>entries.push({...e,_loc:locName}));
    });
  } else entries=Object.values(locationData?.log||{});
  entries.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(filter==='toy')entries=entries.filter(e=>['toy','toy_small','toy_big','duck_prize'].includes(e.type));
  else if(filter==='tech')entries=entries.filter(e=>e.type?.startsWith('tech'));
  else if(filter==='cancel')entries=entries.filter(e=>e.type==='cancel');
  else if(filter==='shift')entries=entries.filter(e=>e.type?.startsWith('shift'));
  else if(filter==='payment')entries=entries.filter(e=>e.type==='payment');
  if(locFilter!=='all')entries=entries.filter(e=>(e._loc||e.loc)===locFilter);
  const lempty=document.getElementById('lempty');
  if(!entries.length){tbody.innerHTML='';if(lempty)lempty.style.display='block';return;}
  if(lempty)lempty.style.display='none';
  tbody.innerHTML=entries.map(e=>{
    let cls='',label='';
    if(e.type==='toy'){cls='t-toy';label='🧸 Игрушка (тир)';}
    else if(e.type==='toy_small'){cls='t-toy';label='🧸 Маленькая';}
    else if(e.type==='toy_big'){cls='t-big';label='🎁 Большая';}
    else if(e.type==='duck_prize'){cls='t-toy';label='🧸 Приз уточки';}
    else if(e.type==='key_given'){label='🔑 Брелок';}
    else if(e.type?.startsWith('tech')){cls='t-tech';label=`🔧 Авт.${e.machId}`;}
    else if(e.type==='cancel'){cls='t-cancel';label='🔴 Отмена';}
    else if(e.type==='shift_open'){cls='t-shift';label='✅ Смена';}
    else if(e.type==='shift_close'){cls='t-shift';label='🔒 Закрытие';}
    else if(e.type==='counters'){label='📟 Счётчики';}
    else if(e.type==='payment'){cls='t-pay';label='💳 Оплаты';}
    else{label=e.type||'';}
    return `<tr>
      <td class="t-time">${e.time||''}</td>
      <td style="font-size:10px;color:var(--dim)">${e.date||''}</td>
      <td class="${cls}">${label}</td>
      ${isOwner?`<td style="font-size:10px;color:var(--dim)">${e._loc||e.loc||''}</td>
      <td style="font-size:10px;color:var(--dim)">${e.op||''}</td>`:''}
      <td style="font-size:10px;color:var(--dim);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note||''}</td>
    </tr>`;
  }).join('');
}

function renderDash(data){
  if(!data)return;
  const p=paymentsToday(data),t=toysToday(data)+bigToysToday(data),k=keysToday(data);
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('kpi-pay',p!==null?p:'—');e('kpi-toys',t);e('kpi-keys',k!==null?k:'—');
  const title=document.getElementById('dash-loc-title');
  if(title)title.textContent=`📊 ${ownerSelectedLoc} — ИТОГИ ДНЯ`;
  // tech
  const ot=document.getElementById('ow-tech');
  if(ot){
    if(isTir(ownerSelectedLoc)){
      ot.innerHTML=MACHINES.map(m=>`
        <div class="mstat-row">
          <div class="mstat-dot" style="background:${m.color}"></div>
          <div class="mstat-name" style="color:${m.color}">${m.name}</div>
          <div class="mstat-vals"><div class="mstat-main" style="color:${m.color}">${techToday(data,m.id)}</div><div class="mstat-sub">пристрелок</div></div>
        </div>`).join('');
    } else {
      ot.innerHTML='<div style="font-size:12px;color:var(--dim);padding:8px">Счётчики не используются на этой точке</div>';
    }
  }
  // stock
  const os=document.getElementById('ow-stk');
  if(os)os.innerHTML=`
    <div style="display:flex;gap:8px">
      <div style="flex:1;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--toy)">${data?.stock?.toy_small!==undefined?data.stock.toy_small:'—'}</div>
        <div style="font-size:9px;color:var(--dim);font-weight:600">🧸 МАЛЕНЬКИХ</div>
      </div>
      <div style="flex:1;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--big)">${data?.stock?.toy_big!==undefined?data.stock.toy_big:'—'}</div>
        <div style="font-size:9px;color:var(--dim);font-weight:600">🎁 БОЛЬШИХ</div>
      </div>
      <div style="flex:1;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--key)">${data?.stock?.key!==undefined?data.stock.key:'—'}</div>
        <div style="font-size:9px;color:var(--dim);font-weight:600">🔑 БРЕЛКОВ</div>
      </div>
    </div>`;
  // pay-saved
  if(data?.payments?.date===todayStr()&&data.payments.time){
    const ps=document.getElementById('pay-saved');
    if(ps)ps.textContent=`✓ Сохранено в ${data.payments.time}`;
    const pi=document.getElementById('pay-inp');
    if(pi&&!pi.value)pi.value=data.payments.count;
  }
  // warnings
  const warns=[];
  if(data?.stock?.toy_small!==undefined&&data.stock.toy_small<=3)warns.push('⚠ Маленьких игрушек критически мало!');
  if(data?.stock?.toy_big!==undefined&&data.stock.toy_big<=2)warns.push('⚠ Больших игрушек мало!');
  if(data?.stock?.key!==undefined&&data.stock.key<=10)warns.push('⚠ Брелков мало!');
  const ow=document.getElementById('ow-warns');
  if(ow)ow.innerHTML=warns.map(w=>`<div style="background:var(--red-bg);border:1.5px solid #f0b0a8;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:10px;font-weight:600">${w}</div>`).join('');
}

function renderRecon(loc){
  const el=document.getElementById('recon-content');if(!el)return;
  const l=loc||reconSelectedLoc;
  const data=allData[encodeL(l)]||{};
  const p=paymentsToday(data),t=allToysToday(data),k=keysToday(data),techAll=techTodayAll(data);
  const counters=data?.counters||{};
  let machLines='';
  if(isTir(l)){
    machLines=MACHINES.map(m=>{
      const c=counters[m.id]||{};const tech=techToday(data,m.id);
      if(c.prev!==undefined&&c.prevDate===todayStr()){
        return `<div style="display:flex;justify-content:space-between;padding:8px;background:var(--card2);border:1px solid var(--border);border-radius:5px;margin-bottom:5px;font-size:12px;font-weight:600">
          <span style="color:${m.color}">${m.name}</span>
          <span style="color:var(--dim)">→ ${c.prev} (${c.prevTime||''})</span>
          <span style="color:${m.color}">−${tech} техн.</span>
        </div>`;
      }
      return `<div style="display:flex;justify-content:space-between;padding:8px;background:var(--card2);border:1px solid var(--border);border-radius:5px;margin-bottom:5px;font-size:12px;font-weight:600">
        <span style="color:${m.color}">${m.name}</span>
        <span style="color:var(--dim)">${c.prev!==undefined?`утро: ${c.prev}`:'нет данных'}</span>
      </div>`;
    }).join('');
  } else {
    machLines=`<div style="font-size:12px;color:var(--dim);padding:8px;font-weight:600">Счётчики не используются — учёт по оплатам KitPos</div>`;
  }
  el.innerHTML=`
    ${machLines}
    <div style="height:6px"></div>
    <div class="recon-row"><span class="rr-label">Оплат в KitPos</span><span class="rr-val gold">${p!==null?p:'—'}</span></div>
    <div class="recon-row"><span class="rr-label">🔧 Техн. игр</span><span class="rr-val dim">${techAll}</span></div>
    <div class="recon-row" style="border-top:2px solid var(--border);padding-top:8px;margin-top:4px">
      <span class="rr-label">🧸 Игрушек выдано</span><span class="rr-val toy">${t}</span></div>
    <div class="recon-row"><span class="rr-label">🔑 Брелков (оплаты−игрушки)</span><span class="rr-val key">${k!==null?k:'Введите оплаты'}</span></div>
    ${p!==null&&k!==null
      ?`<div class="diff-ok">✓ Расчёт: ${p} оплат − ${t} игрушек = ${k} брелков</div>`
      :'<div style="font-size:11px;color:var(--dim);margin-top:10px;font-weight:600">Введите оплаты во вкладке Обзор</div>'}
  `;
}

function renderStockPanel(){
  const loc=currentUser?.role==='owner'?ownerSelectedLoc:currentUser?.location;
  const data=currentUser?.role==='owner'?(allData[encodeL(loc)]||{}):locationData;
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('stk-toy',data?.stock?.toy_small!==undefined?data.stock.toy_small+' шт':'—');
  e('stk-big',data?.stock?.toy_big!==undefined?data.stock.toy_big+' шт':'—');
  e('stk-key',data?.stock?.key!==undefined?data.stock.key+' шт':'—');
  const tw=document.getElementById('stk-toy-w');if(tw)tw.textContent=data?.stock?.toy_small!==undefined&&data.stock.toy_small<=3?'⚠ Критически мало!':'';
  const bw=document.getElementById('stk-big-w');if(bw)bw.textContent=data?.stock?.toy_big!==undefined&&data.stock.toy_big<=2?'⚠ Мало!':'';
  const kw=document.getElementById('stk-key-w');if(kw)kw.textContent=data?.stock?.key!==undefined&&data.stock.key<=10?'⚠ Мало':'';
}

function renderOperatorsList(){
  const el=document.getElementById('ops-list');if(!el)return;
  const ops=Object.entries(allUsers).filter(([,u])=>u.role==='operator');
  if(!ops.length){el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:14px">Операторов нет</div>';return;}
  el.innerHTML=ops.map(([key,u])=>`
    <div class="op-item">
      <div class="op-info">
        <div class="op-name">${u.name}</div>
        <div class="op-loc">📍 ${u.location} · 🔑 ${u.pw}</div>
      </div>
      <button class="op-del" onclick="deleteOperator('${key}')">УДАЛИТЬ</button>
    </div>`).join('');
}

// ═══ LOCATION SWITCHERS ══════════════════════════════════
function switchDashLoc(loc,btn){
  ownerSelectedLoc=loc;
  document.querySelectorAll('#dash-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const data=allData[encodeL(loc)]||{};locationData=data;
  renderTopStats(data);renderDash(data);
}
window.switchDashLoc=switchDashLoc;

function switchReconLoc(loc,btn){
  reconSelectedLoc=loc;
  document.querySelectorAll('#tab-ow-recon .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderRecon(loc);
}
window.switchReconLoc=switchReconLoc;

function switchStockLoc(loc,btn){
  ownerSelectedLoc=loc;
  document.querySelectorAll('#stock-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderStockPanel();
}
window.switchStockLoc=switchStockLoc;

// ═══ DIFF ════════════════════════════════════════════════
function updateDiff(machId){
  const inp=document.getElementById(`ctr-inp-${machId}`);
  const diff=document.getElementById(`ctr-diff-${machId}`);
  if(!inp||!diff)return;
  const v=parseInt(inp.value);
  const prev=locationData?.counters?.[machId]?.prev;
  if(!isNaN(v)&&v>=0&&prev!==undefined){
    const d=v-prev;
    diff.textContent=d>=0?`+${d}`:String(d);
    diff.style.color=d<0?'var(--red)':MACHINES[machId-1].color;
  }else diff.textContent='—';
}
window.updateDiff=updateDiff;

// ═══ TAB SWITCH ══════════════════════════════════════════
function sw(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const p=document.getElementById('tab-'+id);if(p)p.classList.add('active');
  btn.classList.add('active');
  if(id.includes('log'))renderLog();
  if(id==='op-counters')renderCounters(locationData);
  if(id==='ow-dash')renderDash(allData[encodeL(ownerSelectedLoc)]||{});
  if(id==='ow-recon')renderRecon(reconSelectedLoc);
  if(id==='ow-stock'||id==='op-stock')renderStockPanel();
  if(id==='ow-ops')renderOperatorsList();
}
window.sw=sw;

// ═══ EXPORT ══════════════════════════════════════════════
function exportCSV(){
  let entries=[];
  Object.entries(allData).forEach(([lk,ldata])=>{
    const locName=LOCATIONS.find(l=>encodeL(l)===lk)||lk;
    Object.values(ldata?.log||{}).forEach(e=>entries.push({...e,_loc:locName}));
  });
  entries.sort((a,b)=>(b.ts||0)-(a.ts||0));
  const rows=['Дата,Время,Точка,Тип,Детали,Оператор']
    .concat(entries.map(e=>`${e.date||''},${e.time||''},${e._loc||e.loc||''},${e.type||''},${e.note||''},${e.op||''}`));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download=`arcada_${new Date().toLocaleDateString('ru-RU').replace(/\./g,'-')}.csv`;
  a.click();
}
window.exportCSV=exportCSV;

init();
</script>
</body>
</html>
