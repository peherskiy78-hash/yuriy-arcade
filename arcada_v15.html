function renderOvDetail(data) {
  const title=document.getElementById('ov-detail-title');
  if(title) title.textContent=`${ownerLoc} — детали${ownerDay?' · '+dayLabel(ownerDay):''}`;
  const kpi=document.getElementById('ov-kpi'); if(!kpi) return;
  // v15: все метрики за выбранный день
  const pay=paymentsForDay(data, ownerDay);
  const logEntries=logForDay(data, ownerDay);

  // FIX v9-15: KPI зависит от типа точки
  let html = `<div class="kpi-box kpi-gold"><div class="kpi-val">${pay!==null?pay:'—'}</div><div class="kpi-lbl">Оплат KitPos</div></div>`;

  if(isTir(ownerLoc)) {
    // Тир: игрушки маленькие + брелки расчётные
    const toys = countTypeDay(data, ownerDay, 'toy','toy_small');
    const keys = keysCalcForDay(data, ownerDay);
    const own  = countTypeDay(data, ownerDay, 'own_game');
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${toys}</div><div class="kpi-lbl">🧸 Игрушек</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${keys!==null?keys:'—'}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
    html += `<div class="kpi-box"><div class="kpi-val" style="color:var(--dim)">${own}</div><div class="kpi-lbl">🎮 Своих</div></div>`;
  } else if(isBall(ownerLoc)) {
    // Шарики: большие + маленькие + брелки — всё из ball_prize
    const ballBig   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_big').length;
    const ballSmall = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_small').length;
    const ballKey   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='key').length;
    const noPrize   = countTypeDay(data, ownerDay, 'no_prize');
    html += `<div class="kpi-box kpi-big"><div class="kpi-val">${ballBig}</div><div class="kpi-lbl">🎁 Больших</div></div>`;
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${ballSmall}</div><div class="kpi-lbl">🧸 Маленьких</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${ballKey}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
    if(noPrize>0) html += `<div class="kpi-box"><div class="kpi-val" style="color:var(--dim)">${noPrize}</div><div class="kpi-lbl">🎮 Без приза</div></div>`;
  } else if(isDuck(ownerLoc)) {
    // Уточки: только игрушки маленькие — брелков нет
    const ducks = countTypeDay(data, ownerDay, 'duck_prize');
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${ducks}</div><div class="kpi-lbl">🧸 Призов</div></div>`;
  } else {
    // Fallback
    const toys = countTypeDay(data, ownerDay, 'toy','toy_small','duck_prize');
    const big  = countTypeDay(data, ownerDay, 'toy_big');
    const keys = keysCalcForDay(data, ownerDay);
    html += `<div class="kpi-box kpi-toy"><div class="kpi-val">${toys}</div><div class="kpi-lbl">🧸 Игрушек</div></div>`;
    if(big>0) html += `<div class="kpi-box kpi-big"><div class="kpi-val">${big}</div><div class="kpi-lbl">🎁 Больших</div></div>`;
    html += `<div class="kpi-box kpi-key"><div class="kpi-val">${keys!==null?keys:'—'}</div><div class="kpi-lbl">🔑 Брелков</div></div>`;
  }

  kpi.innerHTML = html;
  const pi=document.getElementById('pay-inp');
  if(pi&&!pi.value&&pay!==null) pi.value=pay;
  const ln=document.getElementById('ov-loc-name');
  if(ln) ln.textContent=ownerLoc;
}

function renderRecon(loc) {
  const el=document.getElementById('recon-content'); if(!el) return;
  const title=document.getElementById('recon-title');
  if(title) title.textContent=`🔍 Сверка — ${reconLoc}`;
  const data=allData[enc(reconLoc)]||{};
  const pay=paymentsToday(data);
  const toys=countType(data,'toy','toy_small','duck_prize');
  const big=countType(data,'toy_big');
  const keys=keysCalc(data);
  const allP=allPrizesToday(data);
  const diff=pay!==null?pay-allP:null;
  let html='';
  if(isTir(reconLoc)) {
    // FIX v9-15: renderOvDetail — KPI теперь зависит от типа точки:
//            Тир: игрушки + брелки расчётные + свои
//            Шарики: большие + маленькие + брелки (из ball_prize)
//            Уточки: только призы, без брелков
//            savePayments: брелки автосписываются только для Тира
// FIX v9-14: Нампад Шариков — строковый накопительный ввод (0–10).
//            Теперь 1→0 = 10 работает корректно.
//            Убрано двойное подтверждение: confirmBall пишет сразу,
//            вместо Toast показывает лёгкий flash на 1.8 сек.
// FIX v9-12: Нампад Шариков — однозначный ввод вместо накопительного.
//            Нажатие любой цифры = установить значение (не добавлять разряд).
//            1→0 = 10. Сброс при каждой перестройке панели.
// FIX v9-13: Статус-бар — маленькие игрушки из ball_prize не считались
//            (только big и keys учитывались). Исправлено.
//            Предупреждение о нулевом складе добавлено в confirmBall.
// FIX v9-11: Правильная сверка Тира
    //
    // Логика: счётчик автомата = оплаты + свои игры + неучтённые игры
    // Поэтому: (оплаты + свои) должно = показаниям счётчика
    // Если счётчик > (оплаты + свои) — злоупотребление
    //
    // Также: оплаты = игрушки + брелки (расчётные)
    // Если оплаты ≠ (игрушки + брелки) — несоответствие призов

    const ownCnt = countType(data,'own_game','no_prize');
    // totalAccounted = то, что должен показать счётчик
    const totalAccounted = pay!==null ? pay + ownCnt : null;

    html+=`<div class="recon-row"><span class="rr-lbl">Оплат KitPos</span><span class="rr-val rv-gold">${pay!==null?pay:'—'}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🎮 Своих игр (записано)</span><span class="rr-val rv-dim">${ownCnt}</span></div>`;
    html+=`<div class="recon-row" style="background:var(--gold-bg);border-radius:6px;padding:8px;margin:4px 0">
      <span class="rr-lbl" style="color:var(--gold)">📊 Итого по записям</span>
      <span class="rr-val rv-gold" style="font-size:1.4rem">${totalAccounted!==null?totalAccounted:'—'}</span>
    </div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🧸 Игрушек выдано</span><span class="rr-val rv-toy">${toys}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🔑 Брелков расчётных</span><span class="rr-val rv-key">${keys!==null?keys:'введите оплаты'}</span></div>`;

    // Проверка 1: оплаты соответствуют призам
    if(pay!==null) {
      const tirPrizes = toys + (keys!==null?keys:0);
      const prizeDiff = pay - tirPrizes;
      if(prizeDiff!==0 && Math.abs(prizeDiff)>2) {
        html+=`<div class="recon-warn" style="margin-top:6px">⚠ Призов выдано не по норме: разница ${Math.abs(prizeDiff)}</div>`;
      }
    }

    html+=`<div style="font-size:12px;color:var(--dim);padding:8px 0 4px;line-height:1.7;border-top:1px solid var(--border);margin-top:8px">
      🔢 <strong style="color:var(--text)">«Итого по записям»</strong> должно совпасть со счётчиком автоматов.<br>
      Если счётчик <strong>больше</strong> — были игры без записи.
    </div>`;

    if(pay===null) {
      html+='<div style="font-size:13px;color:var(--dim);margin-top:6px">Введите оплаты во вкладке Обзор</div>';
    }
  } else if(isBall(reconLoc)) {
    const _tk = todayKey();
    const logEntries = Object.values(data?.log||{}).filter(e=>dayKey(tsOf(e))===_tk);
    const ballBig   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_big').length;
    const ballSmall = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='toy_small').length;
    const ballKey   = logEntries.filter(e=>e.type==='ball_prize'&&e.prize==='key').length;
    const totalBig   = big + ballBig;
    const totalSmall = toys + ballSmall;
    const totalKeys  = countType(data,'key_given') + ballKey;
    html+=`<div class="recon-row"><span class="rr-lbl">Оплат KitPos</span><span class="rr-val rv-gold">${pay!==null?pay:'—'}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🎁 Больших</span><span class="rr-val rv-big">${totalBig}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🧸 Маленьких</span><span class="rr-val rv-toy">${totalSmall}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🔑 Брелков</span><span class="rr-val rv-key">${totalKeys}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">Итого призов</span><span class="rr-val rv-gold">${allP}</span></div>`;
  } else {
    // Уточки: приз гарантирован каждому — расхождение любое = проверить камеры
    const duckPrizes = countType(data,'duck_prize');
    html+=`<div class="recon-row"><span class="rr-lbl">Оплат KitPos</span><span class="rr-val rv-gold">${pay!==null?pay:'—'}</span></div>`;
    html+=`<div class="recon-row"><span class="rr-lbl">🧸 Выдано</span><span class="rr-val rv-toy">${duckPrizes}</span></div>`;
  }
  // Общий блок diff только для Шарики и Уточки (Тир имеет свою логику выше)
  if(!isTir(reconLoc)) {
    if(diff!==null) {
      // Для Уточек — любое расхождение подозрительно (приз гарантирован всегда)
      const tolerance = isDuck(reconLoc) ? 0 : 2;
      html+=diff===0?'<div class="recon-ok">✓ Данные совпадают</div>':
        Math.abs(diff)<=tolerance?`<div class="recon-ok">✓ Разница ${Math.abs(diff)} — в норме</div>`:
        `<div class="recon-warn">⚠ Расхождение ${Math.abs(diff)} — проверить камеры</div>`;
    } else {
      html+='<div style="font-size:13px;color:var(--dim);margin-top:10px">Введите оплаты во вкладке Обзор</div>';
    }
  }
  el.innerHTML=html;
}

function renderLocStock(loc) {
  const el=document.getElementById('stock-display'); if(!el) return;
  const s=(allData[enc(loc)]||{})?.stock||{};
  const pending=(allData[enc(loc)]||{})?.pending_stock||{};
  const allowed=LOC_ITEMS[loc]||LOC_ITEMS['main'];
  const allItemDefs=[
    {k:'toy_small',ico:'🧸',n:'Игрушки маленькие',cls:'sc-toy'},
    {k:'toy_big',ico:'🎁',n:'Игрушки большие',cls:'sc-big'},
    {k:'key',ico:'🔑',n:'Брелки',cls:'sc-key'},
    {k:'balls_strike',ico:'🔵',n:'Шары страйкбольные',approx:true,cls:'sc-ball'},
    {k:'balls_air',ico:'🎈',n:'Шары надувные',approx:true,cls:'sc-ball'},
  ];
  const items=allItemDefs.filter(it=>allowed.includes(it.k));
  // FIX v10-4: подсказка о pending_stock если товар ожидает приёма
  // FIX v13-2: показываем только pending позиции допустимые для этой точки
  const allowedKeys = LOC_ITEMS[loc] || LOC_ITEMS['main'];
  const hasPending = Object.entries(pending).some(([k,v])=>v>0 && allowedKeys.includes(k));
  const pendingHtml = hasPending ? `<div class="info-box" style="margin-bottom:10px">
    📦 Ожидает подтверждения приёма при открытии смены оператором:<br>
    <span style="font-size:13px">${Object.entries(pending).filter(([k,v])=>v>0&&allowedKeys.includes(k)).map(([k,v])=>{
      const names={toy_small:'🧸 Маленьких',toy_big:'🎁 Больших',key:'🔑 Брелков',balls_strike:'🔵 Шаров страйкб.',balls_air:'🎈 Шаров надув.'};
      return (names[k]||k)+': +'+v;
    }).join(', ')}</span>
  </div>` : '';
  el.innerHTML=`<div class="sec-title">${loc}</div>`+pendingHtml+items.map(it=>`
    <div class="stock-card">
      <div class="sc-icon">${it.ico}</div>
      <div class="sc-info"><div class="sc-name">${it.n}</div>
        <div class="sc-cnt ${it.cls}">${s[it.k]!==undefined?(it.approx?'~':'')+s[it.k]+' шт':'—'}</div>
        ${(s[it.k]!==undefined&&s[it.k]<=3)?'<div class="sc-warn">⚠ Мало!</div>':''}
      </div>
    </div>`).join('');
}

function exportCSV() {
  let entries=[];
  Object.entries(allData).forEach(([lk,ld])=>{
    const ln=LOCS.find(l=>enc(l)===lk)||lk;
    Object.values(ld?.log||{}).forEach(e=>entries.push({...e,_loc:ln}));
  });
  entries.sort((a,b)=>tsOf(b)-tsOf(a));
  const rows=['Дата,Время,Точка,Тип,Детали,Оператор']
    .concat(entries.map(e=>`${fmtDate(e.ts)},${fmtTime(e.ts)},${e._loc||e.loc||''},${typeLabel(e.type)},${(e.note||'').replace(/,/g,';').replace(/\{[^}]+\}/g,'')},${e.op||''}`));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download=`arcada_${todayKey()}.csv`;
  a.click();
}
window.exportCSV=exportCSV;

function swTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  const p=document.getElementById('tab-'+id); if(p)p.classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='mylog'||id==='owlog') renderLog();
  if(id==='overview') renderOverview();
  if(id==='recon') renderRecon();
  if(id==='operators') renderOps();
  // FIX 3: rebuild close-shift panel when switching to it, using current subLoc
  if(id==='close-shift') {
    const csPanel = document.getElementById('tab-close-shift');
    if(csPanel) {
      // FIX v12-2: сохранить введённые значения перед пересборкой панели
      const sv={};
      csPanel.querySelectorAll('input[type=number]').forEach(el=>{if(el.id&&el.value!=='')sv[el.id]=el.value;});
      csPanel.innerHTML = buildCloseShiftPanel(CU.location);
      Object.entries(sv).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.value=val;});
    }
    renderAll();
    setTimeout(prefillCloseShift, 50);
  }
  if(id==='owstock') {
    if(stockLoc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
    else renderLocStock(stockLoc);
    renderStockLog(stockLoc);
    setTimeout(()=>{ updateMoveItems(); updateWriteOffItems(); },150);
  }
}
window.swTab=swTab;

function onOwDayPicked(input) {

  if(val > todayKey()) {
    alert('Нельзя выбрать будущую дату');

  // Обновляем активную кнопку
  document.querySelectorAll('#ov-day-switcher .day-btn').forEach(b=>b.classList.remove('active'));
  const pickBtn = document.querySelector('#ov-day-switcher .day-btn[data-day="pick"]');
  if(pickBtn) {
    pickBtn.classList.add('active');
    // Меняем текст кнопки на выбранную дату
    if(ownerDay) pickBtn.textContent = '📅 ' + dayLabel(ownerDay);
    else pickBtn.textContent = '📅 Дата';
  }
  // Сбросить текст «вчера» и «сегодня» если выбрали через календарь — активной делаем pick
  renderOverview();
  updatePayBlockForDay();
}
window.onOwDayPicked = onOwDayPicked;

// v15: обновление блока ввода оплат с учётом выбранного дня
function updatePayBlockForDay() {
  const title = document.getElementById('ov-pay-title');
  const hint = document.getElementById('ov-pay-hint');
  const card = document.getElementById('ov-pay-card');
  const btn = card?.querySelector('.btn-primary');
  const data = allData[enc(ownerLoc)] || {};
  const isToday = !ownerDay;

  if(title) title.textContent = isToday
    ? 'Ввести оплаты из KitPos'
    : `Ввести оплаты за ${dayLabel(ownerDay)}`;

  // Убираем старое предупреждение о ретро
  const oldWarn = card?.querySelector('.retro-warn');
  if(oldWarn) oldWarn.remove();

  if(isToday) {
    if(hint) hint.textContent = 'Личный кабинет KiT Vending → транзакции за сегодня';
    if(btn) btn.textContent = '✓ Применить · Списать брелки';
  } else {
    if(hint) hint.textContent = `Транзакции KiT Vending за ${dayLabel(ownerDay)}`;
    if(btn) btn.textContent = '✓ Сохранить за прошлый день';
    // Добавляем предупреждение
    const warn = document.createElement('div');
    warn.className = 'retro-warn';
    warn.innerHTML = '⚠ Ретроспективная запись. Склад брелков не пересчитывается — только фиксируется факт оплат.';
    card.insertBefore(warn, card.querySelector('#ov-loc-name'));
  }

  // Автозаполнение поля оплат значением за выбранный день
  const pi = document.getElementById('pay-inp');
  if(pi) {
    pi.value = '';
    const pay = paymentsForDay(data, ownerDay);
    if(pay !== null) pi.value = pay;
  }
  const ps = document.getElementById('pay-saved');
  if(ps) ps.textContent = '';
}
window.updatePayBlockForDay = updatePayBlockForDay;

function switchReconLoc(loc, btn) {
  reconLoc=loc;
  document.querySelectorAll('#recon-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderRecon(loc);
}
window.switchReconLoc=switchReconLoc;

function switchStockLoc(loc, btn) {
  stockLoc=loc;
  document.querySelectorAll('#stock-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(loc==='main') get(dbRef('main_stock')).then(s=>renderMainStock(s.val()||{}));
  else renderLocStock(loc);
  renderStockLog(loc);
}
window.switchStockLoc=switchStockLoc;

function renderStockLog(loc) {
  const el=document.getElementById('stock-log-wrap'); if(!el) return;
  get(dbRef('main_stock_log')).then(snap=>{
    const all=Object.values(snap.val()||{}).sort((a,b)=>tsOf(b)-tsOf(a));
    const items = loc==='main' ? all : all.filter(e=>{
      const locName = loc;
      // FIX v10-4: приходы (type:'in') — только для главного склада
      if(e.type==='in') return false;
      return e.from===locName || e.to===locName;
    });
    const show = items.slice(0,20);
    if(!show.length){el.innerHTML='';return;}
    const lbls={in:'➕ Приход',move:'🔄 Перемещение',writeoff:'🗑 Списание'};
    el.innerHTML=`<div class="card">
      <h4>📋 История операций</h4>
      ${show.map(e=>`
        <div class="recent-item">
          <span class="ri-time">${fmtTime(e.ts)}</span>
          <span style="font-size:12px;color:var(--dim);min-width:50px">${fmtDate(e.ts)}</span>
          <span class="ri-type ri-shift" style="font-size:13px">${lbls[e.type]||e.type}</span>
          <span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis">${e.note||''}</span>
        </div>`).join('')}
    </div>`;
  }).catch(()=>{el.innerHTML='';});
}

function renderStockPanel() {
  const loc=CU?.role==='owner'?ownerLoc:CU?.location;
  const data=CU?.role==='owner'?(allData[enc(loc)]||{}):locData;
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  const s=data?.stock||{};
  e('stk-toy',s.toy_small!==undefined?s.toy_small+' шт':'—');
  e('stk-big',s.toy_big!==undefined?s.toy_big+' шт':'—');
  e('stk-key',s.key!==undefined?s.key+' шт':'—');
}

// ══════════════════════════════════════════════════════════
// OPERATORS
// ══════════════════════════════════════════════════════════
function addOperator() {
  const name=document.getElementById('op-name')?.value.trim();
  const loc=document.getElementById('op-loc')?.value;
  const pw=document.getElementById('op-pw')?.value.trim();
  if(!name||!loc||!pw){alert('Заполните все поля');return;}
  const key='op_'+Date.now();
  set(dbRef(`users/${key}`),{name,role:'operator',location:loc,pw});
  document.getElementById('op-name').value='';
  document.getElementById('op-pw').value='';
  alert(`✓ Оператор ${name} добавлен`);
}
window.addOperator=addOperator;

function deleteOp(k) {
  if(!confirm('Удалить оператора?')) return;
  remove(dbRef(`users/${k}`));
}
window.deleteOp=deleteOp;

function saveInitCounters() {
  const loc=document.getElementById('init-loc')?.value||'Тир 1';
  const upd={};
  let saved=0;
  MACHINES.forEach(m=>{
    const v=parseInt(document.getElementById(`init-ctr-${m}`)?.value);
    if(!isNaN(v)&&v>=0){upd[`counters/${m}`]={prev:v,prevTs:serverTimestamp()};saved++;}
  });
  if(!saved){alert('Введите хотя бы одно показание');return;}
  update(dbRef(locPath(loc)),upd);
  alert(`✓ Начальные показания сохранены для ${loc}`);
}
window.saveInitCounters=saveInitCounters;

function savePrizeRules() {
  const tirToy=parseInt(document.getElementById('s-tir-toy')?.value)||20;
  const ballBig=parseInt(document.getElementById('s-ball-big')?.value)||10;
  const ballSmall=parseInt(document.getElementById('s-ball-small')?.value)||9;
  ['Тир 1','Тир 2'].forEach(l=>update(dbRef(`${locPath(l)}/prizes`),{toy:tirToy}));
  update(dbRef(`${locPath('Шарики')}/prizes`),{toy_big:ballBig,toy_small:ballSmall});
  alert('✓ Правила сохранены');
}
window.savePrizeRules=savePrizeRules;

function saveOwnerPw() {
  const pw=document.getElementById('new-pw')?.value.trim();
  if(!pw){alert('Введите пароль');return;}
  update(dbRef(`users/${CU.key}`),{pw});
  CU.pw=pw;
  document.getElementById('new-pw').value='';
  alert('✓ Пароль изменён');
}
window.saveOwnerPw=saveOwnerPw;

init();
</script>
