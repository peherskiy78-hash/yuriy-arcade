<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аркада — Учёт призов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#0d0a06; --card:#1a1408; --border:#2e2010;
  --gold:#f5a623; --red:#e74c3c; --green:#2ecc71;
  --blue:#3498db; --text:#d4aa70; --dim:#7a6040;
  --toy:#e74c3c; --key:#3498db;
  --a1:#ff6b35; --a2:#9b59b6; --a3:#1abc9c; --a4:#e67e22;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loader-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--gold);letter-spacing:.2em;margin-bottom:12px;}
.loader-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.loader-text{font-size:9px;color:var(--dim);margin-top:10px;letter-spacing:.15em;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold);letter-spacing:.2em;text-shadow:0 0 30px #f5a62344;line-height:1;}
.logo-sub{font-size:8px;color:var(--dim);letter-spacing:.25em;margin-bottom:28px;text-align:center;}
.login-box{width:100%;max-width:320px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;}
.login-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:.15em;margin-bottom:12px;text-align:center;}
.f-label{font-size:8px;color:var(--dim);letter-spacing:.15em;display:block;margin-bottom:4px;}
.f-select,.f-input{width:100%;padding:10px 12px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);
  border-radius:3px;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.95rem;outline:none;}
.f-select{cursor:pointer;}
.f-input{text-align:center;letter-spacing:.15em;}
.f-input:focus,.f-select:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#241c0a,#3a2800);border:2px solid var(--gold);
  border-radius:4px;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.15em;cursor:pointer;margin-bottom:6px;}
.login-btn:active{background:#3a2800;}
.login-err{color:var(--red);font-size:9px;text-align:center;min-height:14px;}
.conn-status{font-size:8px;text-align:center;margin-bottom:10px;padding:5px;border-radius:3px;}
.conn-ok{background:#0a1a08;color:var(--green);border:1px solid #1a6a18;}
.conn-err{background:#1a0808;color:#ee4422;border:1px solid #aa2200;}

/* ── APP HEADER ── */
.app-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:.15em;line-height:1;}
.app-subtitle{font-size:7px;color:var(--dim);letter-spacing:.1em;}
.badge{font-size:7px;letter-spacing:.08em;padding:2px 6px;border-radius:2px;margin-top:2px;display:inline-block;}
.badge-op{background:#1a0808;color:var(--red);border:1px solid #aa2200;}
.badge-ow{background:#0a1a08;color:var(--green);border:1px solid #1a6a18;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.hdr-time{font-size:8px;color:var(--dim);font-variant-numeric:tabular-nums;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.offline{background:#aa2200;}
.logout{font-size:8px;color:var(--dim);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:2px;}
.logout:active{color:var(--red);}

/* ── SHIFT BANNER ── */
.shift-banner{padding:7px 14px;font-size:8.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.shift-banner.open{background:#0a1a08;color:var(--green);}
.shift-banner.closed{background:#1a0808;color:#aa4422;}
.shift-btn{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.1em;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid;}
.shift-btn.open-btn{border-color:var(--green);color:var(--green);background:#0a1a08;}
.shift-btn.close-btn{border-color:#aa2200;color:#ee4422;background:#1a0808;}
.shift-btn:active{opacity:.7;}

/* ── STATS BAR ── */
.stats-row{display:flex;border-bottom:1px solid var(--border);}
.stat{flex:1;text-align:center;padding:7px 2px;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1;}
.sl{font-size:6px;color:var(--dim);letter-spacing:.04em;margin-top:1px;}
.stat:nth-child(1) .sv{color:var(--gold);}
.stat:nth-child(2) .sv{color:var(--toy);}
.stat:nth-child(3) .sv{color:var(--key);}
.stat:nth-child(4) .sv{color:var(--dim);}

/* ── TOAST ── */
#toast{position:fixed;bottom:0;left:0;right:0;z-index:100;transform:translateY(100%);transition:transform .25s ease;
  background:#1a1000;border-top:2px solid var(--gold);padding:12px 14px;}
#toast.show{transform:translateY(0);}
.toast-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.toast-label{flex:1;font-size:9.5px;color:var(--text);}
.toast-timer{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);min-width:28px;text-align:right;}
.toast-bar{height:4px;background:#2e2010;border-radius:2px;margin-bottom:10px;overflow:hidden;}
.toast-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 1s linear;}
.toast-btns{display:flex;gap:8px;}
.toast-confirm{flex:2;padding:10px;background:#1a2a10;border:1.5px solid var(--green);border-radius:3px;
  color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;}
.toast-cancel{flex:1;padding:10px;background:#1a0808;border:1.5px solid var(--red);border-radius:3px;
  color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;}
.toast-confirm:active,.toast-cancel:active{opacity:.7;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{flex-shrink:0;padding:9px 10px;background:var(--bg);border:none;border-right:1px solid var(--border);
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:7.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
.tab:last-child{border-right:none;}
.tab.active{background:var(--card);color:var(--gold);border-bottom:2px solid var(--gold);}
.panel{display:none;padding:12px;padding-bottom:90px;}
.panel.active{display:block;}

/* ── SEC TITLE ── */
.sec{font-size:7.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}

/* ── BIG TOY BUTTON ── */
.toy-btn-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.toy-btn{width:185px;height:185px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#2a1010,#1a0808);
  border:4px solid var(--toy);box-shadow:0 0 0 8px #e74c3c18,0 0 40px #e74c3c22,inset 0 2px 8px #ffffff08;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;position:relative;overflow:hidden;}
.toy-btn::before{content:'';position:absolute;top:10%;left:12%;right:58%;bottom:58%;background:radial-gradient(ellipse,#ffffff14,transparent);border-radius:50%;}
.toy-btn:active:not([disabled]){transform:scale(.93);}
.toy-btn[disabled]{opacity:.35;cursor:not-allowed;}
.tb-emoji{font-size:2.6rem;margin-bottom:2px;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.15em;color:var(--toy);}
.tb-sub{font-size:7px;color:var(--dim);margin-top:2px;}

/* ── INFO CARDS ── */
.info-row{display:flex;gap:5px;margin-bottom:12px;}
.info-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:7px;text-align:center;}
.ic-v{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1;}
.ic-l{font-size:6px;color:var(--dim);margin-top:2px;letter-spacing:.05em;}
.info-card.toy .ic-v{color:var(--toy);}
.info-card.key .ic-v{color:var(--key);}
.info-card.stk-toy .ic-v{color:var(--toy);}
.info-card.stk-key .ic-v{color:var(--key);}

/* ── MACHINE BUTTONS ── */
.mach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mach-btn{padding:10px 6px;border-radius:5px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:2px solid;transition:all .1s;}
.mach-btn:active:not([disabled]){transform:scale(.95);}
.mach-btn[disabled]{opacity:.35;cursor:not-allowed;}
.mach-btn.a1{background:#1a0e08;border-color:var(--a1);}
.mach-btn.a2{background:#120a18;border-color:var(--a2);}
.mach-btn.a3{background:#081a14;border-color:var(--a3);}
.mach-btn.a4{background:#1a1008;border-color:var(--a4);}
.mb-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;}
.mach-btn.a1 .mb-title{color:var(--a1);}
.mach-btn.a2 .mb-title{color:var(--a2);}
.mach-btn.a3 .mb-title{color:var(--a3);}
.mach-btn.a4 .mb-title{color:var(--a4);}
.mb-sub{font-size:7px;color:var(--dim);}
.mb-count{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;}
.mach-btn.a1 .mb-count{color:var(--a1);}
.mach-btn.a2 .mb-count{color:var(--a2);}
.mach-btn.a3 .mb-count{color:var(--a3);}
.mach-btn.a4 .mb-count{color:var(--a4);}

/* ── RECENT LOG ── */
.recent-wrap{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.recent-hdr{padding:6px 10px;border-bottom:1px solid var(--border);font-size:7.5px;color:var(--dim);letter-spacing:.15em;}
.ri{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid #1a1200;}
.ri:last-child{border-bottom:none;}
.ri-time{font-size:7.5px;color:var(--dim);min-width:56px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.ri-type{font-size:9px;font-weight:600;flex:1;}
.ri-type.toy{color:var(--toy);}
.ri-type.cancel{color:#aa4422;font-style:italic;}
.ri-type.tech{color:var(--dim);}
.ri-type.shift{color:var(--green);}
.ri-loc{font-size:7px;color:var(--dim);flex-shrink:0;}
.ri-empty{padding:12px;text-align:center;font-size:8.5px;color:var(--dim);}

/* ── COUNTERS ── */
.counter-form{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:10px;}
.counter-form h4{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:4px;}
.ctr-saved{font-size:7.5px;color:var(--green);margin-bottom:8px;}
.ctr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:3px;}
.ctr-label{flex:1;}
.ctr-name{font-size:9px;font-weight:600;}
.ctr-prev{font-size:7.5px;color:var(--dim);}
.ctr-input{width:85px;padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:3px;
  color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.95rem;outline:none;text-align:center;flex-shrink:0;}
.ctr-input:focus{border-color:var(--gold);}
.ctr-diff{width:40px;text-align:right;font-family:'Bebas Neue',sans-serif;font-size:.9rem;flex-shrink:0;}
.save-btn{width:100%;padding:10px;background:linear-gradient(135deg,#241c0a,#332000);border:1px solid var(--gold);
  border-radius:3px;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;margin-top:4px;}
.save-btn:active{background:#3a2800;}

/* ── LOG ── */
.log-filter{width:100%;padding:7px 8px;margin-bottom:8px;background:var(--card);border:1px solid var(--border);
  border-radius:3px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:8px;outline:none;}
.log-tbl{width:100%;border-collapse:collapse;}
.log-tbl th{font-size:7px;color:var(--dim);letter-spacing:.08em;padding:5px;border-bottom:1px solid var(--border);text-align:left;}
.log-tbl td{font-size:8px;padding:5px;border-bottom:1px solid #1a1200;}
.log-tbl tr:hover td{background:#1a1408;}
.t-time{color:var(--dim);font-size:7.5px;white-space:nowrap;font-variant-numeric:tabular-nums;}
.t-toy{color:var(--toy);font-weight:600;}
.t-tech{color:var(--dim);}
.t-cancel{color:#aa4422;font-style:italic;}
.t-shift{color:var(--green);}
.t-pay{color:var(--gold);}
.cam-note{margin-top:8px;font-size:7.5px;color:#3a2010;padding:6px 8px;background:var(--card);border-radius:3px;border:1px solid var(--border);line-height:1.6;}

/* ── STOCK ── */
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.sc-ico{font-size:1.5rem;flex-shrink:0;}
.sc-inf{flex:1;}
.sc-name{font-size:9px;color:var(--text);font-weight:600;}
.sc-cnt{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
.stock-card.toy .sc-cnt{color:var(--toy);}
.stock-card.key .sc-cnt{color:var(--key);}
.sc-low{font-size:7.5px;color:#aa4422;margin-top:2px;}
.stock-form{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:10px;}
.stock-form h4{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.sf-row{margin-bottom:10px;}
.sf-row label{font-size:8.5px;color:var(--dim);display:block;margin-bottom:4px;letter-spacing:.1em;}
.sf-row input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:1.1rem;outline:none;text-align:center;}
.sf-row input:focus{border-color:var(--gold);}

/* ── OWNER DASH ── */
.ow-card{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:10px;}
.ow-card h4{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.loc-tabs{display:flex;gap:5px;margin-bottom:10px;}
.loc-tab{flex:1;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--dim);font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;cursor:pointer;text-align:center;}
.loc-tab.active{background:#241c0a;border-color:var(--gold);color:var(--gold);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px;}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;text-align:center;}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1;}
.kpi-l{font-size:6.5px;color:var(--dim);margin-top:2px;letter-spacing:.05em;}
.kpi.gold .kpi-v{color:var(--gold);}
.kpi.toy .kpi-v{color:var(--toy);}
.kpi.key .kpi-v{color:var(--key);}
.kpi.green .kpi-v{color:var(--green);}
.mstat-row{display:flex;align-items:center;gap:8px;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:3px;margin-bottom:4px;}
.mstat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mstat-name{font-size:8.5px;font-weight:600;flex:1;}
.mstat-vals{text-align:right;}
.mstat-main{font-family:'Bebas Neue',sans-serif;font-size:.95rem;line-height:1;}
.mstat-sub{font-size:7px;color:var(--dim);}
.pay-input-wrap{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:10px;}
.pay-input-wrap h4{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:6px;}
.pay-hint{font-size:8px;color:var(--dim);margin-bottom:8px;line-height:1.5;}
.pay-big-input{width:100%;padding:12px;background:var(--bg);border:2px solid var(--gold);border-radius:4px;
  color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:1.8rem;outline:none;text-align:center;letter-spacing:.1em;}
.pay-saved{font-size:8px;color:var(--green);margin-top:6px;text-align:center;}

/* ── RECON ── */
.recon-wrap{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:10px;}
.recon-wrap h4{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.recon-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.recon-row:last-child{border-bottom:none;}
.rr-label{font-size:8.5px;color:var(--dim);}
.rr-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;}
.rr-val.gold{color:var(--gold);}
.rr-val.toy{color:var(--toy);}
.rr-val.key{color:var(--key);}
.rr-val.green{color:var(--green);}
.rr-val.red{color:var(--red);}
.rr-val.dim{color:var(--dim);}
.diff-ok{background:#0a1a08;border:1px solid #1a6a18;border-radius:3px;padding:8px;font-size:8.5px;color:var(--green);margin-top:8px;}
.diff-warn{background:#1a0808;border:1px solid #aa2200;border-radius:3px;padding:8px;font-size:8.5px;color:#ee4422;margin-top:8px;}

/* ── OPERATORS MANAGEMENT ── */
.op-item{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.op-info{flex:1;}
.op-name{font-size:10px;font-weight:600;color:var(--text);}
.op-loc{font-size:8px;color:var(--dim);}
.op-del{font-size:8px;color:#aa3300;cursor:pointer;padding:4px 8px;border:1px solid #3a1400;border-radius:2px;}
.op-del:active{background:#1a0808;}
.op-form{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:10px;}
.op-form h4{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.op-row{margin-bottom:8px;}
.op-row label{font-size:8px;color:var(--dim);display:block;margin-bottom:4px;letter-spacing:.1em;}
.op-row input,.op-row select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.9rem;outline:none;}
.op-row input:focus,.op-row select:focus{border-color:var(--gold);}

/* ── SETTINGS ── */
.set-section{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:10px;}
.set-section h4{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:10px;}
.pw-field{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.pw-field label{font-size:8px;color:var(--dim);flex:1;}
.pw-field input{flex:1;padding:7px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.85rem;outline:none;}
.pw-field input:focus{border-color:var(--gold);}
.danger-btn{width:100%;padding:8px;background:var(--bg);border:1px solid #3a1400;border-radius:3px;
  color:#aa3300;font-family:'IBM Plex Mono',monospace;font-size:8px;cursor:pointer;margin-bottom:6px;}
.danger-btn:active{background:#1a0808;}
.export-btn{width:100%;padding:8px;background:var(--bg);border:1px solid #1a3a14;border-radius:3px;
  color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:8px;cursor:pointer;margin-bottom:6px;}
.warn-box{display:none;background:#2a0808;border:1px solid #aa2200;border-radius:4px;padding:8px 10px;font-size:8.5px;color:#ee4422;letter-spacing:.08em;margin-bottom:10px;}
.warn-box.show{display:block;}

/* ── SHIFT MODAL ── */
#shift-modal{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:center;justify-content:center;padding:20px;}
#shift-modal.show{display:flex;}
.shift-modal-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;width:100%;max-width:320px;}
.shift-modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:.1em;margin-bottom:8px;}
.shift-modal-box p{font-size:8.5px;color:var(--dim);margin-bottom:12px;line-height:1.6;}
.shift-prev-data{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px;margin-bottom:12px;}
.shift-prev-row{display:flex;justify-content:space-between;font-size:8.5px;margin-bottom:4px;}
.shift-prev-row:last-child{margin-bottom:0;}
.sm-btns{display:flex;gap:8px;}
.sm-confirm{flex:2;padding:10px;background:#0a1a08;border:1.5px solid var(--green);border-radius:3px;
  color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;}
.sm-cancel{flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:.8rem;cursor:pointer;}

/* ── ANIMATIONS ── */
@keyframes bigPulse{
  0%,100%{box-shadow:0 0 0 8px #e74c3c18,0 0 40px #e74c3c22,inset 0 2px 8px #ffffff08}
  50%{box-shadow:0 0 0 20px #e74c3c2a,0 0 70px #e74c3c55,inset 0 2px 8px #ffffff18}
}
.btn-pulse{animation:bigPulse .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">🎯 АРКАДА</div>
  <div class="loader-spin"></div>
  <div class="loader-text">ПОДКЛЮЧЕНИЕ К ОБЛАКУ...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">🎯 АРКАДА</div>
  <div class="logo-sub">СИСТЕМА УЧЁТА ПРИЗОВ</div>
  <div class="login-box">
    <h3>ВХОД В СИСТЕМУ</h3>
    <div class="conn-status conn-ok" id="conn-status">✓ Подключено к облаку</div>
    <label class="f-label">КТО ВХОДИТ</label>
    <select class="f-select" id="login-user-select">
      <option value="">— выберите —</option>
    </select>
    <label class="f-label">ПАРОЛЬ</label>
    <input class="f-input" type="password" id="pw" placeholder="••••" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ВОЙТИ →</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div id="shift-modal">
  <div class="shift-modal-box">
    <h3>ОТКРЫТЬ СМЕНУ</h3>
    <p>Сверьте показания счётчиков на автоматах с данными ниже и подтвердите приём смены.</p>
    <div class="shift-prev-data" id="sm-data"></div>
    <div class="sm-btns">
      <button class="sm-confirm" onclick="confirmShift()">✓ СМЕНА ПРИНЯТА</button>
      <button class="sm-cancel" onclick="closeShiftModal()">ОТМЕНА</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <div class="toast-top">
    <span class="toast-label" id="toast-label"></span>
    <span class="toast-timer" id="toast-timer">30</span>
  </div>
  <div class="toast-bar"><div class="toast-fill" id="toast-fill" style="width:100%"></div></div>
  <div class="toast-btns">
    <button class="toast-confirm" onclick="toastConfirm()">✓ ПОДТВЕРДИТЬ</button>
    <button class="toast-cancel" onclick="toastCancel()">✕ ОТМЕНИТЬ</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="app-hdr">
    <div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="app-title" id="hdr-title">🎯 АРКАДА</span>
        <div class="sync-dot" id="sync-dot" title="Синхронизация"></div>
      </div>
      <div class="app-subtitle" id="hdr-sub"></div>
      <span class="badge" id="rbadge"></span>
    </div>
    <div class="hdr-right">
      <span class="hdr-time" id="htime"></span>
      <span class="logout" onclick="logout()">ВЫХОД</span>
    </div>
  </div>
  <div id="shift-banner" class="shift-banner closed">
    <span id="shift-status-text">Смена не открыта</span>
    <button class="shift-btn open-btn" id="shift-action-btn" onclick="handleShiftBtn()">ОТКРЫТЬ СМЕНУ</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="sv" id="s1">0</div><div class="sl">ОПЛАТ<br>СЕГОДНЯ</div></div>
    <div class="stat"><div class="sv" id="s2">0</div><div class="sl">🧸<br>ИГРУШЕК</div></div>
    <div class="stat"><div class="sv" id="s3">—</div><div class="sl">🔑<br>БРЕЛКОВ</div></div>
    <div class="stat"><div class="sv" id="s4">0</div><div class="sl">🔧<br>ТЕХН.</div></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ═══ FIREBASE CONFIG ═════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA-EkSGmpaFRAXNWtQcjo1J8YQNcESno7I",
  authDomain: "arcada-uchot.firebaseapp.com",
  databaseURL: "https://arcada-uchot-default-rtdb.firebaseio.com",
  projectId: "arcada-uchot",
  storageBucket: "arcada-uchot.firebasestorage.app",
  messagingSenderId: "252902676946",
  appId: "1:252902676946:web:9018b0af777d557b27900b"
};

const fireApp = initializeApp(firebaseConfig);
const db = getDatabase(fireApp);

// ═══ CONSTANTS ═══════════════════════════════════════════
const MACHINES = [
  {id:1,name:'Автомат 1',color:'var(--a1)',cls:'a1'},
  {id:2,name:'Автомат 2',color:'var(--a2)',cls:'a2'},
  {id:3,name:'Автомат 3',color:'var(--a3)',cls:'a3'},
  {id:4,name:'Автомат 4',color:'var(--a4)',cls:'a4'},
];
const LOCATIONS = ['Тир 1','Тир 2','Шарики/Уточки'];
const TOAST_SECS = 30;

// ═══ SESSION STATE ════════════════════════════════════════
let currentUser = null; // {name, role, location, pw}
let allUsers = {};       // from Firebase
let locationData = {};   // live data for current location
let allData = {};        // owner sees all locations
let pendingEntry = null;
let toastTmr = null, toastSecs = TOAST_SECS;
let clockTmr = null;
let isConnected = false;

// ═══ HELPERS ═════════════════════════════════════════════
function todayStr(){ return new Date().toLocaleDateString('ru-RU'); }
function nowTime(){ return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function dbRef(path){ return ref(db, path); }

// ═══ INIT ════════════════════════════════════════════════
async function init() {
  // check connection
  onValue(dbRef('.info/connected'), snap => {
    isConnected = snap.val() === true;
    const dot = document.getElementById('sync-dot');
    if(dot) dot.className = 'sync-dot' + (isConnected ? '' : ' offline');
    const cs = document.getElementById('conn-status');
    if(cs){ cs.className = 'conn-status ' + (isConnected ? 'conn-ok' : 'conn-err');
      cs.textContent = isConnected ? '✓ Подключено к облаку' : '✗ Нет соединения'; }
  });

  // load users for login dropdown
  onValue(dbRef('users'), snap => {
    allUsers = snap.val() || {};
    populateLoginSelect();
  });

  // init default owner if no users exist
  const usersSnap = await get(dbRef('users'));
  if(!usersSnap.exists()) {
    await set(dbRef('users/owner'), {
      name: 'Владелец', role: 'owner', location: 'all', pw: '0000'
    });
  }

  // hide loader, show login
  document.getElementById('loader').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function populateLoginSelect() {
  const sel = document.getElementById('login-user-select');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— выберите —</option>';
  Object.entries(allUsers).forEach(([key, u]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${u.name} (${u.role==='owner'?'Владелец':u.location||'Оператор'})`;
    sel.appendChild(opt);
  });
  if(cur) sel.value = cur;
}

// ═══ LOGIN / LOGOUT ══════════════════════════════════════
function login() {
  const key = document.getElementById('login-user-select').value;
  const pw = document.getElementById('pw').value.trim();
  const lerr = document.getElementById('lerr');
  if(!key){ lerr.textContent = 'Выберите пользователя'; return; }
  const user = allUsers[key];
  if(!user){ lerr.textContent = 'Пользователь не найден'; return; }
  if(pw !== user.pw){ lerr.textContent = '✕ Неверный пароль'; document.getElementById('pw').value=''; return; }
  currentUser = {...user, key};
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildUI();
  startListening();
  startClock();
}
window.login = login;

function logout() {
  toastCancel();
  clearInterval(clockTmr);
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw').value = '';
  document.getElementById('lerr').textContent = '';
}
window.logout = logout;

// ═══ REAL-TIME LISTENER ══════════════════════════════════
function startListening() {
  const loc = currentUser.role === 'owner' ? null : currentUser.location;
  if(loc) {
    // operator: listen to their location
    onValue(dbRef(`locations/${encodeL(loc)}`), snap => {
      locationData = snap.val() || {};
      renderAll();
    });
  } else {
    // owner: listen to all locations
    onValue(dbRef('locations'), snap => {
      allData = snap.val() || {};
      // also set locationData to currently selected location tab
      const locKey = encodeL(ownerSelectedLoc || LOCATIONS[0]);
      locationData = allData[locKey] || {};
      renderAll();
    });
  }
}

function encodeL(loc){ return loc.replace(/\//g,'-').replace(/\s/g,'_'); }
function locPath(){ return `locations/${encodeL(currentUser.location)}`; }
function ownerLocPath(loc){ return `locations/${encodeL(loc)}`; }

// ═══ COMPUTED ════════════════════════════════════════════
function todayLog(data) {
  const t = todayStr();
  const log = data?.log || {};
  return Object.values(log).filter(l => l.date === t);
}
function toysToday(data){ return todayLog(data).filter(l=>l.type==='toy').length; }
function techToday(data,machId){ return todayLog(data).filter(l=>l.type===`tech${machId}`).length; }
function techTodayAll(data){ return todayLog(data).filter(l=>l.type&&l.type.startsWith('tech')).length; }
function paymentsToday(data){
  const p = data?.payments;
  return p?.date===todayStr() ? p.count : null;
}
function keysToday(data){
  const p = paymentsToday(data);
  return p===null ? null : Math.max(0, p - toysToday(data));
}

// ═══ CLOCK ═══════════════════════════════════════════════
function startClock(){
  const tick = () => { const el=document.getElementById('htime'); if(el)el.textContent=nowTime(); };
  tick(); clockTmr = setInterval(tick, 1000);
}

// ═══ SHIFT ═══════════════════════════════════════════════
function handleShiftBtn() {
  const shift = locationData?.shift;
  if(shift?.open) {
    if(!confirm('Закрыть смену?')) return;
    addEntry({type:'shift_close', note:'Смена закрыта'});
    update(dbRef(`${locPath()}/shift`), {open:false});
  } else {
    showShiftModal();
  }
}
window.handleShiftBtn = handleShiftBtn;

function showShiftModal() {
  const counters = locationData?.counters || {};
  const rows = MACHINES.map(m => {
    const c = counters[m.id] || {};
    return `<div class="shift-prev-row">
      <span style="color:${m.color};font-weight:600">${m.name}</span>
      <span style="color:var(--text)">${c.prev!==undefined?c.prev:'—'}</span>
      <span style="color:var(--dim);font-size:7.5px">${c.prevTime||''}</span>
    </div>`;
  }).join('');
  document.getElementById('sm-data').innerHTML = rows || '<div style="color:var(--dim);font-size:8.5px">Нет сохранённых показаний</div>';
  document.getElementById('shift-modal').classList.add('show');
}

function closeShiftModal(){ document.getElementById('shift-modal').classList.remove('show'); }
window.closeShiftModal = closeShiftModal;

function confirmShift() {
  addEntry({type:'shift_open', note:'Смена открыта · показания сверены'});
  update(dbRef(`${locPath()}/shift`), {
    open:true, openDate:todayStr(), openTime:nowTime(), openOp:currentUser.name
  });
  closeShiftModal();
}
window.confirmShift = confirmShift;

function renderShiftBanner() {
  const banner = document.getElementById('shift-banner');
  const statusText = document.getElementById('shift-status-text');
  const actionBtn = document.getElementById('shift-action-btn');
  if(!banner) return;
  const shift = locationData?.shift;
  if(shift?.open) {
    banner.className='shift-banner open';
    statusText.textContent=`✓ Смена открыта · ${shift.openTime||''}`;
    actionBtn.textContent='ЗАКРЫТЬ СМЕНУ'; actionBtn.className='shift-btn close-btn';
  } else {
    banner.className='shift-banner closed';
    statusText.textContent='Смена не открыта';
    actionBtn.textContent='ОТКРЫТЬ СМЕНУ'; actionBtn.className='shift-btn open-btn';
  }
}

// ═══ TOAST ═══════════════════════════════════════════════
function showToast(entry, label) {
  pendingEntry = entry;
  toastSecs = TOAST_SECS;
  document.getElementById('toast-label').textContent = label;
  document.getElementById('toast-timer').textContent = toastSecs;
  document.getElementById('toast-fill').style.width = '100%';
  document.getElementById('toast').classList.add('show');
  setBtnsDisabled(true);
  clearInterval(toastTmr);
  toastTmr = setInterval(() => {
    toastSecs--;
    document.getElementById('toast-timer').textContent = toastSecs;
    document.getElementById('toast-fill').style.width = (toastSecs/TOAST_SECS*100)+'%';
    if(toastSecs <= 0) toastConfirm();
  }, 1000);
}

function toastConfirm() {
  clearInterval(toastTmr);
  document.getElementById('toast').classList.remove('show');
  setBtnsDisabled(false);
  if(!pendingEntry) return;
  commitEntry(pendingEntry);
  pendingEntry = null;
}
window.toastConfirm = toastConfirm;

function toastCancel() {
  clearInterval(toastTmr);
  document.getElementById('toast').classList.remove('show');
  setBtnsDisabled(false);
  if(!pendingEntry) return;
  // log cancellation
  addEntry({
    type:'cancel',
    note:`Отмена: ${pendingEntry.type==='toy'?'Игрушка':pendingEntry.type.startsWith('tech')?`Пристрелка авт.${pendingEntry.machId}`:''}`
  });
  pendingEntry = null;
}
window.toastCancel = toastCancel;

function setBtnsDisabled(val) {
  const btn = document.getElementById('toy-btn');
  if(btn) btn.disabled = val;
  MACHINES.forEach(m => { const b=document.getElementById(`mach-btn-${m.id}`); if(b) b.disabled=val; });
}

// ═══ ENTRIES ═════════════════════════════════════════════
function mkEntry(type, machId, note) {
  return { type, machId:machId||null, note:note||null,
    date:todayStr(), time:nowTime(), op:currentUser.name, loc:currentUser.location };
}

function addEntry(fields) {
  const entry = {...mkEntry(fields.type, fields.machId, fields.note), ...fields};
  const path = currentUser.role==='owner'
    ? `${ownerLocPath(currentUser.location)}/log`
    : `${locPath()}/log`;
  push(dbRef(path), entry);
}

function commitEntry(entry) {
  const path = `${locPath()}/log`;
  push(dbRef(path), entry);
  if(entry.type==='toy') {
    const stock = locationData?.stock?.toy;
    if(stock!==null && stock!==undefined && stock>0)
      update(dbRef(`${locPath()}/stock`), {toy: stock-1});
  }
}

// ═══ ACTIONS ═════════════════════════════════════════════
function giveToy() {
  const entry = mkEntry('toy');
  showToast(entry, '🧸 Игрушка — подтвердите или отмените (30 сек)');
  const btn = document.getElementById('toy-btn');
  if(btn){ btn.classList.remove('btn-pulse'); void btn.offsetWidth; btn.classList.add('btn-pulse'); }
}
window.giveToy = giveToy;

function giveTech(machId) {
  const m = MACHINES[machId-1];
  showToast(mkEntry(`tech${machId}`, machId), `🔧 Пристрелка ${m.name} — подтвердите или отмените`);
}
window.giveTech = giveTech;

function saveCounters() {
  const time = nowTime();
  const updates = {};
  let saved = 0;
  MACHINES.forEach(m => {
    const v = parseInt(document.getElementById(`ctr-inp-${m.id}`)?.value);
    if(!isNaN(v)&&v>=0) {
      updates[`counters/${m.id}`] = {prev:v, prevDate:todayStr(), prevTime:time};
      saved++;
    }
  });
  if(!saved){ alert('Введите показания хотя бы одного автомата'); return; }
  update(dbRef(locPath()), updates);
  addEntry({type:'counters', note:`Счётчики внесены (${saved} авт.) в ${time}`});
  MACHINES.forEach(m=>{ const el=document.getElementById(`ctr-inp-${m.id}`); if(el)el.value=''; });
  alert(`✓ Показания сохранены в ${time}`);
}
window.saveCounters = saveCounters;

function savePayments() {
  const loc = currentUser.role==='owner' ? ownerSelectedLoc : currentUser.location;
  const lPath = ownerLocPath(loc);
  const v = parseInt(document.getElementById('pay-inp')?.value);
  if(isNaN(v)||v<0){ alert('Введите число'); return; }
  const data = currentUser.role==='owner' ? (allData[encodeL(loc)]||{}) : locationData;
  const oldKeys = keysToday(data);
  const newKeys = Math.max(0, v - toysToday(data));
  // deduct keyrings
  const curKey = data?.stock?.key;
  if(curKey!==null&&curKey!==undefined) {
    let upd = curKey;
    if(oldKeys!==null) upd += oldKeys;
    upd = Math.max(0, upd - newKeys);
    update(dbRef(`${lPath}/stock`), {key: upd});
  }
  update(dbRef(`${lPath}/payments`), {date:todayStr(), count:v, time:nowTime()});
  push(dbRef(`${lPath}/log`), mkEntry('payment', null, `Оплат: ${v} · Брелков списано: ${newKeys}`));
  const ps = document.getElementById('pay-saved');
  if(ps) ps.textContent = `✓ Сохранено · Брелков списано: ${newKeys}`;
}
window.savePayments = savePayments;

function setStock() {
  const loc = currentUser.role==='owner' ? ownerSelectedLoc : currentUser.location;
  const lPath = ownerLocPath(loc);
  const t = parseInt(document.getElementById('inp-toy')?.value);
  const k = parseInt(document.getElementById('inp-key')?.value);
  const upd = {};
  if(!isNaN(t)&&t>=0) upd.toy=t;
  if(!isNaN(k)&&k>=0) upd.key=k;
  if(Object.keys(upd).length) { update(dbRef(`${lPath}/stock`), upd); alert('Склад обновлён!'); }
  ['inp-toy','inp-key'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; });
}
window.setStock = setStock;

// ═══ OWNER: LOCATION COUNTER SETUP ═══════════════════════
async function saveInitialCounters() {
  const loc = document.getElementById('init-loc-sel')?.value;
  if(!loc){ alert('Выберите точку'); return; }
  const lPath = ownerLocPath(loc);
  const updates = {};
  MACHINES.forEach(m => {
    const v = parseInt(document.getElementById(`init-ctr-${m.id}`)?.value);
    if(!isNaN(v)&&v>=0) updates[`counters/${m.id}`] = {prev:v, prevDate:todayStr(), prevTime:nowTime()};
  });
  if(!Object.keys(updates).length){ alert('Введите хотя бы одно показание'); return; }
  await update(dbRef(lPath), updates);
  alert(`✓ Начальные показания для "${loc}" сохранены!`);
}
window.saveInitialCounters = saveInitialCounters;

// ═══ OPERATORS MANAGEMENT ════════════════════════════════
async function addOperator() {
  const name = document.getElementById('op-name-inp')?.value.trim();
  const loc = document.getElementById('op-loc-sel')?.value;
  const pw = document.getElementById('op-pw-inp')?.value.trim();
  if(!name||!loc||!pw){ alert('Заполните все поля'); return; }
  const key = 'op_'+Date.now();
  await set(dbRef(`users/${key}`), {name, role:'operator', location:loc, pw});
  ['op-name-inp','op-pw-inp'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; });
  alert(`✓ Оператор "${name}" добавлен!`);
}
window.addOperator = addOperator;

async function deleteOperator(key) {
  const u = allUsers[key];
  if(!confirm(`Удалить оператора "${u?.name}"?`)) return;
  await remove(dbRef(`users/${key}`));
}
window.deleteOperator = deleteOperator;

async function saveOwnerPw() {

function renderAll() {
  if(currentUser?.role==='operator') {
    renderTopStats(locationData);
    renderWarnings(locationData);
    renderRecent(locationData);
    renderTechCounts(locationData);
    renderCounters(locationData);
    renderShiftBanner();
  } else {
    // owner: use selected location
    const locKey = encodeL(ownerSelectedLoc);
    const data = allData[locKey] || {};
    locationData = data;
    renderTopStats(data);
    renderShiftBanner();
    renderDash(data);
    renderOperatorsList();
  }
}

function renderTopStats(data) {
  const p=paymentsToday(data), t=toysToday(data), k=keysToday(data);
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('s1',p!==null?p:'—'); e('s2',t); e('s3',k!==null?k:'—'); e('s4',techTodayAll(data));
  e('ic-toys',t); e('ic-keys',k!==null?k:'—');
  e('ic-stk-toy',data?.stock?.toy!==undefined?data.stock.toy:'—');
  e('ic-stk-key',data?.stock?.key!==undefined?data.stock.key:'—');
}

function renderWarnings(data) {
  const wt=document.getElementById('w-toy');
  if(wt) wt.classList.toggle('show', data?.stock?.toy!==undefined && data.stock.toy<=3);
}

function renderRecent(data) {
  const el=document.getElementById('recent'); if(!el) return;
  const log = data?.log || {};
  const items = Object.values(log).sort((a,b)=>b.ts-a.ts).slice(0,7);
  if(!items.length){ el.innerHTML='<div class="ri-empty">Нет записей</div>'; return; }
  el.innerHTML=items.map(e=>{
    let cls='',label='';
    if(e.type==='toy'){cls='toy';label='🧸 Игрушка';}
    else if(e.type?.startsWith('tech')){cls='tech';label=`🔧 Пристрелка Авт.${e.machId}`;}
    else if(e.type==='cancel'){cls='cancel';label=`🔴 ${e.note||'Отмена'}`;}
    else if(e.type==='shift_open'){cls='shift';label='✅ Смена открыта';}
    else if(e.type==='shift_close'){cls='shift';label='🔒 Смена закрыта';}
    else if(e.type==='counters'){label='📟 Счётчики внесены';}
    else if(e.type==='payment'){label='💳 Оплаты внесены';}
    else{label=e.note||e.type;}
    return `<div class="ri fade-in">
      <span class="ri-time">${e.time||''}</span>
      <span class="ri-type ${cls}">${label}</span>
    </div>`;
  }).join('');
}

function renderTechCounts(data) {
  MACHINES.forEach(m=>{
    const el=document.getElementById(`tech-count-${m.id}`);
    if(el) el.textContent=techToday(data,m.id);
  });
}

function renderCounters(data) {
  const counters = data?.counters || {};
  MACHINES.forEach(m=>{
    const pl=document.getElementById(`ctr-prev-${m.id}`);
    const c=counters[m.id]||{};
    if(pl) pl.textContent = c.prev!==undefined ? `утро: ${c.prev} (${c.prevTime||''})` : 'утро: —';
    updateDiff(m.id);
  });
  const lastCtr = Object.values(data?.log||{}).filter(l=>l.type==='counters'&&l.date===todayStr()).sort((a,b)=>b.ts-a.ts)[0];
  const si=document.getElementById('ctr-saved-info');
  if(si) si.textContent = lastCtr ? `✓ Сохранено: ${lastCtr.time}` : '';
}

function renderLog() {
  const tbody=document.getElementById('ltbody'); if(!tbody) return;
  const filter=document.getElementById('lf')?.value||'all';
  const locFilter=document.getElementById('lf-loc')?.value||'all';
  const isOwner=currentUser?.role==='owner';
  let entries=[];
  if(isOwner) {
    Object.entries(allData).forEach(([lk, ldata])=>{
      const locName=LOCATIONS.find(l=>encodeL(l)===lk)||lk;
      Object.values(ldata?.log||{}).forEach(e=>entries.push({...e,_loc:locName}));
    });
  } else {
    entries = Object.values(locationData?.log||{});
  }
  entries.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(filter!=='all') {
    if(filter==='toy') entries=entries.filter(e=>e.type==='toy');
    else if(filter==='tech') entries=entries.filter(e=>e.type?.startsWith('tech'));
    else if(filter==='cancel') entries=entries.filter(e=>e.type==='cancel');
    else if(filter==='shift') entries=entries.filter(e=>e.type?.startsWith('shift'));
    else if(filter==='payment') entries=entries.filter(e=>e.type==='payment');
  }
  if(locFilter!=='all') entries=entries.filter(e=>e._loc===locFilter||e.loc===locFilter);
  const lempty=document.getElementById('lempty');
  if(!entries.length){tbody.innerHTML=''; if(lempty)lempty.style.display='block'; return;}
  if(lempty) lempty.style.display='none';
  tbody.innerHTML=entries.map(e=>{
    let cls='',label='';
    if(e.type==='toy'){cls='t-toy';label='🧸 Игрушка';}
    else if(e.type?.startsWith('tech')){cls='t-tech';label=`🔧 Авт.${e.machId}`;}
    else if(e.type==='cancel'){cls='t-cancel';label='🔴 Отмена';}
    else if(e.type==='shift_open'){cls='t-shift';label='✅ Смена';}
    else if(e.type==='shift_close'){cls='t-shift';label='🔒 Закрытие';}
    else if(e.type==='counters'){label='📟 Счётчики';}
    else if(e.type==='payment'){cls='t-pay';label='💳 Оплаты';}
    else{label=e.type||'';}
    return `<tr>
      <td class="t-time">${e.time||''}</td>
      <td style="font-size:7.5px;color:var(--dim)">${e.date||''}</td>
      <td class="${cls}">${label}</td>
      ${isOwner?`<td style="font-size:7.5px;color:var(--dim)">${e._loc||e.loc||''}</td>
      <td style="font-size:7.5px;color:var(--dim)">${e.op||''}</td>`:''}
      <td style="font-size:7.5px;color:var(--dim);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note||''}</td>
    </tr>`;
  }).join('');
}

function renderDash(data) {
  if(!data) return;
  const p=paymentsToday(data),t=toysToday(data),k=keysToday(data);
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('kpi-pay',p!==null?p:'—'); e('kpi-toys',t); e('kpi-keys',k!==null?k:'—');
  const title=document.getElementById('dash-loc-title');
  if(title) title.textContent=`📊 ${ownerSelectedLoc} — ИТОГИ ДНЯ`;
  // tech
  const ot=document.getElementById('ow-tech');
  if(ot) ot.innerHTML=MACHINES.map(m=>`
    <div class="mstat-row">
      <div class="mstat-dot" style="background:${m.color}"></div>
      <div class="mstat-name" style="color:${m.color}">${m.name}</div>
      <div class="mstat-vals">
        <div class="mstat-main" style="color:${m.color}">${techToday(data,m.id)}</div>
        <div class="mstat-sub">пристрелок</div>
      </div>
    </div>`).join('');
  // stock
  const os=document.getElementById('ow-stk');
  if(os) os.innerHTML=`
    <div style="display:flex;gap:6px">
      <div style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--toy)">${data?.stock?.toy!==undefined?data.stock.toy:'—'}</div>
        <div style="font-size:7px;color:var(--dim)">🧸 ИГРУШЕК</div>
      </div>
      <div style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--key)">${data?.stock?.key!==undefined?data.stock.key:'—'}</div>
        <div style="font-size:7px;color:var(--dim)">🔑 БРЕЛКОВ</div>
      </div>
    </div>`;
  // pay-saved
  if(data?.payments?.date===todayStr()&&data.payments.time){
    const ps=document.getElementById('pay-saved');
    if(ps) ps.textContent=`✓ Сохранено в ${data.payments.time}`;
    const pi=document.getElementById('pay-inp');
    if(pi&&!pi.value) pi.value=data.payments.count;
  }
  // warnings
  const warns=[];
  if(data?.stock?.toy!==undefined&&data.stock.toy<=3) warns.push('⚠ Игрушек критически мало!');
  if(data?.stock?.key!==undefined&&data.stock.key<=10) warns.push('⚠ Брелков мало!');
  const ow=document.getElementById('ow-warns');
  if(ow) ow.innerHTML=warns.map(w=>`<div style="background:#1a0808;border:1px solid #aa2200;border-radius:3px;padding:8px 10px;font-size:8.5px;color:#ee4422;margin-bottom:8px">${w}</div>`).join('');
}

function renderRecon(loc) {
  const el=document.getElementById('recon-content'); if(!el) return;
  const l = loc || ownerSelectedLoc;
  const data = allData[encodeL(l)] || {};
  const p=paymentsToday(data), t=toysToday(data), k=keysToday(data), techAll=techTodayAll(data);
  const counters = data?.counters || {};
  const machLines = MACHINES.map(m=>{
    const c=counters[m.id]||{};
    const tech=techToday(data,m.id);
    if(c.prev!==undefined && c.prevDate===todayStr()){
      return `<div style="display:flex;justify-content:space-between;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;margin-bottom:4px;font-size:8px;gap:4px;flex-wrap:wrap">
        <span style="color:${m.color};font-weight:600">${m.name}</span>
        <span style="color:var(--dim)">→ ${c.prev} (${c.prevTime||''})</span>
        <span style="color:${m.color}">−${tech} техн.</span>
      </div>`;
    }
    return `<div style="display:flex;justify-content:space-between;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;margin-bottom:4px;font-size:8px">
      <span style="color:${m.color};font-weight:600">${m.name}</span>
      <span style="color:var(--dim)">${c.prev!==undefined?`утро: ${c.prev}`:'нет данных'}</span>
    </div>`;
  }).join('');
  el.innerHTML=`
    ${machLines}
    <div style="height:6px"></div>
    <div class="recon-row"><span class="rr-label">Оплат в KitPos</span><span class="rr-val gold">${p!==null?p:'—'}</span></div>
    <div class="recon-row"><span class="rr-label">🔧 Техн. игр</span><span class="rr-val dim">${techAll}</span></div>
    <div class="recon-row" style="border-top:2px solid var(--border);padding-top:8px;margin-top:4px">
      <span class="rr-label">🧸 Игрушек выдано</span><span class="rr-val toy">${t}</span></div>
    <div class="recon-row"><span class="rr-label">🔑 Брелков (оплаты−игрушки)</span><span class="rr-val key">${k!==null?k:'Введите оплаты'}</span></div>
    ${p!==null&&k!==null?`<div class="diff-ok">✓ Брелков: ${k} · Оплат: ${p} · Игрушек: ${t}</div>`:'<div style="font-size:8px;color:var(--dim);margin-top:8px">Введите оплаты во вкладке Обзор</div>'}
  `;
}

function renderOperatorsList() {
  const el=document.getElementById('ops-list'); if(!el) return;
  const ops=Object.entries(allUsers).filter(([,u])=>u.role==='operator');
  if(!ops.length){ el.innerHTML='<div style="color:var(--dim);font-size:9px;text-align:center;padding:12px">Операторов нет</div>'; return; }
  el.innerHTML=ops.map(([key,u])=>`
    <div class="op-item">
      <div class="op-info">
        <div class="op-name">${u.name}</div>
        <div class="op-loc">📍 ${u.location} · 🔑 ${u.pw}</div>
      </div>
      <button class="op-del" onclick="deleteOperator('${key}')">УДАЛИТЬ</button>
    </div>`).join('');
}

function renderStockPanel() {
  const loc = currentUser?.role==='owner' ? ownerSelectedLoc : currentUser?.location;
  const data = currentUser?.role==='owner' ? (allData[encodeL(loc)]||{}) : locationData;
  const e=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  e('stk-toy', data?.stock?.toy!==undefined?data.stock.toy+' шт':'—');
  e('stk-key', data?.stock?.key!==undefined?data.stock.key+' шт':'—');
  const tw=document.getElementById('stk-toy-w'); if(tw)tw.textContent=data?.stock?.toy!==undefined&&data.stock.toy<=3?'⚠ Критически мало!':'';
  const kw=document.getElementById('stk-key-w'); if(kw)kw.textContent=data?.stock?.key!==undefined&&data.stock.key<=10?'⚠ Мало':'';
}

// ═══ LOCATION SWITCHERS ══════════════════════════════════
function switchDashLoc(loc, btn) {
  ownerSelectedLoc = loc;
  document.querySelectorAll('#dash-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const data = allData[encodeL(loc)] || {};
  locationData = data;
  renderTopStats(data);
  renderDash(data);
}
window.switchDashLoc = switchDashLoc;

let reconSelectedLoc = LOCATIONS[0];
function switchReconLoc(loc, btn) {
  reconSelectedLoc = loc;
  document.querySelectorAll('#tab-ow-recon .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderRecon(loc);
}
window.switchReconLoc = switchReconLoc;

let stockSelectedLoc = LOCATIONS[0];
function switchStockLoc(loc, btn) {
  stockSelectedLoc = loc;
  ownerSelectedLoc = loc;
  document.querySelectorAll('#stock-loc-tabs .loc-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderStockPanel();
}
window.switchStockLoc = switchStockLoc;

// ═══ DIFF ════════════════════════════════════════════════
function updateDiff(machId) {
  const inp=document.getElementById(`ctr-inp-${machId}`);
  const diff=document.getElementById(`ctr-diff-${machId}`);
  if(!inp||!diff) return;
  const v=parseInt(inp.value);
  const prev=locationData?.counters?.[machId]?.prev;
  if(!isNaN(v)&&v>=0&&prev!==undefined){
    const d=v-prev;
    diff.textContent=d>=0?`+${d}`:String(d);
    diff.style.color=d<0?'var(--red)':MACHINES[machId-1].color;
  } else diff.textContent='—';
}
window.updateDiff = updateDiff;

// ═══ TAB SWITCH ══════════════════════════════════════════
function sw(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const p=document.getElementById('tab-'+id); if(p) p.classList.add('active');
  btn.classList.add('active');
  if(id.includes('log')) renderLog();
  if(id==='op-counters') renderCounters(locationData);
  if(id==='ow-dash') renderDash(allData[encodeL(ownerSelectedLoc)]||{});
  if(id==='ow-recon') renderRecon(reconSelectedLoc);
  if(id==='ow-stock'||id==='op-stock') renderStockPanel();
  if(id==='ow-ops') renderOperatorsList();
}
window.sw = sw;

// ═══ EXPORT ══════════════════════════════════════════════
function exportCSV() {
  let entries=[];
  Object.entries(allData).forEach(([lk,ldata])=>{
    const locName=LOCATIONS.find(l=>encodeL(l)===lk)||lk;
    Object.values(ldata?.log||{}).forEach(e=>entries.push({...e,_loc:locName}));
  });
  entries.sort((a,b)=>(b.ts||0)-(a.ts||0));
  const rows=['Дата,Время,Точка,Тип,Детали,Оператор']
    .concat(entries.map(e=>`${e.date||''},${e.time||''},${e._loc||e.loc||''},${e.type||''},${e.note||''},${e.op||''}`));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download=`arcada_${new Date().toLocaleDateString('ru-RU').replace(/\./g,'-')}.csv`;
  a.click();
}
window.exportCSV = exportCSV;

// ═══ START ═══════════════════════════════════════════════
init();
</script>
</body>
</html>
